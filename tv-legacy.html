<html lang="es">

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>MoJiTo TV</title>
<style type="text/css">
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: Arial, sans-serif; }

#app { width: 100%; height: 100%; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-flex-direction: column; -ms-flex-direction: column; flex-direction: column; }

/* Header */
#header { height: 40px; background: linear-gradient(180deg, #1a1a2e, #0f0f1a); display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; -webkit-flex-shrink: 0; -ms-flex-negative: 0; flex-shrink: 0; }
#header-title { font-size: 16px; font-weight: bold; color: #00d4ff; letter-spacing: 2px; }
#header-status { margin-left: auto; font-size: 11px; color: #888; }

/* Main */
#main { -webkit-flex: 1; -ms-flex: 1; flex: 1; min-height: 0; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; overflow: hidden; }

/* Sidebar */
#sidebar { width: 320px; min-width: 260px; max-width: 400px; background: #12121a; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-flex-direction: column; -ms-flex-direction: column; flex-direction: column; border-right: 1px solid #333; }
#sidebar-header { padding: 10px; background: #1a1a28; border-bottom: 1px solid #333; -webkit-flex-shrink: 0; -ms-flex-negative: 0; flex-shrink: 0; }
#sidebar-title { font-size: 11px; color: #00d4ff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#search-box { display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; }
#search { -webkit-flex: 1; -ms-flex: 1; flex: 1; height: 30px; padding: 0 10px; background: #0a0a12; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 13px; outline: none; }
#search:focus { border-color: #00d4ff; }
#search-clear { width: 30px; height: 30px; margin-left: 6px; background: #2a2a3a; border: 1px solid #444; border-radius: 4px; color: #fff; cursor: pointer; }

/* Category tabs */
#category-tabs { display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; padding: 6px; background: #0f0f1a; border-bottom: 1px solid #333; -webkit-flex-shrink: 0; -ms-flex-negative: 0; flex-shrink: 0; overflow-x: auto; }
.cat-tab { padding: 6px 12px; background: #1a1a28; border: 1px solid #333; border-radius: 4px; font-size: 10px; color: #888; cursor: pointer; white-space: nowrap; margin-right: 4px; }
.cat-tab.active { background: #00d4ff; color: #000; border-color: #00d4ff; }
.cat-tab:hover { background: #2a2a3a; }

#channel-list { -webkit-flex: 1; -ms-flex: 1; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px; }

/* Channel */
.channel { display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; padding: 8px 10px; margin-bottom: 3px; background: #1a1a28; border: 2px solid transparent; border-radius: 4px; cursor: pointer; }
.channel:hover { background: #252538; }
.channel.selected { background: #00d4ff; border-color: #00d4ff; }
.channel.selected .channel-name { color: #000; }
.channel.selected .channel-meta { color: #003344; }
.channel.focused { border-color: #ffcc00; }
.channel-index { width: 32px; height: 32px; min-width: 32px; background: #2a2a3a; border-radius: 4px; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; -webkit-justify-content: center; -ms-flex-pack: center; justify-content: center; font-size: 11px; font-weight: bold; margin-right: 8px; }
.channel.selected .channel-index { background: #fff; color: #00d4ff; }
.channel-info { -webkit-flex: 1; -ms-flex: 1; flex: 1; min-width: 0; overflow: hidden; }
.channel-name { font-size: 12px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.channel-meta { font-size: 10px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.channel-badge { padding: 2px 6px; background: #2a4a3a; border-radius: 3px; font-size: 9px; color: #00ff88; }
.channel.selected .channel-badge { background: #003322; }

/* Content */
#content { -webkit-flex: 1; -ms-flex: 1; flex: 1; min-width: 0; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-flex-direction: column; -ms-flex-direction: column; flex-direction: column; background: #000; }
#player-container { position: relative; width: 100%; background: #000; -webkit-flex: 1; -ms-flex: 1; flex: 1; min-height: 0; }
#video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
#player-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a12; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-flex-direction: column; -ms-flex-direction: column; flex-direction: column; -webkit-align-items: center; -ms-flex-align: center; align-items: center; -webkit-justify-content: center; -ms-flex-pack: center; justify-content: center; text-align: center; padding: 20px; z-index: 2; }
#player-overlay.hidden { display: none !important; }
#overlay-icon { width: 70px; height: 70px; background: #1a1a28; border-radius: 50%; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; -webkit-justify-content: center; -ms-flex-pack: center; justify-content: center; margin-bottom: 15px; font-size: 30px; color: #00d4ff; }
#overlay-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 6px; }
#overlay-subtitle { font-size: 12px; color: #888; margin-bottom: 12px; }
#overlay-hint { font-size: 10px; color: #00d4ff; background: rgba(0, 212, 255, 0.15); padding: 6px 12px; border-radius: 15px; }

/* Info bar */
#player-info { background: #12121a; padding: 8px 12px; border-top: 1px solid #333; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; -webkit-flex-shrink: 0; -ms-flex-negative: 0; flex-shrink: 0; }
#now-playing { -webkit-flex: 1; -ms-flex: 1; flex: 1; min-width: 0; }
#now-playing-title { font-size: 13px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#now-playing-meta { font-size: 10px; color: #888; margin-top: 2px; }
#player-controls { display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; margin-left: 10px; }
.ctrl-btn { width: 36px; height: 36px; background: #2a2a3a; border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer; margin-left: 6px; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; -webkit-justify-content: center; -ms-flex-pack: center; justify-content: center; }
.ctrl-btn:first-child { margin-left: 0; }
.ctrl-btn.playing { background: #00d4ff; color: #000; }

/* Status */
#status-bar { height: 24px; background: #0f0f1a; border-top: 1px solid #333; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; padding: 0 12px; font-size: 10px; color: #666; -webkit-flex-shrink: 0; -ms-flex-negative: 0; flex-shrink: 0; }
#status-left { -webkit-flex: 1; -ms-flex: 1; flex: 1; }
#status-right { color: #00d4ff; }

/* Fullscreen */
body.fullscreen #header, body.fullscreen #sidebar, body.fullscreen #player-info, body.fullscreen #status-bar { display: none !important; }
body.fullscreen #main { padding: 0; }
body.fullscreen #content { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; }
body.fullscreen #player-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

#player-hud { position: absolute; top: 12px; left: 12px; right: 12px; display: none; -webkit-justify-content: space-between; -ms-flex-pack: justify; justify-content: space-between; pointer-events: none; z-index: 10; }
body.fullscreen #player-hud { display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; }
#hud-left { background: rgba(0,0,0,0.75); padding: 8px 12px; border-radius: 6px; }
#hud-channel { font-size: 14px; font-weight: bold; color: #fff; }
#hud-source { font-size: 10px; color: #aaa; margin-top: 2px; }
.hud-badge { display: inline-block; background: rgba(0,0,0,0.75); padding: 6px 10px; border-radius: 4px; font-size: 10px; color: #fff; margin-bottom: 4px; }
.hud-badge.accent { background: rgba(0, 212, 255, 0.3); border: 1px solid #00d4ff; color: #00d4ff; }

/* Loading */
#loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a12; display: -webkit-box; display: -webkit-flex; display: -ms-flexbox; display: flex; -webkit-align-items: center; -ms-flex-align: center; align-items: center; -webkit-justify-content: center; -ms-flex-pack: center; justify-content: center; z-index: 9999; }
#loading.hidden { display: none; }
.spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite; }
@-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
@keyframes spin { to { transform: rotate(360deg); } }

@media screen and (max-width: 800px) {
    #main { -webkit-flex-direction: column; -ms-flex-direction: column; flex-direction: column; }
    #sidebar { width: 100%; max-width: none; height: 40%; border-right: none; border-bottom: 1px solid #333; }
    #content { height: 60%; }
}
</style>
</head>

        </div>

    <div id="status-bar">
        <div id="status-left">Cargando...</div>

(function() {
    'use strict';

    var filteredChannels = [];
    var selectedIndex = 0;
    var currentCategory = 'all';
    var isPlaying = false;
    var isFullscreen = false;
    var currentChannel = null;

    function $(id) { return document.getElementById(id); }
    function trim(t) { return String(t || '').replace(/^\s+|\s+$/g, ''); }
    function lower(t) { return trim(t).toLowerCase(); }

    function updateStatus(t) { $('status-left').textContent = t; }
    function updateCount() { $('status-right').textContent = filteredChannels.length + ' canales'; }

    function updateNowPlaying(ch) {
        $('now-playing-title').textContent = ch ? ch.name : '--';
        $('now-playing-meta').textContent = ch ? ch.country + ' Premium' : 'Selecciona un canal';
        $('hud-channel').textContent = ch ? ch.name : '--';
        $('hud-source').textContent = ch ? ch.country : '--';
    }

    function showOverlay(show) {
        if (show) $('player-overlay').classList.remove('hidden');
        else $('player-overlay').classList.add('hidden');
    }

    function updatePlayBtn(playing) {
        $('btn-play').innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
        if (playing) $('btn-play').classList.add('playing');
        else $('btn-play').classList.remove('playing');
    }

    function renderChannel(ch, idx, sel) {
        var cls = sel ? 'channel selected focused' : 'channel';
        return '<div class="' + cls + '" data-idx="' + idx + '" tabindex="0">' +
            '<div class="channel-index">' + (idx + 1) + '</div>' +
            '<div class="channel-info">' +
            '<div class="channel-name">' + ch.name + '</div>' +
            '<div class="channel-meta">' + ch.country + ' Premium</div>' +
            '</div>' +
            '<div class="channel-badge">' + ch.country + '</div>' +
            '</div>';
    }

    function renderChannels() {
        var list = $('channel-list');
        if (!filteredChannels.length) {
            list.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">Sin canales</div>';
            updateCount();
            return;
        }
        var html = '';
        for (var i = 0; i < filteredChannels.length; i++) {
            html += renderChannel(filteredChannels[i], i, i === selectedIndex);
        }
        list.innerHTML = html;
        updateCount();
        scrollToSelected();
    }

    function scrollToSelected() {
        var node = $('channel-list').querySelector('.channel.selected');
        if (node) {
            var c = $('channel-list');
            var top = node.offsetTop, bottom = top + node.offsetHeight;
            var viewTop = c.scrollTop, viewBottom = viewTop + c.clientHeight;
            if (top < viewTop) c.scrollTop = top - 4;
            else if (bottom > viewBottom) c.scrollTop = bottom - c.clientHeight + 4;
            try { node.focus(); } catch(e) {}
        }
    }

    function current() {
        if (!filteredChannels.length) return null;
        if (selectedIndex < 0) selectedIndex = 0;
        if (selectedIndex >= filteredChannels.length) selectedIndex = filteredChannels.length - 1;
        return filteredChannels[selectedIndex];
    }

    function select(idx) {
        if (!filteredChannels.length) return;
        if (idx < 0) idx = filteredChannels.length - 1;
        if (idx >= filteredChannels.length) idx = 0;
        selectedIndex = idx;
        renderChannels();
        $('overlay-title').textContent = current() ? current().name : '--';
        updateStatus('Seleccionado: ' + (current() ? current().name : '--'));
    }

    function play(ch) {
        if (!ch) return;
        currentChannel = ch;
        isPlaying = true;
        showOverlay(false);
        updateNowPlaying(ch);
        updatePlayBtn(true);
        updateStatus('Reproduciendo: ' + ch.name);
        
        // Simular stream (en produccion usar URL real)
        var video = $('video');
        video.src = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'; // Stream de prueba
        video.load();
        try { video.play(); } catch(e) {
            video.muted = true;
            try { video.play(); } catch(e2) {}
        }
    }

    function stop() {
        isPlaying = false;
        var v = $('video');
        try { v.pause(); } catch(e) {}
        v.src = '';
        v.load();
        showOverlay(true);
        updatePlayBtn(false);
    }

    function togglePlay() {
        var v = $('video');
        if (v.paused) { try { v.play(); updatePlayBtn(true); } catch(e) {} }
        else { try { v.pause(); updatePlayBtn(false); } catch(e) {} }
    }

    function goFullscreen() {
        isFullscreen = true;
        document.body.className = 'fullscreen';
        var v = $('video');
        try { if (v.requestFullscreen) v.requestFullscreen(); else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen(); } catch(e) {}
    }

    function exitFullscreen() {
        isFullscreen = false;
        document.body.className = '';
        try { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); } catch(e) {}
    }

    function toggleFS() { if (isFullscreen) exitFullscreen(); else goFullscreen(); }

    function filterByCategory(cat) {
        currentCategory = cat;
        if (cat === 'all') filteredChannels = ALL_CHANNELS.slice();
        else filteredChannels = ALL_CHANNELS.filter(function(c) { return c.country === cat; });
        selectedIndex = 0;
        renderChannels();
        
        // Update tabs
        var tabs = document.querySelectorAll('.cat-tab');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].classList.remove('active');
            if (tabs[i].getAttribute('data-cat') === cat) tabs[i].classList.add('active');
        }
    }

    function filterBySearch(q) {
        var query = lower(q);
        var base = currentCategory === 'all' ? ALL_CHANNELS : ALL_CHANNELS.filter(function(c) { return c.country === currentCategory; });
        if (!query) filteredChannels = base;
        else filteredChannels = base.filter(function(c) { return lower(c.name).indexOf(query) !== -1; });
        selectedIndex = 0;
        renderChannels();
    }

    function handleKey(e) {
        var k = e.keyCode || e.which;
        var handled = false;

        if (isFullscreen) {
            switch(k) {
                case 8: case 27: case 461: exitFullscreen(); handled = true; break;
                case 38: select(selectedIndex - 1); setTimeout(function() { play(current()); }, 100); handled = true; break;
                case 40: select(selectedIndex + 1); setTimeout(function() { play(current()); }, 100); handled = true; break;
                case 13: case 32: togglePlay(); handled = true; break;
            }
        } else {
            switch(k) {
                case 38: select(selectedIndex - 1); handled = true; break;
                case 40: select(selectedIndex + 1); handled = true; break;
                case 13: case 32: play(current()); handled = true; break;
                case 191: case 83: $('search').focus(); handled = true; break;
                case 49: case 50: case 51: case 52: case 53: case 54: case 55: case 56: case 57:
                    select(Math.floor(filteredChannels.length * (k - 48) / 10)); handled = true; break;
            }
        }
        if (handled) { e.preventDefault(); return false; }
    }

    function init() {
        // Cargar canales
        filteredChannels = ALL_CHANNELS.slice();
        renderChannels();
        $('loading').classList.add('hidden');
        updateStatus('Listo - ' + ALL_CHANNELS.length + ' canales premium');

        // Keyboard
        document.addEventListener('keydown', handleKey);

        // Search
        $('search').addEventListener('input', function() { filterBySearch(this.value); });
        $('search').addEventListener('keydown', function(e) {
            if (e.keyCode === 27) { this.value = ''; filterBySearch(''); this.blur(); }
            if (e.keyCode === 40) { this.blur(); scrollToSelected(); }
        });
        $('search-clear').addEventListener('click', function() { $('search').value = ''; filterBySearch(''); $('search').focus(); });

        // Category tabs
        var tabs = document.querySelectorAll('.cat-tab');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].addEventListener('click', function() {
                filterByCategory(this.getAttribute('data-cat'));
            });
        }

        // Channel list click
        $('channel-list').addEventListener('click', function(e) {
            var t = e.target;
            while (t && t !== this) {
                if (t.className && t.className.indexOf('channel') !== -1) {
                    var idx = parseInt(t.getAttribute('data-idx'), 10);
                    selectedIndex = idx;
                    renderChannels();
                    play(current());
                    return;
                }
                t = t.parentNode;
            }
        });

        // Controls
        $('btn-play').addEventListener('click', togglePlay);
        $('btn-prev').addEventListener('click', function() { select(selectedIndex - 1); play(current()); });
        $('btn-next').addEventListener('click', function() { select(selectedIndex + 1); play(current()); });
        $('btn-fs').addEventListener('click', toggleFS);

        // Video click
        $('video').addEventListener('click', function() { if (isPlaying) goFullscreen(); });

        // Fullscreen change
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement && isFullscreen) exitFullscreen();
        });
    }

    if (document.readyState === 'complete') setTimeout(init, 1);
    else document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
