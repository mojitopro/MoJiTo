<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MoJiTo TV</title>
<style type="text/css">
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    color: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
}

/* ====== MODO NORMAL - LAYOUT CON REPRODUCTOR FIJO ====== */
#app {
    width: 100%;
    height: 100%;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-flex-direction: column;
    -ms-flex-direction: column;
    flex-direction: column;
}

/* Header */
#header {
    height: 40px;
    background: linear-gradient(180deg, #1a1a2e, #0f0f1a);
    background: -webkit-linear-gradient(top, #1a1a2e, #0f0f1a);
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid #333;
    -webkit-flex-shrink: 0;
    -ms-flex-negative: 0;
    flex-shrink: 0;
}

#header-title {
    font-size: 16px;
    font-weight: bold;
    color: #00d4ff;
    letter-spacing: 2px;
}

#header-status {
    margin-left: auto;
    font-size: 11px;
    color: #888;
}

/* Main container */
#main {
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
    min-height: 0;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    overflow: hidden;
}

/* Sidebar - Lista de canales */
#sidebar {
    width: 340px;
    min-width: 280px;
    max-width: 420px;
    background: #12121a;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-flex-direction: column;
    -ms-flex-direction: column;
    flex-direction: column;
    border-right: 1px solid #333;
}

#sidebar-header {
    padding: 10px 12px;
    background: #1a1a28;
    border-bottom: 1px solid #333;
    -webkit-flex-shrink: 0;
    -ms-flex-negative: 0;
    flex-shrink: 0;
}

#sidebar-title {
    font-size: 12px;
    color: #00d4ff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

#search-box {
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
}

#search {
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
    height: 32px;
    padding: 0 10px;
    background: #0a0a12;
    border: 1px solid #333;
    border-radius: 4px;
    color: #fff;
    font-size: 13px;
    outline: none;
}

#search:focus {
    border-color: #00d4ff;
}

#search-clear {
    width: 32px;
    height: 32px;
    margin-left: 6px;
    background: #2a2a3a;
    border: 1px solid #444;
    border-radius: 4px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
}

#channel-list {
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px;
}

/* Canal item */
.channel {
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    padding: 10px 12px;
    margin-bottom: 4px;
    background: #1a1a28;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    transition: none;
}

.channel:hover {
    background: #252538;
}

.channel.selected {
    background: #00d4ff;
    background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
    border-color: #00d4ff;
}

.channel.selected .channel-name {
    color: #000;
}

.channel.selected .channel-meta {
    color: #003344;
}

.channel.focused {
    border-color: #ffcc00;
    box-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
}

.channel-index {
    width: 36px;
    height: 36px;
    min-width: 36px;
    background: #2a2a3a;
    border-radius: 4px;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-justify-content: center;
    -ms-flex-pack: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    margin-right: 10px;
}

.channel.selected .channel-index {
    background: #fff;
    color: #00d4ff;
}

.channel-info {
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
    min-width: 0;
    overflow: hidden;
}

.channel-name {
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.channel-meta {
    font-size: 10px;
    color: #888;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.channel-badge {
    padding: 3px 6px;
    background: #2a4a3a;
    border-radius: 3px;
    font-size: 9px;
    color: #00ff88;
    text-transform: uppercase;
}

.channel.selected .channel-badge {
    background: #003322;
    color: #00ff88;
}

/* Content area - REPRODUCTOR FIJO */
#content {
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
    min-width: 0;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-flex-direction: column;
    -ms-flex-direction: column;
    flex-direction: column;

}

/* REPRODUCTOR SIEMPRE VISIBLE */
#player-container {
    position: relative;
    width: 100%;
    background: #000;
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
    min-height: 0;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-justify-content: center;
    -ms-flex-pack: center;
    justify-content: center;
}

#video {
    width: 100%;
    height: 100%;
    background: #000;
    object-fit: contain;
}

/* Overlay cuando no hay video */
#player-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-flex-direction: column;
    -ms-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-justify-content: center;
    -ms-flex-pack: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

#player-overlay.hidden {
    display: none;
}

#overlay-icon {
    width: 80px;
    height: 80px;
    background: #1a1a28;
    border-radius: 50%;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-justify-content: center;
    -ms-flex-pack: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 36px;
    color: #00d4ff;
}

#overlay-title {
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
}

#overlay-subtitle {
    font-size: 12px;
    color: #888;
    margin-bottom: 15px;
}

#overlay-hint {
    font-size: 11px;
    color: #00d4ff;
    background: rgba(0, 212, 255, 0.1);
    padding: 8px 16px;
    border-radius: 20px;
}

/* Info bar debajo del video */
#player-info {
    background: #12121a;
    padding: 10px 15px;
    border-top: 1px solid #333;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-flex-shrink: 0;
    -ms-flex-negative: 0;
    flex-shrink: 0;
}

#now-playing {
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
    min-width: 0;
}

#now-playing-title {
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

#now-playing-meta {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
}

#player-controls {
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    margin-left: 15px;
}

.control-btn {
    width: 40px;
    height: 40px;
    background: #2a2a3a;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    margin-left: 8px;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-justify-content: center;
    -ms-flex-pack: center;
    justify-content: center;
}

.control-btn:first-child {
    margin-left: 0;
}

.control-btn:hover {
    background: #3a3a4a;
}

.control-btn.primary {
    background: #00d4ff;
    color: #000;
}

.control-btn.primary:hover {
    background: #00b8e0;
}

/* Status bar */
#status-bar {
    height: 28px;
    background: #0f0f1a;
    border-top: 1px solid #333;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    padding: 0 15px;
    font-size: 10px;
    color: #666;
    -webkit-flex-shrink: 0;
    -ms-flex-negative: 0;
    flex-shrink: 0;
}

#status-left {
    -webkit-flex: 1;
    -ms-flex: 1;
    flex: 1;
}

#status-right {
    color: #00d4ff;
}

/* ====== MODO FULLSCREEN ====== */
body.fullscreen {
    background: #000;
}

body.fullscreen #app {
    background: #000;
}

body.fullscreen #header,
body.fullscreen #sidebar,
body.fullscreen #player-info,
body.fullscreen #status-bar {
    display: none !important;
}

body.fullscreen #main {
    padding: 0;
}

body.fullscreen #content {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
}

body.fullscreen #player-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
}

/* HUD en fullscreen */
#player-hud {
    position: absolute;
    top: 15px;
    left: 15px;
    right: 15px;
    display: none;
    -webkit-justify-content: space-between;
    -ms-flex-pack: justify;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
}

body.fullscreen #player-hud {
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
}

#hud-left {
    background: rgba(0,0,0,0.7);
    padding: 10px 15px;
    border-radius: 8px;
}

#hud-channel {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}

#hud-source {
    font-size: 11px;
    color: #aaa;
    margin-top: 3px;
}

#hud-right {
    text-align: right;
}

.hud-badge {
    display: inline-block;
    background: rgba(0,0,0,0.7);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 11px;
    color: #fff;
    margin-bottom: 5px;
}

.hud-badge.accent {
    background: rgba(0, 212, 255, 0.3);
    border: 1px solid #00d4ff;
    color: #00d4ff;
}

/* Loading */
#loading {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #0a0a12;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-justify-content: center;
    -ms-flex-pack: center;
    justify-content: center;
    z-index: 9999;
}

#loading.hidden {
    display: none;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 3px solid #333;
    border-top-color: #00d4ff;
    border-radius: 50%;
    -webkit-animation: spin 1s linear infinite;
    animation: spin 1s linear infinite;
}

@-webkit-keyframes spin {
    to { -webkit-transform: rotate(360deg); }
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Responsive */
@media screen and (max-width: 900px) {
    #main {
        -webkit-flex-direction: column;
        -ms-flex-direction: column;
        flex-direction: column;
    }
    #sidebar {
        width: 100%;
        max-width: none;
        height: 45%;
        border-right: none;
        border-bottom: 1px solid #333;
    }
    #content {
        height: 55%;
    }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
    <div class="spinner"></div>
</div>

<div id="app">
    <!-- Header -->
    <div id="header">
        <div id="header-title">MOJITO TV</div>
        <div id="header-status">Premium On Demand</div>
    </div>

    <!-- Main -->
    <div id="main">
        <!-- Sidebar -->
        <div id="sidebar">
            <div id="sidebar-header">
                <div id="sidebar-title">Canales</div>
                <div id="search-box">
                    <input type="text" id="search" placeholder="Buscar canal...">
                    <button id="search-clear">X</button>
                </div>
            </div>
            <div id="channel-list"></div>
        </div>

        <!-- Content - REPRODUCTOR FIJO -->
        <div id="content">
            <div id="player-container">
                <video id="video" preload="auto" playsinline webkit-playsinline></video>
                
                <!-- Overlay cuando no hay video reproduciendose -->
                <div id="player-overlay">
                    <div id="overlay-icon">&#9654;</div>
                    <div id="overlay-title">Selecciona un canal</div>
                    <div id="overlay-subtitle">Usa UP/DOWN para navegar</div>
                    <div id="overlay-hint">OK para reproducir | BACK para fullscreen</div>
                </div>

                <!-- HUD en fullscreen -->
                <div id="player-hud">
                    <div id="hud-left">
                        <div id="hud-channel">--</div>
                        <div id="hud-source">--</div>
                    </div>
                    <div id="hud-right">
                        <div class="hud-badge accent" id="hud-latency">--</div>
                        <div class="hud-badge" id="hud-quality">HD</div>
                    </div>
                </div>
            </div>

            <!-- Info bar -->
            <div id="player-info">
                <div id="now-playing">
                    <div id="now-playing-title">--</div>
                    <div id="now-playing-meta">Selecciona un canal para comenzar</div>
                </div>
                <div id="player-controls">
                    <button class="control-btn" id="btn-prev" title="Canal anterior">&#9664;</button>
                    <button class="control-btn primary" id="btn-play" title="Play/Pause">&#9654;</button>
                    <button class="control-btn" id="btn-next" title="Canal siguiente">&#9654;</button>
                    <button class="control-btn" id="btn-fullscreen" title="Pantalla completa">&#x26F6;</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
        <div id="status-left">UP/DOWN navegar | OK reproducir | BACK fullscreen</div>
        <div id="status-right">0 canales</div>
    </div>
</div>

<script type="text/javascript">
/* MoJiTo TV - Estilo IPTV Smarters Pro */
/* ES5 Compatible */

(function() {
    'use strict';

    // Variables
    var API = window.location.protocol + '//' + window.location.host;
    var allChannels = [];
    var filteredChannels = [];
    var selectedIndex = 0;
    var isPlaying = false;
    var isFullscreen = false;
    var currentChannel = null;
    var currentSources = [];
    var currentSourceIndex = 0;
    var watchdog = null;
    var retryCount = 0;

    // DOM
    function $(id) { return document.getElementById(id); }

    // Utilidades
    function trim(t) { return String(t || '').replace(/^\s+|\s+$/g, ''); }
    function lower(t) { return trim(t).toLowerCase(); }
    function esc(t) {
        return String(t || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function prettyName(t) {
        var v = trim(t);
        if (!v) return '';
        var sp = { hbo:'HBO', hd:'HD', sd:'SD', tv:'TV', '4k':'4K', uhd:'UHD' };
        var parts = v.split(/\s+/);
        var out = [];
        for (var i = 0; i < parts.length; i++) {
            var p = parts[i];
            var l = p.toLowerCase();
            if (sp[l]) out.push(sp[l]);
            else out.push(p.charAt(0).toUpperCase() + p.slice(1).toLowerCase());
        }
        return out.join(' ');
    }

    // Canal helpers
    function chName(ch) {
        if (!ch) return '';
        return ch.name || ch.title || ch.channel || '';
    }

    function chLatency(ch) {
        if (!ch) return null;
        var v = Number(ch.best_latency_ms || ch.latency_ms);
        if (!isFinite(v) || v <= 0) return null;
        if (v >= 900) return null;
        if (v < 10) v = v * 1000;
        return Math.round(v);
    }

    function latencyStr(ms) {
        if (ms === null) return '--';
        return ms < 1000 ? ms + 'ms' : (ms/1000).toFixed(1) + 's';
    }

    function chCategory(ch) {
        return (ch && ch.category) || 'premium';
    }

    function chHost(ch) {
        var url = ch && (ch.url || ch.best_url) || '';
        if (!url && ch && ch.fallbacks && ch.fallbacks[0]) url = ch.fallbacks[0];
        if (!url) return '';
        try {
            var a = document.createElement('a');
            a.href = url;
            return a.hostname || url.substring(0, 25);
        } catch(e) { return url.substring(0, 25); }
    }

    function collectSources(ch) {
        var list = [];
        function add(u) {
            var parts = String(u || '').split('|');
            for (var i = 0; i < parts.length; i++) {
                var p = trim(parts[i]);
                if (p && p.length > 8) {
                    var exists = false;
                    for (var j = 0; j < list.length; j++) {
                        if (list[j] === p) { exists = true; break; }
                    }
                    if (!exists) list.push(p);
                }
            }
        }
        if (ch && ch.stream) {
            add(ch.stream.url);
            add(ch.stream.best_url);
            if (ch.stream.fallbacks) {
                for (var k = 0; k < ch.stream.fallbacks.length; k++) {
                    add(ch.stream.fallbacks[k]);
                }
            }
        }
        add(ch && ch.url);
        add(ch && ch.best_url);
        if (ch && ch.fallbacks) {
            for (var k = 0; k < ch.fallbacks.length; k++) {
                add(ch.fallbacks[k]);
            }
        }
        return list;
    }

    // UI Updates
    function updateStatus(text) {
        $('status-left').textContent = text;
    }

    function updateNowPlaying(ch) {
        var name = ch ? prettyName(chName(ch)) : '--';
        var meta = ch ? (chCategory(ch).toUpperCase() + ' | ' + latencyStr(chLatency(ch))) : 'Selecciona un canal';
        
        $('now-playing-title').textContent = name;
        $('now-playing-meta').textContent = meta;
        $('hud-channel').textContent = name;
        $('hud-source').textContent = ch ? (chHost(ch) || 'directo') : '--';
        $('hud-latency').textContent = latencyStr(chLatency(ch));
    }

    function showOverlay(show) {
        var overlay = $('player-overlay');
        if (show) {
            overlay.classList.remove('hidden');
        } else {
            overlay.classList.add('hidden');
        }
    }

    function updateOverlay(ch) {
        if (ch) {
            $('overlay-title').textContent = prettyName(chName(ch));
            $('overlay-subtitle').textContent = chCategory(ch).toUpperCase() + ' | ' + latencyStr(chLatency(ch));
            $('overlay-hint').textContent = 'OK para reproducir';
        } else {
            $('overlay-title').textContent = 'Selecciona un canal';
            $('overlay-subtitle').textContent = 'Usa UP/DOWN para navegar';
            $('overlay-hint').textContent = 'OK para reproducir | BACK para fullscreen';
        }
    }

    // Channel list
    function renderChannel(ch, idx, selected) {
        var name = prettyName(chName(ch));
        var cat = chCategory(ch).toUpperCase();
        var lat = latencyStr(chLatency(ch));
        var cls = selected ? 'channel selected focused' : 'channel';

        var html = '<div class="' + cls + '" data-idx="' + idx + '" tabindex="0">';
        html += '<div class="channel-index">' + (idx + 1) + '</div>';
        html += '<div class="channel-info">';
        html += '<div class="channel-name">' + esc(name) + '</div>';
        html += '<div class="channel-meta">' + esc(cat) + ' | ' + esc(lat) + '</div>';
        html += '</div>';
        html += '<div class="channel-badge">' + esc(lat) + '</div>';
        html += '</div>';
        return html;
    }

    function renderChannels() {
        var list = $('channel-list');
        
        if (!filteredChannels.length) {
            list.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">Sin canales</div>';
            $('status-right').textContent = '0 canales';
            return;
        }

        var html = '';
        for (var i = 0; i < filteredChannels.length; i++) {
            html += renderChannel(filteredChannels[i], i, i === selectedIndex);
        }
        list.innerHTML = html;
        $('status-right').textContent = filteredChannels.length + ' canales';

        // Scroll to selected
        var node = list.querySelector('.channel.selected');
        if (node) {
            ensureVisible(node, list);
            try { node.focus(); } catch(e) {}
        }
    }

    function ensureVisible(node, container) {
        if (!node || !container) return;
        try {
            var top = node.offsetTop;
            var bottom = top + node.offsetHeight;
            var viewTop = container.scrollTop;
            var viewBottom = viewTop + container.clientHeight;
            if (top < viewTop) container.scrollTop = top - 5;
            else if (bottom > viewBottom) container.scrollTop = bottom - container.clientHeight + 5;
        } catch(e) {}
    }

    function currentItem() {
        if (!filteredChannels.length) return null;
        if (selectedIndex < 0) selectedIndex = 0;
        if (selectedIndex >= filteredChannels.length) selectedIndex = filteredChannels.length - 1;
        return filteredChannels[selectedIndex];
    }

    function selectChannel(idx) {
        if (!filteredChannels.length) return;
        if (idx < 0) idx = filteredChannels.length - 1;
        if (idx >= filteredChannels.length) idx = 0;
        selectedIndex = idx;
        renderChannels();
        updateOverlay(currentItem());
        updateStatus('Seleccionado: ' + prettyName(chName(currentItem())));
    }

    // Video playback
    function playChannel(ch) {
        if (!ch) return;

        currentChannel = ch;
        currentSources = collectSources(ch);
        currentSourceIndex = 0;
        retryCount = 0;

        if (!currentSources.length) {
            updateStatus('Sin fuentes para: ' + chName(ch));
            return;
        }

        showOverlay(false);
        updateNowPlaying(ch);
        isPlaying = true;
        startPlayback(0);
    }

    function startPlayback(srcIdx) {
        var video = $('video');
        
        if (!currentSources.length || srcIdx >= currentSources.length) {
            updateStatus('Sin fuentes disponibles');
            return;
        }

        if (watchdog) clearTimeout(watchdog);
        currentSourceIndex = srcIdx;

        video.onplaying = function() {
            if (watchdog) clearTimeout(watchdog);
            retryCount = 0;
            updateStatus('Reproduciendo: ' + prettyName(chName(currentChannel)));
            updatePlayButton(true);
        };

        video.onerror = function() {
            nextSource('error');
        };

        video.onended = function() {
            // Reintentar para live streams
            setTimeout(function() {
                if (isPlaying) startPlayback(currentSourceIndex);
            }, 2000);
        };

        video.src = currentSources[srcIdx];
        video.load();

        watchdog = setTimeout(function() {
            if (isPlaying && currentSourceIndex === srcIdx) {
                nextSource('timeout');
            }
        }, 10000);

        try {
            var p = video.play();
            if (p && p.catch) {
                p.catch(function() {
                    video.muted = true;
                    var r = video.play();
                    if (r && r.catch) r.catch(function() { nextSource('retry'); });
                });
            }
        } catch(e) {
            nextSource('play-error');
        }
    }

    function nextSource(reason) {
        if (watchdog) clearTimeout(watchdog);
        
        if (currentSourceIndex + 1 < currentSources.length) {
            updateStatus('Cambiando fuente... (' + reason + ')');
            startPlayback(currentSourceIndex + 1);
        } else {
            retryCount++;
            if (retryCount < 3) {
                updateStatus('Reintentando... (' + retryCount + '/3)');
                setTimeout(function() { startPlayback(0); }, 2000);
            } else {
                updateStatus('Error: sin fuente disponible');
            }
        }
    }

    function stopPlayback() {
        isPlaying = false;
        var video = $('video');
        try { video.pause(); } catch(e) {}
        video.src = '';
        video.load();
        if (watchdog) clearTimeout(watchdog);
        showOverlay(true);
        updatePlayButton(false);
    }

    function togglePlayPause() {
        var video = $('video');
        if (video.paused) {
            try { video.play(); updatePlayButton(true); } catch(e) {}
        } else {
            try { video.pause(); updatePlayButton(false); } catch(e) {}
        }
    }

    function updatePlayButton(playing) {
        $('btn-play').innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
    }

    // Fullscreen
    function enterFullscreen() {
        isFullscreen = true;
        document.body.className = 'fullscreen';
        
        var video = $('video');
        try {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
            else if (video.mozRequestFullScreen) video.mozRequestFullScreen();
        } catch(e) {}
    }

    function exitFullscreen() {
        isFullscreen = false;
        document.body.className = '';
        
        try {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
        } catch(e) {}
    }

    function toggleFullscreen() {
        if (isFullscreen) {
            exitFullscreen();
        } else {
            enterFullscreen();
        }
    }

    // Search
    function applyFilter(q) {
        var query = lower(q);
        if (!query) {
            filteredChannels = allChannels.slice();
        } else {
            filteredChannels = [];
            for (var i = 0; i < allChannels.length; i++) {
                if (lower(chName(allChannels[i])).indexOf(query) !== -1) {
                    filteredChannels.push(allChannels[i]);
                }
            }
        }
        selectedIndex = 0;
        renderChannels();
    }

    // Load channels
    function loadChannels() {
        $('loading').classList.remove('hidden');
        updateStatus('Cargando canales...');

        var url = API + '/api/channels?premium=1&sort=latency&limit=500';
        
        try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.timeout = 30000;

            xhr.onload = function() {
                $('loading').classList.add('hidden');
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var channels = data.channels || [];
                        allChannels = [];
                        for (var i = 0; i < channels.length; i++) {
                            if (channels[i] && chName(channels[i])) {
                                allChannels.push(channels[i]);
                            }
                        }
                        filteredChannels = allChannels.slice();
                        renderChannels();
                        updateStatus('Listo - ' + allChannels.length + ' canales');
                    } catch(e) {
                        updateStatus('Error parseando datos');
                    }
                } else {
                    updateStatus('Error HTTP ' + xhr.status);
                }
            };

            xhr.onerror = function() {
                $('loading').classList.add('hidden');
                updateStatus('Error de red');
            };

            xhr.ontimeout = function() {
                $('loading').classList.add('hidden');
                updateStatus('Timeout');
            };

            xhr.send();
        } catch(e) {
            $('loading').classList.add('hidden');
            updateStatus('Error: ' + e.message);
        }
    }

    // Keyboard handler
    function handleKey(e) {
        var key = e.keyCode || e.which;
        var handled = false;

        // Si esta en fullscreen
        if (isFullscreen) {
            switch(key) {
                case 8:   // BACK
                case 27:  // ESC
                case 461: // BACK TV
                    exitFullscreen();
                    handled = true;
                    break;
                case 38: // UP - canal anterior
                    selectChannel(selectedIndex - 1);
                    setTimeout(function() { playChannel(currentItem()); }, 100);
                    handled = true;
                    break;
                case 40: // DOWN - canal siguiente
                    selectChannel(selectedIndex + 1);
                    setTimeout(function() { playChannel(currentItem()); }, 100);
                    handled = true;
                    break;
                case 13: // OK
                case 32: // SPACE
                    togglePlayPause();
                    handled = true;
                    break;
            }
        }
        // Modo normal
        else {
            switch(key) {
                case 38: // UP
                    selectChannel(selectedIndex - 1);
                    handled = true;
                    break;
                case 40: // DOWN
                    selectChannel(selectedIndex + 1);
                    handled = true;
                    break;
                case 13: // OK
                case 32: // SPACE
                    playChannel(currentItem());
                    handled = true;
                    break;
                case 191: // /
                case 83: // S
                    $('search').focus();
                    handled = true;
                    break;
                case 49: case 50: case 51: case 52: case 53:
                case 54: case 55: case 56: case 57: // 1-9
                    var jump = key - 48;
                    selectChannel(Math.floor(filteredChannels.length * jump / 10));
                    handled = true;
                    break;
            }
        }

        if (handled) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    }

    // Init
    function init() {
        // Keyboard
        document.addEventListener('keydown', handleKey);

        // Search
        $('search').addEventListener('input', function() {
            applyFilter(this.value);
        });
        $('search').addEventListener('keydown', function(e) {
            if (e.keyCode === 27) {
                this.value = '';
                applyFilter('');
                this.blur();
            }
            if (e.keyCode === 40) {
                this.blur();
                var ch = $('channel-list').querySelector('.channel.selected');
                if (ch) ch.focus();
            }
        });
        $('search-clear').addEventListener('click', function() {
            $('search').value = '';
            applyFilter('');
            $('search').focus();
        });

        // Channel list click
        $('channel-list').addEventListener('click', function(e) {
            var target = e.target;
            while (target && target !== this) {
                if (target.className && target.className.indexOf('channel') !== -1) {
                    var idx = parseInt(target.getAttribute('data-idx'), 10);
                    selectedIndex = idx;
                    renderChannels();
                    playChannel(currentItem());
                    return;
                }
                target = target.parentNode;
            }
        });

        // Control buttons
        $('btn-play').addEventListener('click', togglePlayPause);
        $('btn-prev').addEventListener('click', function() {
            selectChannel(selectedIndex - 1);
            playChannel(currentItem());
        });
        $('btn-next').addEventListener('click', function() {
            selectChannel(selectedIndex + 1);
            playChannel(currentItem());
        });
        $('btn-fullscreen').addEventListener('click', toggleFullscreen);

        // Video click
        $('video').addEventListener('click', function() {
            if (isPlaying && !isFullscreen) {
                enterFullscreen();
            }
        });

        // Fullscreen change
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement && isFullscreen) {
                exitFullscreen();
            }
        });

        loadChannels();
    }

    if (document.readyState === 'complete') {
        setTimeout(init, 1);
    } else {
        document.addEventListener('DOMContentLoaded', init);
    }

})();
</script>
</body>
</html>
