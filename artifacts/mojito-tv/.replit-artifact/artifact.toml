kind = "web"
previewPath = "/"
title = "MoJiTo TV"
version = "1.0.0"
id = "artifacts/mojito-tv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19656

[services.development]
run = "pnpm --filter @workspace/mojito-tv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mojito-tv", "run", "build" ]
publicDir = "artifacts/mojito-tv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19656"
BASE_PATH = "/"
