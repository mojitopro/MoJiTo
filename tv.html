<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; }
        #video { width: 100%; height: 100%; display: none; object-fit: contain; }
        .menu { padding: 15px; }
        .logo { font-size: 28px; text-align: center; margin: 10px 0; }
        .logo span { color: #dc143c; text-shadow: 0 0 10px #dc143c; }
        .msg { text-align: center; color: #dc143c; min-height: 20px; margin: 10px 0; font-size: 14px; }
        .list { height: 60vh; overflow-y: auto; }
        .ch { padding: 14px; border-bottom: 1px solid #222; color: #aaa; font-size: 14px; }
        .ch.focused { background: #222; border-left: 4px solid #dc143c; }
        .btn { padding: 12px 20px; background: #8b0000; border: none; color: #fff; font-size: 14px; margin: 5px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<video id="video" controls playsinline style="width:100%;height:100%;"></video>

<div id="menu" class="menu">
    <div class="logo"><span>MoJiTo</span> TV</div>
    <div class="msg" id="msg">↑↓ navegar | ENTER reproducir</div>
    <div class="list" id="list"></div>
    <div style="margin-top:10px;">
        <button class="btn" onclick="prev()">◀ ANTERIOR</button>
        <button class="btn" onclick="play()">▶ PLAY</button>
        <button class="btn" onclick="next()">SIGUIENTE ▶</button>
        <button class="btn" onclick="stop()">■ STOP</button>
    </div>
</div>

<script>
var allStreams = [], hlsStreams = [], idx = 0;
var video = document.getElementById('video');
var menu = document.getElementById('menu');
var elMsg = document.getElementById('msg');
var elList = document.getElementById('list');
var focusedIdx = 0;

fetch('/api/premium').then(r=>r.json()).then(d=>{
    allStreams = d.channels || [];
    // Separar HLS de Astra
    hlsStreams = allStreams.filter(s => s.url && s.url.indexOf('.m3u8') > 0);
    elMsg.textContent = hlsStreams.length + ' canales HLS - ↑↓ navegar';
    render();
});

function render() {
    var html = '';
    for(var i=0; i<hlsStreams.length; i++) {
        var active = (i === focusedIdx) ? 'focused' : '';
        html += '<div class="ch ' + active + '" id="ch' + i + '">' + hlsStreams[i].name + '</div>';
    }
    elList.innerHTML = html;
    // Scroll into view
    var el = document.getElementById('ch' + focusedIdx);
    if(el) el.scrollIntoView({block: 'center'});
}

function play() {
    var ch = hlsStreams[focusedIdx];
    if(!ch || !ch.url) return;
    
    video.src = ch.url;
    video.style.display = 'block';
    menu.style.display = 'none';
    
    video.play().then(function() {
        elMsg.textContent = '▶ ' + ch.name;
    }).catch(function() {
        elMsg.textContent = 'Error: ' + ch.name;
    });
}

function stop() {
    video.pause();
    video.src = '';
    video.style.display = 'none';
    menu.style.display = 'block';
    elMsg.textContent = 'Detenido';
}

function prev() {
    focusedIdx = Math.max(0, focusedIdx - 1);
    idx = focusedIdx;
    render();
    elMsg.textContent = hlsStreams[focusedIdx] ? hlsStreams[focusedIdx].name : '';
}

function next() {
    focusedIdx = Math.min(hlsStreams.length - 1, focusedIdx + 1);
    idx = focusedIdx;
    render();
    elMsg.textContent = hlsStreams[focusedIdx] ? hlsStreams[focusedIdx].name : '';
}

// Keyboard - soporte para control remoto
document.addEventListener('keydown', function(e) {
    var k = e.keyCode;
    
    // Si video playing
    if(video.style.display === 'block') {
        if(k === 27) stop();  // ESC
        return;
    }
    
    // Navegar
    if(k === 38 || k === 33) {  // Up/PageUp
        e.preventDefault();
        prev();
    } else if(k === 40 || k === 34) {  // Down/PageDown
        e.preventDefault();
        next();
    } else if(k === 13) {  // Enter
        e.preventDefault();
        play();
    } else if(k === 27) {  // ESC
        e.preventDefault();
        stop();
    }
});

// Click en items
elList.addEventListener('click', function(e) {
    if(e.target.classList.contains('ch')) {
        var id = e.target.id;
        if(id.startsWith('ch')) {
            focusedIdx = parseInt(id.substring(2));
            render();
            play();
        }
    }
});
</script>
</body>
</html>
