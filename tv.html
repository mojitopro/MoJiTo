<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MoJiTo TV</title>
    <style>
        *{margin:0;padding:0}
        html,body{height:100%;background:#000;color:#fff;font-family:Arial}
        #video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
        #menu{padding:50px 10px;height:100%;display:flex;flex-direction:column;align-items:center}
        .logo{font-size:48px;font-weight:bold;text-align:center;margin-bottom:30px}
        .logo span{color:#dc143c;text-shadow:0 0 10px #ff0000}
        #in{font-size:32px;padding:20px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:20px;outline:none;width:100%;max-width:400px}
        #in.has-text{color:#fff}
        #msg{font-size:18px;padding:15px;color:#aaa;min-height:30px}
        .error{color:#ff0000}
        .info{color:#aaa}
        #results{display:block;width:100%;max-width:500px;height:300px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;font-size:18px;padding:10px}
        option{padding:10px;background:#1a1a1a;color:#aaa}
        option:checked,option:focus,option:selected{background:#dc143c;color:#fff}
        .hidden{display:none}
    </style>
</head>
<body>

<video id="video" controls></video>

<div id="menu">
    <div class="logo"><span>MoJiTo</span> TV</div>
    <input type="text" id="in" readonly placeholder="Escribe el canal...">
    <div id="msg">↑↓ navegar | ENTER reproducir</div>
    <select id="results" size="10" class="hidden"></select>
</div>

<script>
var BASE=window.location.protocol+'//'+window.location.host;
var API=BASE+'/api/search';
var streams=[], idx=0, txt='', mode='search', page=1, hasMore=false, loading=false;
var elIn=document.getElementById('in'), elSel=document.getElementById('results'), elMsg=document.getElementById('msg'), elMenu=document.getElementById('menu'), elVideo=document.getElementById('video');

function log(m,t){elMsg.textContent=m;elMsg.className=t||'info'}

function renderIn(){
    if(txt){
        elIn.value=txt;
        elIn.classList.add('has-text');
    }else{
        elIn.value='';
        elIn.placeholder='Escribe el canal...';
        elIn.classList.remove('has-text');
    }
}

function playStream(startIdx){
    var trial=0, max=5, s;
    function tryNext(){
        if(trial>=max||!(s=streams[startIdx+trial])){
            log('Sin stream v\u00e1lido');
            elVideo.style.display='none';
            elMenu.style.display='flex';
            return;
        }
        log('Probando '+(trial+1)+': '+s.title.substring(0,25));
        elVideo.dataset.idx=startIdx+trial;
        elVideo.src=s.url;
        elVideo.play().then(function(){log('Reproduciendo: '+s.title.substring(0,30));}).catch(function(){trial++;setTimeout(tryNext,800);});
    }
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.onerror=function(){trial++;setTimeout(tryNext,500);};
    tryNext();
}

function buscar(){
    if(!txt.trim())return;
    log('Buscando...');
    elSel.innerHTML='';streams=[];page=1;
    loadPage(1);
}

function loadPage(p){
    if(loading)return;
    loading=true;
    log('Cargando...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'?q='+encodeURIComponent(txt)+'&page='+p,true);
    x.onload=function(){
        loading=false;
        if(x.status===200){
            try{
                var d=JSON.parse(x.responseText);
                showStreams(d.streams||[],d.hasMore,p===1);
                if(p>1){idx=streams.length-d.streams.length;elSel.selectedIndex=idx;elSel.focus();}
            }catch(e){log('Error');}
        }
    };
    x.onerror=function(){loading=false;log('Sin conexi\u00f3n');};
    x.send();
}

function showStreams(data,more,isFirst){
    if(!data||!data.length){log('Sin resultados');return;}
    hasMore=more;
    if(isFirst){streams=data;idx=-1;elSel.innerHTML='';elSel.classList.remove('hidden');}
    data.forEach(function(s,i){
        var pos=isFirst?i:streams.length;
        var quality=s.title.match(/1080|4k/i)?' [1080p]':s.title.match(/720|hd/i)?' [HD]':s.title.match(/480|sd/i)?' [SD]':'';
        elSel.add(new Option((pos+1)+'. '+s.title.substring(0,50)+quality,pos));
        streams.push(s);
    });
    log(streams.length+' streams'+(hasMore?' - M\u00e1s':' - Fin'));
}

document.addEventListener('keydown',function(e){
    var k=e.key;
    if(elVideo.style.display==='block'){
        if(k==='Escape'){elVideo.pause();elVideo.style.display='none';elMenu.style.display='flex';log('Cerrado');}
        else if(k===' '){e.preventDefault();elVideo.paused?elVideo.play():elVideo.pause();}
        else if(k==='ArrowRight'){e.preventDefault();var n=parseInt(elVideo.dataset.idx)+1;n<streams.length?playStream(n):log('Fin lista');}
        else if(k==='ArrowLeft'){e.preventDefault();var p=parseInt(elVideo.dataset.idx)-1;p>=0?playStream(p):log('Inicio lista');}
        return;
    }
    if(k==='ArrowDown'){
        e.preventDefault();
        if(idx<streams.length-1){idx++;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log(streams[idx].title.substring(0,40));}
        else if(hasMore){page++;loadPage(page);log('Cargando m\u00e1s...');}
    }else if(k==='ArrowUp'){
        e.preventDefault();
        if(idx>0){idx--;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log(streams[idx].title.substring(0,40));}
    }else if(k==='Enter'){
        e.preventDefault();
        if(mode==='search'&&txt.length>0&&idx>=0&&streams[idx])playStream(idx);
        else if(mode==='search'){buscar();}
    }else if(k==='Backspace'){txt=txt.slice(0,-1);renderIn();idx=-1;elSel.innerHTML='';}
    else if(k.length===1){txt+=k;renderIn();}
});

renderIn();
</script>
</body>
</html>
