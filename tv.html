<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MoJiTo TV</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; touch-action: manipulation; }
        h1 { text-align: center; color: #0ff; margin: 10px 0; font-size: 24px; }
        #status { text-align: center; color: #f0f; min-height: 24px; margin: 10px 0; font-size: 14px; }
        .list { padding: 10px; }
        .ch { 
            background: #111; border: 2px solid #222; 
            padding: 20px; margin: 8px 0; 
            color: #888; font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            -webkit-border-radius: 5px;
        }
        .ch:hover, .ch:active { background: #1a1a1a; }
        .ch.active { background: #f0f; color: #000; border-color: #f0f; }
        #player { width: 100%; height: 350px; background: #111; border: 3px solid #0ff; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #333; font-size: 18px; }
    </style>
</head>
<body>
    <h1>MoJiTo TV</h1>
    <div id="status">Cargando canales...</div>
    <div class="list" id="list"></div>
    <div id="player"><div class="empty">Toca un canal para ver</div></div>

    <script>
    var chs = [], idx = 0;
    
    // Cargar canales
    fetch('/api/premium').then(r=>r.json()).then(d=>{
        chs = d.channels || [];
        document.getElementById('status').textContent = chs.length + ' canales - Toca para ver';
        render();
    });
    
    function render() {
        var html = '';
        for(var i=0; i<chs.length; i++) {
            html += '<div class="ch'+(i===0?' active':'')+'" onclick="play('+i+')">'+chs[i].name+'</div>';
        }
        document.getElementById('list').innerHTML = html;
    }
    
    function play(i) {
        idx = i;
        var c = chs[i];
        if(!c) return;
        var url = c.url || (c.fallbacks && c.fallbacks[0]) || '';
        
        // Highlight
        var els = document.querySelectorAll('.ch');
        for(var j=0; j<els.length; j++) els[j].classList.remove('active');
        var el = document.getElementById('list').children[i];
        if(el) {
            el.classList.add('active');
            el.scrollIntoView({block: 'center'});
        }
        
        if(url) {
            document.getElementById('player').innerHTML = '<iframe src="'+url+'" allow="autoplay"></iframe>';
            document.getElementById('status').textContent = 'Reproduciendo: ' + c.name;
        } else {
            document.getElementById('status').textContent = 'Sin stream: ' + c.name;
        }
    }
    </script>
</body>
</html>
