<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --magenta: #f0f; --cyan: #0ff; }
        html, body { height: 100%; font-family: monospace; background: #000; color: #fff; overflow: hidden; }
        body { padding: 10px; }
        h1 { color: var(--cyan); text-align: center; margin: 10px 0; }
        #msg { color: var(--magenta); text-align: center; margin: 10px 0; min-height: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; padding: 10px; }
        .ch { background: #111; border: 1px solid #333; padding: 15px; text-align: center; cursor: pointer; font-size: 14px; }
        .ch:hover, .ch:active { background: #222; }
        .ch.selected { background: var(--magenta); color: #000; border-color: var(--magenta); }
        #player { width: 100%; height: 400px; background: #111; margin-top: 10px; border: 2px solid var(--cyan); }
        iframe { width: 100%; height: 100%; border: none; }
        .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; }
    </style>
</head>
<body>
    <h1>MoJiTo TV</h1>
    <div id="msg">Cargando canales...</div>
    <div class="grid" id="grid"></div>
    <div id="player"><div class="empty">Selecciona un canal</div></div>
    <p style="color:#666;font-size:12px;text-align:center;margin-top:10px">Usa ↑↓ o haz clic en los canales</p>

    <script>
    var chs = [], idx = 0;
    
    fetch('/api/premium').then(r=>r.json()).then(d=>{
        chs = d.channels || [];
        document.getElementById('msg').textContent = chs.length + ' canales - Usa ↑↓ o clic';
        render();
    });
    
    function render() {
        var g = document.getElementById('grid');
        g.innerHTML = chs.map((c,i)=>
            '<div class="ch'+(i===idx?' selected':'')+'" data-i="'+i+'" onclick="play('+i+')">'+c.name+'</div>'
        ).join('');
        var sel = g.querySelector('.selected');
        if(sel) sel.scrollIntoView({block:'center'});
    }
    
    function play(i) {
        idx = i;
        var c = chs[i];
        if(!c) return;
        var url = c.url || (c.fallbacks && c.fallbacks[0]);
        document.getElementById('player').innerHTML = url 
            ? '<iframe src="'+url+'" allow="autoplay"></iframe>'
            : '<div class="empty">Sin stream</div>';
        document.getElementById('msg').textContent = '▶ ' + c.name;
    }
    
    // Click en grid
    document.getElementById('grid').addEventListener('click', function(e) {
        if(e.target.classList.contains('ch')) {
            var i = parseInt(e.target.dataset.i);
            play(i);
            render();
        }
    });
    
    // Teclado
    document.onkeydown = function(e) {
        e.preventDefault();
        var code = e.keyCode;
        document.getElementById('msg').textContent = 'Key: ' + code;
        
        if(code === 38 || code === 40) {
            idx = code === 38 ? Math.max(0, idx-1) : Math.min(chs.length-1, idx+1);
            render();
        } else if(code === 13) {
            play(idx);
        }
    };
    </script>
</body>
</html>
