<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SŌF MOJITO TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial}
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
#menu{padding:50px 10px 0 10px;height:100%;display:flex;flex-direction:column;align-items:center}
.logo{font-size:72px;font-weight:bold;text-align:center;line-height:1}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000,0 0 20px #8b0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #ff0000,0 0 20px #dc143c}
.logo .tv{color:#ff0000;font-size:32px;vertical-align:top;margin-left:5px;text-shadow:0 0 10px #ff0000}
#in{font-size:32px;padding:20px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:20px;outline:none}
#in.focused{color:#aaa}
#msg{font-size:20px;padding:15px;color:#8b0000;min-height:30px}
.info{color:#dc143c}
.error{color:#ff0000}
.hidden{display:none}
select{font-size:20px;width:100%;padding:15px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;margin-top:20px;height:300px}
option{background:#1a1a1a;color:#aaa;padding:12px}
</style>
</head>
<body>

<video id="video" controls></video>

<div id="menu">
<div class="logo"><span class="sof">SōF</span><span class="mojito"> MoJiTo</span><span class="tv"> TV</span></div>
<div id="in">Escribe el canal...</div>
<div id="msg" class="info">Escribe ybusca</div>
<select id="results" size="10" class="hidden"></select>
</div>

<script>
var API='/api/search';
var streams=[];
var idx=0;
var txt='';
var elIn=document.getElementById('in');
var elSel=document.getElementById('results');
var elMsg=document.getElementById('msg');
var elMenu=document.getElementById('menu');
var elVideo=document.getElementById('video');

function log(m){
    elMsg.textContent=m;
}

function renderIn(){
    elIn.textContent=txt||'Escribe el canal...';
}

function playStream(i){
    var s=streams[i];
    if(!s)return;
    log('Cargando...');
    elVideo.src=s.url;
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.play();
    log(s.title);
}

function buscar(){
    if(!txt.trim())return;
    log('Buscando...');
    elSel.innerHTML='';
    streams=[];
    idx=0;
    
    var x=new XMLHttpRequest();
    x.open('GET',API+'?q='+encodeURIComponent(txt),true);
    x.onreadystatechange=function(){
        if(x.readyState===4){
            if(x.status===200){
                try{
                    var d=JSON.parse(x.responseText);
                    if(d.error){
                        log('Error: '+d.error);
                        return;
                    }
                    if(!d.streams||!d.streams.length){
                        log('Sin resultados');
                        if(d.cached){
                            log('Modo cache');
                        }
                        return;
                    }
                    streams=d.streams;
                    elSel.classList.remove('hidden');
                    for(var i=0;i<streams.length;i++){
                        var opt=document.createElement('option');
                        opt.value=i;
                        opt.text=(i+1)+'. '+streams[i].title.substring(0,50);
                        elSel.appendChild(opt);
                    }
                    log(streams.length+' streams');
                }catch(e){
                    log('Error parse');
                }
            }else{
                log('Error: '+x.status);
            }
        }
    };
    x.send();
}

document.onkeydown=function(e){
    var k=e.key;
    if(elVideo.style.display==='block'){
        if(k==='Escape'){
            elVideo.pause();
            elVideo.style.display='none';
            elMenu.style.display='flex';
            log('Cerrado');
        }else if(k==='ArrowRight'){
            var n=idx+1;
            if(n<streams.length)playStream(n);
        }else if(k==='ArrowLeft'){
            var p=idx-1;
            if(p>=0)playStream(p);
        }
        return;
    }
    if(k==='ArrowDown'){
        if(idx<streams.length-1){
            idx++;
            elSel.value=idx;
            log(streams[idx].title.substring(0,40));
        }
    }else if(k==='ArrowUp'){
        if(idx>0){
            idx--;
            elSel.value=idx;
            log(streams[idx].title.substring(0,40));
        }
    }else if(k==='Enter'){
        if(idx>=0&&streams[idx]){
            playStream(idx);
        }else if(txt){
            buscar();
        }
    }else if(k==='Backspace'){
        txt=txt.slice(0,-1);
        renderIn();
        idx=-1;
        elSel.innerHTML='';
    }else if(k.length===1){
        txt+=k;
        renderIn();
    }
};

elSel.onchange=function(){
    idx=parseInt(elSel.value);
    playStream(idx);
};

renderIn();
</script>
</body>
</html>
