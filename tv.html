<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoJiTo TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#ff4757;--secondary:#ff6b81;--bg:#0a0a0a;--bg2:#111;--text:#fff;--text2:#888}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overflow:hidden}

#app{display:flex;height:100%}

#sidebar{width:280px;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid #222}
#sidebar-header{padding:20px;border-bottom:1px solid #222}
.logo{font-size:28px;font-weight:bold}
.logo .sof{color:var(--primary)}
.logo .mojito{color:var(--secondary)}
.logo .tv{color:var(--text);font-size:14px;margin-left:5px}

#search-box{width:100%;padding:12px;background:#000;border:1px solid #333;color:#fff;font-size:16px;margin-top:15px;border-radius:4px}
#search-box:focus{outline:none;border-color:var(--primary)}

#channel-list{flex:1;overflow-y:auto;padding:10px}
.channel-item{padding:12px 15px;margin:2px 0;border-radius:4px;cursor:pointer;transition:background 0.2s}
.channel-item:hover{background:#222}
.channel-item.active{background:var(--primary);color:#fff}
.channel-item .name{font-size:15px;font-weight:bold}
.channel-item .status{font-size:12px;color:var(--text2);margin-top:4px}
.channel-item.active .status{color:rgba(255,255,255,0.7)}

#main{flex:1;display:flex;flex-direction:column;position:relative}
#player-area{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
#video{width:100%;height:100%;background:#000}
#video:focus{outline:none}

#no-signal{position:absolute;text-align:center;color:var(--text2)}
#no-signal .icon{font-size:60px;margin-bottom:20px}

#info-bar{height:60px;background:var(--bg2);display:flex;align-items:center;padding:0 20px;border-top:1px solid #222}
#now-playing{flex:1}
#now-playing .title{font-size:18px;font-weight:bold}
#now-playing .channel{font-size:14px;color:var(--text2)}
#controls{display:flex;gap:15px}
#controls button{background:#222;border:none;color:#fff;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px}
#controls button:hover{background:var(--primary)}

#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999}
#loading .spinner{width:50px;height:50px;border:3px solid #333;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#msg-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:10px 20px;border-radius:4px;display:none;z-index:100}

.fondo-gif{position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.3;pointer-events:none;z-index:0}
</style>
</head>
<body>

<div class="fondo-gif"></div>

<div id="app">
    <div id="sidebar">
        <div id="sidebar-header">
            <div class="logo"><span class="sof">SōF</span><span class="mojito">MoJiTo</span><span class="tv">TV</span></div>
            <input type="text" id="search-box" placeholder="Buscar canal...">
        </div>
        <div id="channel-list"></div>
    </div>
    
    <div id="main">
        <div id="player-area">
            <video id="video" controls></video>
            <div id="no-signal">
                <div class="icon">📺</div>
                <div>Selecciona un canal</div>
            </div>
        </div>
        <div id="info-bar">
            <div id="now-playing">
                <div class="title" id="np-title">Sin selección</div>
                <div class="channel" id="np-channel">--</div>
            </div>
            <div id="controls">
                <button id="btn-retry">↻ Retry</button>
                <button id="btn-next">Sig →</button>
                <button id="btn-random">🎲 Random</button>
            </div>
        </div>
    </div>
</div>

<div id="loading"><div class="spinner"></div></div>
<div id="msg-toast"></div>

<script>
var API_BASE = '/api';
var channels = [];
var filteredChannels = [];
var currentChannel = null;
var currentStreamIndex = 0;
var streams = [];
var searchQuery = '';

var video = document.getElementById('video');
var channelList = document.getElementById('channel-list');
var searchBox = document.getElementById('search-box');
var noSignal = document.getElementById('no-signal');
var loading = document.getElementById('loading');
var msgToast = document.getElementById('msg-toast');
var npTitle = document.getElementById('np-title');
var npChannel = document.getElementById('np-channel');

var fondos = [
    "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUydzlra2lxdzRuODd0YWRxOW9tNjI5OTV3a3phMmU0cHhkemwyemN2ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/XvWz0PY5c7PjjbZ1hZ/giphy.gif",
    "https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyOTdub3BieHQwdGF0OXM4YjQybWhoNm5xeTB2M3FlN3N5anUxejd4ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uRxDeUFDWUx7frR8JB/giphy.gif"
];

function fondoRandom(){
    var i = Math.floor(Math.random() * fondos.length);
    document.querySelector('.fondo-gif').style.backgroundImage = "url('" + fondos[i] + "')";
}
fondoRandom();

function showLoading(){loading.style.display = 'flex'}
function hideLoading(){loading.style.display = 'none'}
function showToast(msg){
    msgToast.textContent = msg;
    msgToast.style.display = 'block';
    setTimeout(() => msgToast.style.display = 'none', 3000);
}

function fetchJSON(url){
    return fetch(url).then(r => r.json());
}

async function loadChannels(){
    try {
        var data = await fetchJSON(API_BASE + '/channels');
        channels = data.channels || [];
        filteredChannels = [...channels];
        renderChannels();
    } catch(e){
        showToast('Error cargando canales');
    }
}

function renderChannels(){
    channelList.innerHTML = '';
    filteredChannels.forEach(function(ch, i){
        var div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = '<div class="name">' + ch + '</div><div class="status"> Presiona Enter para ver</div>';
        div.onclick = function(){ playChannel(ch); };
        channelList.appendChild(div);
    });
}

function filterChannels(){
    var q = searchBox.value.toLowerCase();
    if(!q){
        filteredChannels = [...channels];
    }else{
        filteredChannels = channels.filter(c => c.toLowerCase().includes(q));
    }
    renderChannels();
}

async function playChannel(name){
    showLoading();
    currentChannel = name;
    currentStreamIndex = 0;
    npTitle.textContent = 'Cargando...';
    npChannel.textContent = name;
    
    try {
        var data = await fetchJSON(API_BASE + '/channel/' + encodeURIComponent(name));
        
        if(data.stream && data.stream.url){
            streams = [data.stream];
            playStream(data.stream.url);
            npTitle.textContent = name;
            showToast('Reproduciendo: ' + name);
        }else{
            // Try alternative - search directly
            var searchData = await fetchJSON(API_BASE + '/search?q=' + encodeURIComponent(name));
            if(searchData.streams && searchData.streams.length > 0){
                streams = searchData.streams;
                currentStreamIndex = 0;
                playStream(streams[0].url);
                npTitle.textContent = streams[0].title || name;
                showToast('Reproduciendo: ' + (streams[0].title || name));
            }else{
                showToast('Sin streams disponibles');
                npTitle.textContent = 'Sin señal';
                noSignal.style.display = 'flex';
                video.style.display = 'none';
            }
        }
    } catch(e){
        showToast('Error: ' + e.message);
        npTitle.textContent = 'Error';
    }
    
    hideLoading();
    highlightChannel(name);
}

function playStream(url){
    noSignal.style.display = 'none';
    video.style.display = 'block';
    video.src = url;
    video.play().catch(e => {
        if(currentStreamIndex < streams.length - 1){
            currentStreamIndex++;
            showToast('Fallback al siguiente stream...');
            playStream(streams[currentStreamIndex].url);
        }else{
            showToast('No hay streams disponibles');
        }
    });
}

function highlightChannel(name){
    var items = channelList.getElementsByClassName('channel-item');
    for(var i = 0; i < items.length; i++){
        if(items[i].querySelector('.name').textContent === name){
            items[i].classList.add('active');
            items[i].scrollIntoView({block: 'nearest'});
        }else{
            items[i].classList.remove('active');
        }
    }
}

function retry(){
    if(currentChannel && streams.length > 0){
        currentStreamIndex = 0;
        playStream(streams[0].url);
    }
}

function nextStream(){
    if(streams.length > 1){
        currentStreamIndex = (currentStreamIndex + 1) % streams.length;
        playStream(streams[currentStreamIndex].url);
        showToast('Stream ' + (currentStreamIndex + 1) + '/' + streams.length);
    }
}

function randomChannel(){
    if(channels.length > 0){
        var rand = channels[Math.floor(Math.random() * channels.length)];
        playChannel(rand);
    }
}

document.getElementById('btn-retry').onclick = retry;
document.getElementById('btn-next').onclick = nextStream;
document.getElementById('btn-random').onclick = randomChannel;
searchBox.oninput = filterChannels;

document.onkeydown = function(e){
    var k = e.key;
    
    if(video.style.display === 'block'){
        if(k === 'Escape'){
            video.pause();
            video.style.display = 'none';
            noSignal.style.display = 'flex';
            showToast('Pausado');
        }
        return;
    }
    
    if(k === 'Enter'){
        var active = document.querySelector('.channel-item.active');
        if(active){
            var name = active.querySelector('.name').textContent;
            playChannel(name);
        }else if(searchBox.value && filteredChannels.length > 0){
            playChannel(filteredChannels[0]);
        }
        return;
    }
    
    if(k === 'ArrowUp'){
        var active = document.querySelector('.channel-item.active');
        if(active){
            var prev = active.previousElementSibling;
            if(prev){
                active.classList.remove('active');
                prev.classList.add('active');
                prev.scrollIntoView({block: 'nearest'});
            }
        }else if(filteredChannels.length > 0){
            channelList.children[0].classList.add('active');
        }
        e.preventDefault();
        return;
    }
    
    if(k === 'ArrowDown'){
        var active = document.querySelector('.channel-item.active');
        if(active){
            var next = active.nextElementSibling;
            if(next){
                active.classList.remove('active');
                next.classList.add('active');
                next.scrollIntoView({block: 'nearest'});
            }
        }else if(filteredChannels.length > 0){
            channelList.children[0].classList.add('active');
        }
        e.preventDefault();
        return;
    }
    
    if(k === 'Backspace'){
        searchBox.value = searchBox.value.slice(0, -1);
        filterChannels();
        e.preventDefault();
        return;
    }
    
    if(k.length === 1){
        searchBox.value += k;
        filterChannels();
        searchBox.focus();
        e.preventDefault();
        return;
    }
};

loadChannels();
</script>
</body>
</html>
