<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoJiTo TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#ff4757;--secondary:#ff6b81;--bg:#0a0a0a;--bg2:#111;--text:#fff;--text2:#888}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overflow:hidden}

#app{display:flex;height:100%}
#app.fullscreen{flex-direction:column}
#app.fullscreen #sidebar{display:none}

#sidebar{width:300px;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid #222}
#sidebar-header{padding:15px;border-bottom:1px solid #222}
.logo{font-size:24px;font-weight:bold}
.logo .sof{color:var(--primary)}
.logo .mojito{color:var(--secondary)}
.logo .tv{color:var(--text);font-size:12px;margin-left:3px}

#search-box{width:100%;padding:10px;background:#000;border:1px solid #333;color:#fff;font-size:14px;border-radius:4px;ime-mode:disabled}
#search-box:focus{outline:none;border-color:var(--primary)}
#search-box::placeholder{color:#555}

#channel-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px}
.channel-item{padding:8px 12px;border-radius:4px;cursor:pointer;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center}
.channel-item:hover{background:#222}
.channel-item.active{background:var(--primary);color:#fff}
.channel-item .name{font-size:13px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

#main{flex:1;display:flex;flex-direction:column;position:relative}
#player-area{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
#video{width:100%;height:100%;background:#000;object-fit:contain}
#video:focus{outline:none}

#no-signal{position:absolute;text-align:center;color:var(--text2);z-index:10;padding:20px}
#no-signal .icon{font-size:50px;margin-bottom:15px}
#no-signal .msg{font-size:16px}

#info-bar{height:50px;background:var(--bg2);display:flex;align-items:center;padding:0 15px;border-top:1px solid #222;gap:10px}
#now-playing{flex:1;min-width:0}
#now-playing .title{font-size:16px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#now-playing .channel{font-size:12px;color:var(--text2)}
#controls{display:flex;gap:8px}
#controls button{background:#222;border:none;color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px}
#controls button:hover{background:var(--primary)}

#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999}
#loading .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#msg-toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:10px 20px;border-radius:4px;display:none;z-index:100;font-size:14px}

#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:200}
#overlay .panel{background:var(--bg2);padding:25px;border-radius:10px;text-align:center;min-width:250px}
#overlay .panel h3{color:var(--primary);margin-bottom:15px;font-size:22px}
#overlay .panel button{display:block;width:100%;padding:12px;margin:8px 0;background:#222;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:15px}
#overlay .panel button:hover{background:var(--primary)}

.fondo-gif{position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.2;pointer-events:none;z-index:0}

@media (max-width: 700px){
    #sidebar{width:200px}
    .channel-item .name{max-width:120px}
}
</style>
</head>
<body>

<div class="fondo-gif"></div>

<div id="app">
    <div id="sidebar">
        <div id="sidebar-header">
            <div class="logo"><span class="sof">SōF</span><span class="mojito">MoJiTo</span><span class="tv">TV</span></div>
            <input type="text" id="search-box" placeholder="Buscar..." autocomplete="off" spellcheck="false">
        </div>
        <div id="channel-list"></div>
    </div>
    
    <div id="main">
        <div id="player-area">
            <video id="video" controls playsinline></video>
            <div id="no-signal">
                <div class="icon">📺</div>
                <div class="msg">Selecciona un canal</div>
            </div>
        </div>
        <div id="info-bar">
            <div id="now-playing">
                <div class="title" id="np-title">Sin selección</div>
                <div class="channel" id="np-channel">--</div>
            </div>
            <div id="controls">
                <button id="btn-fullscreen">⛶</button>
                <button id="btn-retry">↻</button>
                <button id="btn-prev">◀</button>
                <button id="btn-next">▶</button>
                <button id="btn-random">🎲</button>
            </div>
        </div>
    </div>
</div>

<div id="loading"><div class="spinner"></div></div>
<div id="msg-toast"></div>

<div id="overlay">
    <div class="panel">
        <h3>MoJiTo TV</h3>
        <button id="btn-play">▶ Reproducir</button>
        <button id="btn-random-play">🎲 Aleatorio</button>
    </div>
</div>

<script>
var API_BASE = '/api';
var channels = [];
var filteredChannels = [];
var currentChannel = null;
var currentStreamIndex = 0;
var streams = [];
var lastChannel = localStorage.getItem('mojitolast') || null;
var selectedIndex = -1;
var mode = 'list'; // 'list' or 'video'

var video = document.getElementById('video');
var channelList = document.getElementById('channel-list');
var searchBox = document.getElementById('search-box');
var noSignal = document.getElementById('no-signal');
var loading = document.getElementById('loading');
var msgToast = document.getElementById('msg-toast');
var npTitle = document.getElementById('np-title');
var npChannel = document.getElementById('np-channel');
var app = document.getElementById('app');
var overlay = document.getElementById('overlay');

var fondos = [
    "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUydzlra2lxdzRuODd0YWRxOW9tNjI5OTV3a3phMmU0cHhkemwyemN2ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/XvWz0PY5c7PjjbZ1hZ/giphy.gif",
    "https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyOTdub3BieHQwdGF0OXM4YjQybWhoNm5xeTB2M3FlN3N5anUxejd4ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uRxDeUFDWUx7frR8JB/giphy.gif"
];

function fondoRandom(){
    document.querySelector('.fondo-gif').style.backgroundImage = "url('" + fondos[Math.floor(Math.random()*fondos.length)] + "')";
}
fondoRandom();

function showLoading(){loading.style.display='flex'}
function hideLoading(){loading.style.display='none'}
function showToast(msg){
    msgToast.textContent = msg;
    msgToast.style.display = 'block';
    setTimeout(() => msgToast.style.display = 'none', 2500);
}

function fetchJSON(url){
    return fetch(url).then(r => r.json());
}

async function loadChannels(){
    try {
        var data = await fetchJSON(API_BASE + '/channels');
        channels = data.channels || [];
        filteredChannels = [...channels];
        renderChannels();
        
        if(lastChannel && channels.includes(lastChannel)){
            setTimeout(() => {
                selectChannel(channels.indexOf(lastChannel));
                playChannel(lastChannel);
            }, 500);
        }else{
            overlay.style.display = 'flex';
        }
    } catch(e){
        showToast('Error: ' + e.message);
    }
}

function renderChannels(){
    channelList.innerHTML = '';
    filteredChannels.forEach(function(ch, i){
        var div = document.createElement('div');
        div.className = 'channel-item' + (i === selectedIndex ? ' active' : '');
        div.innerHTML = '<div class="name">' + ch + '</div>';
        div.onclick = function(){
            selectedIndex = i;
            renderChannels();
            playChannel(ch);
        };
        channelList.appendChild(div);
    });
}

function selectChannel(idx){
    if(idx >= 0 && idx < filteredChannels.length){
        selectedIndex = idx;
        renderChannels();
        var el = channelList.children[idx];
        if(el) el.scrollIntoView({block:'nearest', behavior:'smooth'});
    }
}

function filterChannels(){
    var q = searchBox.value.toLowerCase().trim();
    if(!q){
        filteredChannels = [...channels];
        selectedIndex = 0;
    }else{
        filteredChannels = channels.filter(c => c.toLowerCase().includes(q));
        selectedIndex = filteredChannels.length > 0 ? 0 : -1;
    }
    renderChannels();
}

async function playChannel(name){
    showLoading();
    currentChannel = name;
    currentStreamIndex = 0;
    npTitle.textContent = 'Cargando...';
    npChannel.textContent = name;
    localStorage.setItem('mojitolast', name);
    
    try {
        var data = await fetchJSON(API_BASE + '/channel/' + encodeURIComponent(name));
        
        if(data.stream && data.stream.url){
            streams = [data.stream];
            if(data.stream.fallbacks){
                streams = streams.concat(data.stream.fallbacks.map(function(u){return {url:u};}));
            }
            playStream(data.stream.url);
            npTitle.textContent = name;
            mode = 'video';
            // Enter fullscreen when playing
            if(!app.classList.contains('fullscreen')){
                app.classList.add('fullscreen');
            }
        }else{
            var searchData = await fetchJSON(API_BASE + '/search?q=' + encodeURIComponent(name));
            if(searchData.streams && searchData.streams.length > 0){
                streams = searchData.streams;
                playStream(streams[0].url);
                npTitle.textContent = streams[0].title || name;
                mode = 'video';
            }else{
                showToast('Sin señal');
                npTitle.textContent = 'Sin señal';
                noSignal.style.display = 'flex';
                video.style.display = 'none';
            }
        }
    } catch(e){
        showToast('Error: ' + e.message);
        npTitle.textContent = 'Error';
    }
    hideLoading();
}

function playStream(url){
    noSignal.style.display = 'none';
    video.style.display = 'block';
    video.src = url;
    video.play().catch(function(e){
        if(currentStreamIndex < streams.length - 1){
            currentStreamIndex++;
            showToast('Fallback...');
            playStream(streams[currentStreamIndex].url);
        }else{
            showToast('Sin streams');
        }
    });
}

function nextChannel(){
    var nextIdx = (selectedIndex + 1) % filteredChannels.length;
    selectChannel(nextIdx);
    playChannel(filteredChannels[nextIdx]);
}

function prevChannel(){
    var prevIdx = (selectedIndex - 1 + filteredChannels.length) % filteredChannels.length;
    selectChannel(prevIdx);
    playChannel(filteredChannels[prevIdx]);
}

function toggleFullscreen(){
    app.classList.toggle('fullscreen');
    if(app.classList.contains('fullscreen')){
        video.requestFullscreen ? video.requestFullscreen() : video.webkitRequestFullscreen();
    }else{
        if(document.fullscreenElement) document.exitFullscreen();
    }
    showToast(app.classList.contains('fullscreen') ? 'Fullscreen' : 'Normal');
}

function retry(){
    if(streams.length > 0){
        currentStreamIndex = 0;
        playStream(streams[0].url);
    }
}

function randomChannel(){
    if(channels.length > 0){
        var rand = channels[Math.floor(Math.random() * channels.length)];
        selectChannel(channels.indexOf(rand));
        playChannel(rand);
    }
}

function exitVideo(){
    mode = 'list';
    video.pause();
    video.src = '';
    video.style.display = 'none';
    noSignal.style.display = 'flex';
    app.classList.remove('fullscreen');
    if(document.fullscreenElement) document.exitFullscreen();
    npTitle.textContent = 'Sin selección';
    npChannel.textContent = '--';
}

document.getElementById('btn-fullscreen').onclick = toggleFullscreen;
document.getElementById('btn-retry').onclick = retry;
document.getElementById('btn-next').onclick = nextChannel;
document.getElementById('btn-prev').onclick = prevChannel;
document.getElementById('btn-random').onclick = randomChannel;

document.getElementById('btn-play').onclick = function(){
    overlay.style.display = 'none';
    if(channels.length > 0){
        selectChannel(0);
        playChannel(channels[0]);
    }
};

document.getElementById('btn-random-play').onclick = function(){
    overlay.style.display = 'none';
    randomChannel();
};

searchBox.addEventListener('input', filterChannels);
searchBox.addEventListener('keydown', function(e){
    e.stopPropagation();
});

document.onkeydown = function(e){
    var k = e.key;
    var code = e.code || '';
    
    // List of common remote control keys
    // These work with most smart TV remotes including Philco
    
    // === MODE SWITCHING ===
    // Go back / Return key - exit video to list
    if(k === 'Backspace' || k === 'Escape' || code === 'Back' || code === 'GoBack' || code === 'BrowserBack' || k === '↩'){
        if(mode === 'video'){
            exitVideo();
        }else if(app.classList.contains('fullscreen')){
            app.classList.remove('fullscreen');
            if(document.fullscreenElement) document.exitFullscreen();
        }
        e.preventDefault();
        return;
    }
    
    // Home key - go to list
    if(code === 'Home' || code === 'GoHome' || k === '🏠'){
        exitVideo();
        overlay.style.display = 'flex';
        e.preventDefault();
        return;
    }
    
    // === VIDEO MODE CONTROLS ===
    if(mode === 'video'){
        // Play/Pause - also Enter key
        if(k === 'Enter' || k === ' ' || code === 'Play' || code === 'Pause' || code === 'MediaPlayPause'){
            if(video.paused){
                video.play();
                showToast('▶ Reproduciendo');
            }else{
                video.pause();
                showToast('⏸ Pausado');
            }
            e.preventDefault();
            return;
        }
        
        // Stop
        if(k === 's' || k === 'S' || code === 'Stop' || code === 'MediaStop'){
            exitVideo();
            e.preventDefault();
            return;
        }
        
        // Volume Up/Down - not implemented but prevent default
        if(code === 'VolumeUp' || code === 'VolumeDown' || code === 'AudioVolumeUp' || code === 'AudioVolumeDown'){
            // Let browser handle volume
            return;
        }
        
        // Channel Up/Down - change channel
        if(code === 'ChannelUp' || code === 'ChannelDown' || code === 'ArrowUp' || code === 'ArrowDown'){
            nextChannel();
            e.preventDefault();
            return;
        }
        
        // Info / EPG key - toggle info
        if(code === 'Info' || code === 'EPG' || k === 'i' || k === 'I'){
            if(npTitle.textContent !== 'Sin selección'){
                showToast(npTitle.textContent);
            }
            e.preventDefault();
            return;
        }
        
        // Exit/Back key - return to list
        if(code === 'Exit' || code === 'Last' || code === 'Back' || k === '0'){
            exitVideo();
            e.preventDefault();
            return;
        }
        
        // Fast forward/rewind
        if(code === 'FastForward' || k === 'ArrowRight'){
            video.currentTime += 10;
            showToast('+10s');
            e.preventDefault();
            return;
        }
        if(code === 'Rewind' || k === 'ArrowLeft'){
            video.currentTime -= 10;
            showToast('-10s');
            e.preventDefault();
            return;
        }
    }
    
    // === LIST MODE CONTROLS ===
    if(mode === 'list'){
        // Enter - play selected channel
        if(k === 'Enter'){
            e.preventDefault();
            if(overlay.style.display === 'flex'){
                document.getElementById('btn-play').click();
            }else if(selectedIndex >= 0 && selectedIndex < filteredChannels.length){
                playChannel(filteredChannels[selectedIndex]);
            }
            return;
        }
        
        // Navigation - arrows
        if(code === 'ArrowUp' || code === 'ChannelUp' || k === 'ArrowUp'){
            var prev = (selectedIndex - 1 + filteredChannels.length) % filteredChannels.length;
            selectChannel(prev);
            e.preventDefault();
            return;
        }
        if(code === 'ArrowDown' || code === 'ChannelDown' || k === 'ArrowDown'){
            var next = (selectedIndex + 1) % filteredChannels.length;
            selectChannel(next);
            e.preventDefault();
            return;
        }
        if(code === 'ArrowLeft'){
            selectChannel(0);
            e.preventDefault();
            return;
        }
        if(code === 'ArrowRight'){
            if(channels.length > 0){
                selectChannel(channels.length - 1);
            }
            e.preventDefault();
            return;
        }
        
        // Page Up/Down
        if(code === 'PageUp'){
            var newIdx = Math.max(0, selectedIndex - 10);
            selectChannel(newIdx);
            e.preventDefault();
            return;
        }
        if(code === 'PageDown'){
            var newIdx = Math.min(filteredChannels.length - 1, selectedIndex + 10);
            selectChannel(newIdx);
            e.preventDefault();
            return;
        }
        
        // Number keys for quick access
        if(k >= '0' && k <= '9'){
            var idx = parseInt(k);
            if(idx < filteredChannels.length){
                selectChannel(idx);
                playChannel(filteredChannels[idx]);
            }
            e.preventDefault();
            return;
        }
    }
    
    // Global keys
    // Fullscreen toggle
    if((k === 'f' || k === 'F') && searchBox !== document.activeElement){
        toggleFullscreen();
        e.preventDefault();
        return;
    }
    
    // Random channel
    if(k === 'r' || k === 'R'){
        randomChannel();
        e.preventDefault();
        return;
    }
    
    // Escape from search - close keyboard if open
    if(k === 'Escape' && searchBox === document.activeElement){
        searchBox.blur();
        e.preventDefault();
        return;
    }
    
    // Typing in search (only when not in video mode)
    if(mode === 'list' && searchBox !== document.activeElement && !e.ctrlKey && !e.metaKey){
        if(k === 'Backspace'){
            searchBox.value = searchBox.value.slice(0,-1);
            filterChannels();
            return;
        }
        if(k.length === 1){
            searchBox.value += k;
            filterChannels();
            searchBox.focus();
            return;
        }
    }
};

document.addEventListener('fullscreenchange', function(){
    if(!document.fullscreenElement && app.classList.contains('fullscreen')){
        if(mode === 'list'){
            app.classList.remove('fullscreen');
        }
    }
});

searchBox.addEventListener('focus', function(){
    this.blur();
    this.focus();
});

loadChannels();
</script>
</body>
</html>
