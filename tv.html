<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MoJiTo TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial}
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
#menu{padding:50px 10px 0 10px;height:100%;display:flex;flex-direction:column}
.logo{font-size:48px;font-weight:bold;text-align:center;line-height:1;margin-bottom:10px}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000,0 0 20px #8b0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #ff0000,0 0 20px #dc143c}
.logo .tv{color:#ff0000;font-size:20px;vertical-align:top;margin-left:5px;text-shadow:0 0 10px #ff0000}
#in{font-size:24px;padding:10px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:10px;outline:none;width:80%}
#in.focused{color:#aaa;text-shadow:0 0 10px rgba(255,0,0,0.5)}
#msg{font-size:14px;padding:10px;color:#dc143c;min-height:25px;text-align:center}

/* GRID with pagination */
#grid{flex:1;overflow-y:auto;padding:5px 0}
#grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.ch{background:#111;border:2px solid #222;border-radius:6px;padding:10px;cursor:pointer;min-height:50px;display:flex;flex-direction:column;justify-content:center}
.ch:hover,.ch.sel{border-color:#dc143c;background:#1a0000}
.ch-name{font-size:11px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:9px;color:#666;text-transform:uppercase;margin-top:3px}

/* Pagination */
#pages{display:flex;justify-content:center;gap:10px;padding:10px;background:#111}
.page-btn{padding:5px 15px;background:#222;border:1px solid #333;border-radius:15px;color:#888;font-size:12px;cursor:pointer}
.page-btn.sel{background:#dc143c;color:#000;border-color:#dc143c}
.page-btn:active{background:#8b0000}

/* Hints */
#hints{position:fixed;bottom:0;left:0;width:100%;background:#111;padding:8px;display:flex;justify-content:center;gap:20px;font-size:10px;color:#555;border-top:1px solid #222}
#hints b{background:#222;padding:2px 6px;border-radius:3px;margin-right:3px;color:#888}
</style>
</head>
<body>

<video id="video" controls></video>

<div id="menu">
<div class="logo"><span class="sof">SŌF</span><span class="mojito">MoJiTo</span><span class="tv">TV</span></div>
<input type="text" id="in" placeholder="Buscar canal...">
<div id="msg">Usa las flechas para navegar</div>
<div id="grid"><div id="grid-inner"></div></div>
<div id="pages"></div>
</div>

<div id="hints">
<b>↑↓</b> Navegar <b>OK</b> Seleccionar <b>BACK</b> Salir <b>PAG</b> Paginas
</div>

<script>
var API=window.location.origin;
var streams=[], idx=0, txt='', page=1, perPage=48;

function log(m){document.getElementById('msg').textContent=m;}

function renderGrid(start,end){
    var g=document.getElementById('grid-inner');
    g.innerHTML='';
    var slice=streams.slice(start,end);
    slice.forEach(function(s,i){
        var d=document.createElement('div');
        d.className='ch'+(start+i===idx?' sel':'');
        d.innerHTML='<div class="ch-name">'+s.title.substring(0,30)+'</div><div class="ch-cat">'+(s.quality||'HD')+'</div>';
        d.onclick=function(){playStream(start+i);};
        g.appendChild(d);
    });
    updateFocus();
}

function updateFocus(){
    var chs=document.querySelectorAll('.ch');
    chs.forEach(function(c){c.classList.remove('sel');});
    var relIdx=idx%perPage;
    if(chs[relIdx])chs[relIdx].classList.add('sel');
}

function renderPages(){
    var total=Math.ceil(streams.length/perPage);
    var p=document.getElementById('pages');
    p.innerHTML='';
    for(var i=1;i<=Math.min(total,10);i++){
        var b=document.createElement('div');
        b.className='page-btn'+(i===page?' sel':'');
        b.textContent=i;
        b.onclick=function(){page=parseInt(this.textContent);loadPage();};
        p.appendChild(b);
    }
}

function loadPage(){
    var start=(page-1)*perPage;
    var end=Math.min(start+perPage,streams.length);
    renderGrid(start,end);
    renderPages();
    log('Pag '+page+'/'+Math.ceil(streams.length/perPage)+' - '+streams.length+' canales');
}

function move(dir){
    if(dir==='up'&&idx>0)idx--;
    if(dir==='down'&&idx<streams.length-1)idx++;
    if(dir==='left'&&idx>=perPage)idx-=perPage;
    if(dir==='right'&&idx+perPage<streams.length)idx+=perPage;
    var start=(page-1)*perPage;
    if(idx>=start+perPage){page=Math.ceil((idx+1)/perPage);loadPage();}
    else if(idx<start){page=Math.ceil((idx+1)/perPage);loadPage();}
    else{updateFocus();}
    log((idx+1)+'/'+streams.length+' - '+streams[idx].title.substring(0,30));
}

function search(){
    if(!txt.trim()){log('Escribe un canal');return;}
    log('Buscando...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'/api/search?q='+encodeURIComponent(txt),true);
    x.onreadystatechange=function(){
        if(x.readyState===4&&x.status===200){
            try{
                var d=JSON.parse(x.responseText);
                streams=d.map(function(s){return {title:s.name,url:s.url,quality:s.streams>3?'HD':'SD'}});
                if(streams.length===0){log('Sin resultados');return;}
                idx=0;page=1;
                loadPage();
            }catch(e){log('Error');}
        }
    };
    x.onerror=function(){log('Sin conexion');};
    x.send();
}

function loadAll(){
    log('Cargando canales...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'/api/channels',true);
    x.onreadystatechange=function(){
        if(x.readyState===4&&x.status===200){
            try{
                var d=JSON.parse(x.responseText);
                streams=d.map(function(c){return {title:c.name,url:'',quality:c.streams||'1'}});
                streams.sort(function(a,b){return a.title.localeCompare(b.title)});
                idx=0;page=1;
                loadPage();
            }catch(e){log('Error');}
        }
    };
    x.onerror=function(){log('Sin conexion');};
    x.send();
}

function playStream(i){
    if(!streams[i].url)return;
    document.getElementById('video').src=streams[i].url;
    document.getElementById('video').style.display='block';
    document.getElementById('menu').style.display='none';
    document.getElementById('video').play();
    log('Reproduciendo: '+streams[i].title);
}

document.getElementById('in').onkeydown=function(e){
    if(e.key==='Enter'){search();}
    else if(e.key==='Backspace'&&txt.length===0){
        document.getElementById('in').blur();
        loadAll();
    }
    else if(e.key.length===1){txt+=e.key;}
};

document.onkeydown=function(e){
    var k=e.key;
    if(document.getElementById('video').style.display==='block'){
        if(k==='Escape'){document.getElementById('video').style.display='none';document.getElementById('menu').style.display='flex';log('Cerrado');}
        return;
    }
    if(k==='ArrowDown'){e.preventDefault();move('down');}
    else if(k==='ArrowUp'){e.preventDefault();move('up');}
    else if(k==='ArrowLeft'){e.preventDefault();move('left');}
    else if(k==='ArrowRight'){e.preventDefault();move('right');}
    else if(k==='Enter'){if(streams[idx])playStream(idx);}
    else if(k==='Backspace'){
        var inp=document.getElementById('in');
        if(document.activeElement===inp){txt=txt.slice(0,-1);inp.value=txt;}
        else if(document.getElementById('video').style.display==='none'){document.getElementById('video').style.display='none';document.getElementById('menu').style.display='flex';log('Cerrado');}
    }
    else if(k==='PageDown'){if(page<Math.ceil(streams.length/perPage)){page++;loadPage();}}
    else if(k==='PageUp'){if(page>1){page--;loadPage();}}
    else if(k==='Home'){txt='';document.getElementById('in').value='';loadAll();}
};

loadAll();
console.log('MoJiTo loaded');
</script>
</body>
</html>
