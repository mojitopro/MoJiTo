<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MoJiTo TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial}
#app{width:100%;height:100%}
#app.fs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999}

/* VIDEO */
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
#video.active{display:block}

/* FS */
#fs-logo{position:fixed;top:10px;left:10px;font-size:12px;color:#dc143c;z-index:100;opacity:0.7;display:none;text-shadow:0 0 10px #8b0000}
#app.fs #fs-logo{display:block}

#fs-btns{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:8px 20px;border-radius:20px;z-index:100;display:none;gap:10px}
#app.fs #fs-btns{display:flex}
.fs-btn{background:#1a1a1a;color:#8b0000;border:1px solid #8b0000;padding:6px 15px;border-radius:15px;font-size:12px;cursor:pointer}
.fs-btn:active{background:#dc143c;color:#fff}

/* MENU */
#menu{height:100%;display:flex;flex-direction:column;padding:0 15px}
#menu.hidden{display:none}

#header{height:55px;display:flex;align-items:center;gap:15px;border-bottom:1px solid #1a1a1a}
.logo{font-size:32px;font-weight:bold;letter-spacing:-1px}
.logo .m{color:#dc143c;text-shadow:0 0 15px #dc143c,0 0 30px #8b0000}
.logo .t{color:#888;font-size:14px;vertical-align:super;margin-left:2px;text-shadow:0 0 5px #555}

#ch-count{font-size:11px;color:#444;margin-left:auto}

/* TABS */
#tabs{display:flex;gap:5px;padding:8px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:6px 12px;background:#111;border:1px solid #222;border-radius:12px;font-size:11px;color:#555;cursor:pointer;flex-shrink:0}
.tab.sel{border-color:#dc143c;color:#dc143c;background:rgba(220,20,60,0.1)}

/* SEARCH */
#search-bar{height:40px;display:flex;align-items:center;gap:8px;padding:0 5px;margin-bottom:5px}
#s-hash{color:#dc143c;font-size:16px}
#s-num{font-size:20px;color:#666;min-width:50px}
#s-hint{font-size:9px;color:#333;margin-left:auto}

/* GRID - OPTIMIZED */
#grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:5px 0}
#grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.ch{background:#0d0d0d;border:2px solid #1a1a1a;border-radius:4px;padding:8px;cursor:pointer;min-height:45px;display:flex;flex-direction:column;justify-content:center}
.ch.sel{border-color:#dc143c;background:#150000}
.ch-name{font-size:11px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:8px;color:#444;text-transform:uppercase;margin-top:2px}

/* MSG */
#msg{height:30px;display:flex;align-items:center;padding:0 5px;font-size:11px;color:#555;border-top:1px solid #111}
#msg.ok{color:#8b0000}

/* LOAD */
#load{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:100;display:none}
#load.active{display:block}
.ld{width:30px;height:30px;border:2px solid rgba(220,20,60,0.15);border-top-color:#dc143c;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERR */
#err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(80,0,0,0.95);padding:15px 30px;border-radius:8px;z-index:200;display:none}
#err.active{display:block}
#err-msg{color:#dc143c;font-size:14px;text-align:center}
#err-hint{color:#666;font-size:10px;text-align:center;margin-top:5px}
</style>
</head>
<body>

<div id="app">
    <div id="fs-logo">MoJiTo</div>
    
    <video id="video" controls></video>
    
    <div id="fs-btns">
        <button class="fs-btn" id="btn-exit">VOLVER</button>
        <button class="fs-btn" id="btn-fs">PANTALLA</button>
    </div>
    
    <div id="menu">
        <div id="header">
            <div class="logo"><span class="m">MoJiTo</span><span class="t">tv</span></div>
            <div id="ch-count"></div>
        </div>
        
        <div id="tabs"></div>
        
        <div id="search-bar">
            <div id="s-hash">#</div>
            <div id="s-num">-</div>
            <div id="s-hint">0-9 | OK | BACK</div>
        </div>
        
        <div id="grid"><div id="grid-inner"></div></div>
        
        <div id="msg">navegar con flechas</div>
    </div>
    
    <div id="load"><div class="ld"></div></div>
    <div id="err"><div id="err-msg">Sin senal</div><div id="err-hint">OK reintentar</div></div>
</div>

<script>
(function(){
var API='';
var app=document.getElementById('app');
var menu=document.getElementById('menu');
var video=document.getElementById('video');
var grid=document.getElementById('grid-inner');
var tabsEl=document.getElementById('tabs');
var searchBar=document.getElementById('search-bar');
var sNum=document.getElementById('s-num');
var msg=document.getElementById('msg');
var load=document.getElementById('load');
var err=document.getElementById('err');
var errMsg=document.getElementById('err-msg');
var chCount=document.getElementById('ch-count');

var CATS=['Todos','Deportes','Cine','Noticias','Mexico','Argentina','Espana','Infantil','Musica','Documental','Entretenimiento'];
var catMap={};
var chans=[],filt=[],sel=0,curT=0,isFS=false,isWatch=false,isSearch=false,searchVal='';
var PAGE=0,PER_PAGE=60,totalRendered=0,canLoad=true;

function log(m,t){msg.textContent=m;msg.className=t||'';}

function mCat(n){
    if(/espn|sports|tudn|futbol|fox sports|bein/i.test(n))return 1;
    if(/hbo|cinemax|showtime|movie|cine|star/i.test(n))return 2;
    if(/cnn|bbc|news|telesur|dw/i.test(n))return 3;
    if(/azteca|estrellas|canal 5|televisa|mexico/i.test(n))return 4;
    if(/trece|telefe|argentina|tyc/i.test(n))return 5;
    if(/la 1|antena|tve|espana|telecinco/i.test(n))return 6;
    if(/cartoon|nick|disney|kids/i.test(n))return 7;
    if(/mt[rv]|musica|vh1/i.test(n))return 8;
    if(/discovery|history|nat.*geo|animal/i.test(n))return 9;
    if(/fox|warner|universal|sony|adult|paramount/i.test(n))return 10;
    return 0;
}

function initCats(){
    CATS.forEach(function(c,i){catMap[c.toLowerCase()]=i;});
}
initCats();

function renderTabs(){
    var h='';
    CATS.forEach(function(c,i){
        h+='<div class="tab'+(i===curT?' sel':'')+'" data-i="'+i+'">'+c+'</div>';
    });
    tabsEl.innerHTML=h;
}

function filterChans(){
    if(curT===0){
        filt=chans;
    }else{
        var cat=CATS[curT].toLowerCase();
        filt=[];
        for(var i=0;i<chans.length;i++){
            var c=chans[i];
            var cn=(c.name||'').toLowerCase();
            var cc=(c.category||'').toLowerCase();
            if(cc.indexOf(cat)>-1||mCat(cn)===curT){
                filt.push(c);
            }
        }
    }
}

function loadChans(){
    load.classList.add('active');
    var x=new XMLHttpRequest();
    x.open('GET',API+'/api/channels',true);
    x.onreadystatechange=function(){
        if(x.readyState===4&&x.status===200){
            try{
                chans=JSON.parse(x.responseText);
                chCount.textContent=chans.length+' canales';
                filterChans();
                renderTabs();
                totalRendered=0;
                grid.innerHTML='';
                renderPage();
                log(filt.length+' canales');
            }catch(e){log('Error datos');}
            load.classList.remove('active');
        }
    };
    x.onerror=function(){load.classList.remove('active');log('Sin conexion');};
    x.send();
}

function renderPage(){
    if(!canLoad)return;
    canLoad=false;
    var start=totalRendered;
    var end=Math.min(start+PER_PAGE,filt.length);
    var frag=document.createDocumentFragment();
    for(var i=start;i<end;i++){
        var c=filt[i];
        var d=document.createElement('div');
        d.className='ch'+(i===sel&&!isSearch?' sel':'');
        d.dataset.i=i;
        var cat=c.category||(CATS[mCat((c.name||'').toLowerCase())]||'General');
        d.innerHTML='<div class="ch-name">'+c.name+'</div><div class="ch-cat">'+cat+'</div>';
        d.onclick=function(){watchChan(filt[this.dataset.i]);};
        frag.appendChild(d);
    }
    grid.appendChild(frag);
    totalRendered=end;
    canLoad=true;
}

function setTab(i){
    curT=i;
    filterChans();
    totalRendered=0;
    grid.innerHTML='';
    sel=0;
    renderTabs();
    renderPage();
    if(filt.length>PER_PAGE)grid.parentElement.onscroll=null;
    updateFocus();
    log(filt.length+' canales');
}

function updateFocus(){
    var chs=grid.querySelectorAll('.ch');
    for(var i=0;i<chs.length;i++)chs[i].classList.remove('sel');
    if(isSearch||chs.length===0)return;
    var el=chs[sel-totalRendered+PER_PAGE>0&&sel-totalRendered<PER_PAGE?sel-totalRendered+PER_PAGE:0];
    if(!el&&chs.length>0)el=chs[0];
    if(el){
        el.classList.add('sel');
        el.scrollIntoView({block:'nearest'});
        log(el.querySelector('.ch-name').textContent);
    }
}

function move(d){
    if(isSearch)return;
    var cols=Math.max(1,Math.floor(grid.parentElement.offsetWidth/126));
    if(d==='up')sel=Math.max(0,sel-cols);
    else if(d==='down')sel=Math.min(filt.length-1,sel+cols);
    else if(d==='left')sel=Math.max(0,sel-1);
    else if(d==='right')sel=Math.min(filt.length-1,sel+1);
    updateFocus();
    checkLoad();
}

function checkLoad(){
    var scroll=grid.parentElement;
    if(totalRendered<filt.length&&sel>totalRendered-PER_PAGE*2){
        renderPage();
    }
}

function watchChan(c){
    isWatch=true;
    err.classList.remove('active');
    var rec=JSON.parse(localStorage.getItem('r')||'[]');
    rec=rec.filter(function(n){return n!==c.name;});
    rec.unshift(c.name);
    if(rec.length>20)rec.pop();
    localStorage.setItem('r',JSON.stringify(rec));
    log('...');
    menu.style.display='none';
    video.style.display='block';
    var x=new XMLHttpRequest();
    x.open('GET',API+'/api/stream/'+encodeURIComponent(c.name),true);
    x.onreadystatechange=function(){
        if(x.readyState===4){
            try{
                var d=JSON.parse(x.responseText);
                if(d.url){
                    video.src=d.url;
                    video.play().then(function(){log(c.name);}).catch(function(){showErr();});
                }else{showErr();}
            }catch(e){showErr();}
        }
    };
    x.onerror=function(){showErr();};
    x.send();
}

function showErr(){err.classList.add('active');}
function backMenu(){
    video.pause();video.src='';
    video.style.display='none';
    menu.style.display='flex';
    isWatch=false;isFS=false;
    app.classList.remove('fs');
    err.classList.remove('active');
    isSearch=false;sNum.textContent='-';searchBar.style.background='';
    updateFocus();
}

function toggleFS(){
    if(!isWatch)return;
    if(!isFS){
        var f=video.requestFullscreen||video.webkitRequestFullscreen;
        if(f)f.call(video);
        isFS=true;app.classList.add('fs');
    }else{
        var e=document.exitFullscreen||document.webkitExitFullscreen;
        if(e)e.call(document);
        isFS=false;app.classList.remove('fs');
    }
}

function startSearch(){isSearch=true;searchVal='';sNum.textContent='-';searchBar.style.background='#111';}
function addNum(n){
    if(searchVal.length<4){
        searchVal+=n;sNum.textContent=searchVal;
        if(searchVal.length>=2){
            var idx=parseInt(searchVal,10)-1;
            if(idx>=0&&idx<chans.length){
                searchVal='';sNum.textContent='-';isSearch=false;searchBar.style.background='';
                watchChan(chans[idx]);
            }
        }
    }
}

document.onkeydown=function(e){
    var k=e.keyCode||e.which;
    var navKeys=[37,38,39,40,33,34];
    if(navKeys.indexOf(k)>-1)e.preventDefault();
    
    if(k===8||k===27){
        if(isSearch){isSearch=false;sNum.textContent='-';searchBar.style.background='';}
        else if(isWatch)backMenu();
        return;
    }
    
    if(isWatch){
        if(k===13||k===66){
            if(err.classList.contains('active')){err.classList.remove('active');if(filt[sel])watchChan(filt[sel]);}
            else backMenu();
        }
        if(k===70)toggleFS();
        return;
    }
    
    if(isSearch){
        if(k===13||k===66){
            if(searchVal.length>0){
                var idx=parseInt(searchVal,10)-1;
                if(idx>=0&&idx<chans.length){
                    searchVal='';sNum.textContent='-';isSearch=false;searchBar.style.background='';
                    watchChan(chans[idx]);
                }
            }
        }
        if(k>=48&&k<=57)addNum(String.fromCharCode(k));
        return;
    }
    
    if(k===38)move('up');
    else if(k===40)move('down');
    else if(k===37)move('left');
    else if(k===39)move('right');
    else if(k===33){sel=Math.max(0,sel-30);updateFocus();}
    else if(k===34){sel=Math.min(filt.length-1,sel+30);updateFocus();checkLoad();}
    else if(k===13||k===66){if(filt[sel])watchChan(filt[sel]);}
    else if(k>=48&&k<=57){startSearch();addNum(String.fromCharCode(k));}
    else if(k===70)toggleFS();
};

tabsEl.onclick=function(e){
    var t=e.target;
    if(t.className.indexOf('tab')>-1)setTab(parseInt(t.dataset.i));
};

document.addEventListener('fullscreenchange',function(){
    isFS=!!document.fullscreenElement;
    app.classList.toggle('fs',isFS);
});

video.onerror=showErr;

var tx=0,ty=0;
document.ontouchstart=function(e){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
};
document.ontouchend=function(e){
    var dx=tx-e.changedTouches[0].clientX;
    var dy=ty-e.changedTouches[0].clientY;
    if(Math.abs(dx)>30)dx>0?move('left'):move('right');
    else if(Math.abs(dy)>30)dy>0?move('up'):move('down');
};

document.getElementById('btn-exit').onclick=backMenu;
document.getElementById('btn-fs').onclick=toggleFS;

grid.parentElement.onscroll=function(){
    var s=this;
    if(s.scrollTop+s.clientHeight>=s.scrollHeight-100&&totalRendered<filt.length){
        renderPage();
    }
};

loadChans();
console.log('MoJiTo ready');
})();
</script>
</body>
</html>
