<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: Arial; height: 100vh; overflow: hidden; }
        
        #video { width: 100%; height: 55vh; background: #000; object-fit: contain; }
        
        #info { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 5px; font-size: 16px; z-index: 10; }
        
        .nav { background: #111; padding: 10px; display: flex; justify-content: center; gap: 10px; }
        .nav button { background: #222; border: none; color: #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        #chlist { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 10px; overflow-y: auto; height: 40vh; }
        .ch { background: #111; border: 2px solid #222; border-radius: 5px; padding: 12px; text-align: center; cursor: pointer; }
        .ch:hover { border-color: #00d4ff; background: #1a1a1a; }
        .ch.active { border-color: #0f0; background: #001a0a; }
        .ch .n { font-size: 13px; font-weight: bold; }
        .ch .s { font-size: 10px; color: #0f0; margin-top: 5px; }
    </style>
</head>
<body>
    <video id="video" controls playsinline></video>
    <div id="info">Selecciona un canal</div>
    
    <div class="nav">
        <button onclick="prev()">◀</button>
        <button onclick="stop()">■</button>
        <button onclick="next()">▶</button>
    </div>
    
    <div id="chlist"></div>

    <script>
    var canales = [];
    
    // Cargar canales desde la API
    fetch('/api/tv').then(r=>r.json()).then(d=>{
        canales = d.channels.filter(c=>c.fusion && c.streams>0).slice(0,60);
        render();
    });

    function render(){
        var html = '';
        canales.forEach((c,i)=>{
            html += `<div class="ch" onclick="play(${i})"><div class="n">${c.name}</div><div class="s">● FUSION</div></div>`;
        });
        document.getElementById('chlist').innerHTML = html;
    }

    var idx = 0;
    function play(i){
        idx = i;
        var c = canales[i];
        document.getElementById('info').textContent = '▶ ' + c.name;
        document.getElementById('video').src = c.url;
        document.getElementById('video').play();
        render();
    }
    function next(){ idx = (idx+1)%canales.length; play(idx); }
    function prev(){ idx = (idx-1+canales.length)%canales.length; play(idx); }
    function stop(){ document.getElementById('video').pause(); document.getElementById('video').src=''; document.getElementById('info').textContent = 'Parado'; }
    
    document.onkeydown = e => {
        if(e.keyCode==39||e.keyCode==40) next();
        if(e.keyCode==37||e.keyCode==38) prev();
        if(e.keyCode==13) play(idx);
        if(e.keyCode==27) stop();
    };
    </script>
</body>
</html>
