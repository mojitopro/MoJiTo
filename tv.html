<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; }
        #video { width: 100%; height: 100%; display: none; object-fit: contain; }
        .menu { padding: 15px; }
        .logo { font-size: 28px; text-align: center; margin: 10px 0; }
        .logo span { color: #dc143c; text-shadow: 0 0 10px #dc143c; }
        .msg { text-align: center; color: #dc143c; min-height: 20px; margin: 10px 0; font-size: 14px; }
        .list { height: 55vh; overflow-y: auto; }
        .ch { padding: 14px; border-bottom: 1px solid #222; color: #aaa; font-size: 14px; }
        .ch.hls { color: #4f4; }  /* Verde = HLS */
        .ch.astra { color: #f44; }  /* Rojo = Astra */
        .ch.focused { background: #222; border-left: 4px solid #dc143c; }
        .btn { padding: 12px 20px; background: #8b0000; border: none; color: #fff; font-size: 14px; margin: 5px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<video id="video" controls playsinline style="width:100%;height:100%;"></video>

<div id="menu" class="menu">
    <div class="logo"><span>MoJiTo</span> TV</div>
    <div class="msg" id="msg">↑↓ navegar | ENTER reproducir | Todos los canales</div>
    <div class="list" id="list"></div>
    <div style="margin-top:10px;">
        <button class="btn" onclick="prev()">◀ ANTERIOR</button>
        <button class="btn" onclick="play()">▶ PLAY</button>
        <button class="btn" onclick="next()">SIGUIENTE ▶</button>
        <button class="btn" onclick="stop()">■ STOP</button>
    </div>
</div>

<script>
var allStreams = [], idx = 0, focusedIdx = 0;
var video = document.getElementById('video');
var menu = document.getElementById('menu');
var elMsg = document.getElementById('msg');
var elList = document.getElementById('list');

fetch('/api/premium').then(r=>r.json()).then(d=>{
    allStreams = d.channels || [];
    elMsg.textContent = allStreams.length + ' canales - ↑↓ navegar';
    render();
});

function getType(url) {
    if(!url) return 'unknown';
    if(url.indexOf('.m3u8') > 0) return 'hls';
    if(url.indexOf(':8000') > 0 || url.indexOf(':8001') > 0 || url.indexOf(':18000') > 0 || url.indexOf(':19000') > 0) return 'astra';
    return 'direct';
}

function render() {
    var html = '';
    for(var i=0; i<allStreams.length; i++) {
        var type = getType(allStreams[i].url);
        var typeClass = type === 'hls' ? 'hls' : (type === 'astra' ? 'astra' : '');
        var focused = (i === focusedIdx) ? 'focused' : '';
        html += '<div class="ch ' + typeClass + ' ' + focused + '" id="ch' + i + '">' + allStreams[i].name + '</div>';
    }
    elList.innerHTML = html;
    var el = document.getElementById('ch' + focusedIdx);
    if(el) el.scrollIntoView({block: 'center'});
}

function play() {
    var ch = allStreams[focusedIdx];
    if(!ch) return;
    
    var url = ch.url || '';
    if(!url && ch.fallbacks && ch.fallbacks.length > 0) {
        url = ch.fallbacks[0];
    }
    
    if(!url) {
        elMsg.textContent = 'Sin URL: ' + ch.name;
        return;
    }
    
    elMsg.textContent = 'Intentando: ' + ch.name + ' (' + getType(url) + ')';
    
    video.src = url;
    video.style.display = 'block';
    menu.style.display = 'none';
    
    var playPromise = video.play();
    
    if(playPromise) {
        playPromise.then(function() {
            elMsg.textContent = '▶ Reproduciendo: ' + ch.name;
        }).catch(function(e) {
            elMsg.textContent = 'Error: ' + ch.name + ' - Intenta otro';
            // No volver al menu, dejar que intente de nuevo
        });
    }
    
    // Timeout - si no reproduce, mostrar mensaje
    setTimeout(function() {
        if(video.paused) {
            elMsg.textContent = 'No funciona: ' + ch.name + ' - ↑↓ para otro';
        }
    }, 5000);
}

function stop() {
    video.pause();
    video.src = '';
    video.style.display = 'none';
    menu.style.display = 'block';
    elMsg.textContent = 'Detenido';
}

function prev() {
    focusedIdx = Math.max(0, focusedIdx - 1);
    idx = focusedIdx;
    render();
    elMsg.textContent = allStreams[focusedIdx] ? allStreams[focusedIdx].name : '';
}

function next() {
    focusedIdx = Math.min(allStreams.length - 1, focusedIdx + 1);
    idx = focusedIdx;
    render();
    elMsg.textContent = allStreams[focusedIdx] ? allStreams[focusedIdx].name : '';
}

// Keyboard
document.addEventListener('keydown', function(e) {
    var k = e.keyCode;
    
    if(video.style.display === 'block') {
        if(k === 27) stop();  // ESC
        return;
    }
    
    if(k === 38 || k === 33 || k === 37) {  // Up, PageUp, Left
        e.preventDefault();
        prev();
    } else if(k === 40 || k === 34 || k === 39) {  // Down, PageDown, Right
        e.preventDefault();
        next();
    } else if(k === 13) {  // Enter
        e.preventDefault();
        play();
    } else if(k === 27) {  // ESC
        e.preventDefault();
        stop();
    }
});

// Click
elList.addEventListener('click', function(e) {
    if(e.target.classList.contains('ch')) {
        var id = e.target.id;
        if(id.startsWith('ch')) {
            focusedIdx = parseInt(id.substring(2));
            render();
            play();
        }
    }
});
</script>
</body>
</html>
