<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MoJiTo TV</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; }
        h1 { text-align: center; color: #0ff; margin: 10px 0; }
        #status { text-align: center; color: #f0f; min-height: 20px; margin: 10px 0; }
        .list { padding: 10px; }
        .ch { 
            background: #111; border: 1px solid #333; 
            padding: 15px; margin: 5px 0; 
            color: #888; font-size: 16px;
            cursor: pointer;
        }
        .ch:hover { background: #222; }
        .ch.active { background: #f0f; color: #000; border-color: #f0f; }
        #player { width: 100%; height: 300px; background: #111; border: 2px solid #0ff; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #333; }
    </style>
</head>
<body>
    <h1>MoJiTo TV</h1>
    <div id="status">Cargando...</div>
    <div class="list" id="list"></div>
    <div id="player"><div class="empty">Selecciona un canal</div></div>

    <script>
    var chs = [], idx = 0, playing = false;
    
    // Load channels
    fetch('/api/premium').then(r=>r.json()).then(d=>{
        chs = d.channels || [];
        document.getElementById('status').textContent = chs.length + ' canales - Click para ver';
        show();
    });
    
    function show() {
        var html = '';
        for(var i=0; i<chs.length; i++) {
            html += '<div class="ch" id="ch'+i+'" onclick="play('+i+')">'+chs[i].name+'</div>';
        }
        document.getElementById('list').innerHTML = html;
        highlight();
    }
    
    function highlight() {
        var els = document.querySelectorAll('.ch');
        for(var i=0; i<els.length; i++) els[i].classList.remove('active');
        if(els[idx]) {
            els[idx].classList.add('active');
            els[idx].scrollIntoView({block: 'center'});
        }
    }
    
    function play(i) {
        idx = i;
        var c = chs[i];
        if(!c) return;
        var url = c.url || (c.fallbacks && c.fallbacks[0]) || '';
        
        // Update highlight
        var els = document.querySelectorAll('.ch');
        for(var j=0; j<els.length; j++) els[j].classList.remove('active');
        document.getElementById('ch'+i).classList.add('active');
        
        if(url) {
            document.getElementById('player').innerHTML = '<iframe src="'+url+'" allow="autoplay"></iframe>';
            document.getElementById('status').textContent = 'Reproduciendo: ' + c.name;
            playing = true;
        } else {
            document.getElementById('player').innerHTML = '<div class="empty">Sin stream</div>';
            document.getElementById('status').textContent = 'Sin stream disponible: ' + c.name;
        }
    }
    
    // All input methods - simple version
    document.onkeyup = function(e) { 
        var code = e.keyCode || e.which;
        document.getElementById('status').textContent = 'Key: ' + code;
        
        if(code === 38 || code === 33) { idx = Math.max(0, idx-1); show(); }
        else if(code === 40 || code === 34) { idx = Math.min(chs.length-1, idx+1); show(); }
        else if(code === 13) { play(idx); }
    };
    
    // Also catch keydown
    document.onkeydown = function(e) { 
        e.preventDefault();
        var code = e.keyCode || e.which;
        document.getElementById('status').textContent = 'Key: ' + code;
        
        if(code === 38 || code === 33) { idx = Math.max(0, idx-1); show(); }
        else if(code === 40 || code === 34) { idx = Math.min(chs.length-1, idx+1); show(); }
        else if(code === 13) { play(idx); }
        else if(code === 27) { 
            document.getElementById('player').innerHTML = '<div class="empty">Selecciona un canal</div>';
            playing = false;
        }
    };
    </script>
</body>
</html>
