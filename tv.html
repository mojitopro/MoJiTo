<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoJiTo TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --primary:#e74c3c;
    --primary-dark:#c0392b;
    --secondary:#3498db;
    --accent:#f1c40f;
    --success:#2ecc71;
    --bg:#0d0d0d;
    --bg2:#141414;
    --bg3:#1e1e1e;
    --bg4:#2a2a2a;
    --text:#fff;
    --text2:#aaa;
    --text3:#666;
    --gradient:linear-gradient(135deg,var(--primary) 0%,#e74c3c 50%,#c0392b 100%);
    --shadow:0 10px 40px rgba(0,0,0,0.5);
    --glow:0 0 30px rgba(231,76,60,0.4);
}
html,body{
    width:100%;height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
    overflow:hidden;
    user-select:none;
    -webkit-font-smoothing:antialiased;
}

#app{display:flex;height:100%;position:relative}
#app.fullscreen{flex-direction:column}
#app.fullscreen #sidebar{display:none}

#sidebar{
    width:300px;
    background:var(--bg2);
    display:flex;
    flex-direction:column;
    border-right:1px solid #222;
    position:relative;
    z-index:10;
    transition:width 0.3s ease;
}

#sidebar.collapsed{width:70px}

#sidebar-header{
    padding:20px;
    background:linear-gradient(180deg,var(--bg3) 0%,var(--bg2) 100%);
    border-bottom:1px solid #222;
}

.logo{
    font-size:24px;font-weight:800;
    display:flex;align-items:center;gap:8px;
    margin-bottom:15px;
    letter-spacing:-0.5px;
}
.logo .sof{color:var(--primary)}
.logo .mojito{color:var(--text)}
.logo .tv{color:var(--text2);font-size:10px;font-weight:400}

#user-panel{
    display:flex;
    gap:8px;
    margin-bottom:12px;
}
.stat-card{
    flex:1;
    background:var(--bg);
    padding:10px;
    border-radius:10px;
    text-align:center;
    border:1px solid #2a2a2a;
    transition:all 0.3s;
}
.stat-card:hover{
    border-color:var(--primary);
    transform:translateY(-2px);
}
.stat-card .value{
    font-size:20px;font-weight:700;
    color:var(--accent);
    line-height:1;
}
.stat-card.streak .value{color:var(--success)}
.stat-card.streak.active{
    border-color:var(--success);
    box-shadow:0 0 20px rgba(46,204,113,0.3);
}
.stat-card .label{
    font-size:9px;color:var(--text3);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-top:4px;
}

#search-box{
    width:100%;
    padding:14px 18px;
    background:var(--bg);
    border:2px solid transparent;
    color:#fff;
    font-size:14px;
    border-radius:12px;
    outline:none;
    transition:all 0.3s;
}
#search-box:focus{
    border-color:var(--primary);
    box-shadow:var(--glow);
}

#channel-list{
    flex:1;
    overflow-y:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:4px;
}
#channel-list::-webkit-scrollbar{width:4px}
#channel-list::-webkit-scrollbar-track{background:transparent}
#channel-list::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.channel-item{
    padding:12px 15px;
    border-radius:10px;
    cursor:pointer;
    transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--bg3);
    border:1px solid transparent;
    position:relative;
}
.channel-item::before{
    content:'';
    position:absolute;
    left:0;top:50%;transform:translateY(-50%);
    width:4px;height:0;
    background:var(--gradient);
    border-radius:0 4px 4px 0;
    transition:height 0.2s;
}
.channel-item:hover{
    background:var(--bg4);
    transform:translateX(5px);
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}
.channel-item:hover::before{height:60%}
.channel-item.active{
    background:linear-gradient(90deg,rgba(231,76,60,0.15),transparent);
    border-color:rgba(231,76,60,0.3);
}
.channel-item.active::before{height:80%}
.channel-item .info{flex:1;min-width:0}
.channel-item .name{
    font-size:14px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.channel-item .meta{
    font-size:11px;color:var(--text3);
    display:flex;align-items:center;gap:8px;
    margin-top:3px;
}
.channel-item .live-badge{
    background:var(--success);
    padding:1px 5px;
    border-radius:3px;
    font-size:9px;font-weight:600;
}
.channel-item .quality{
    color:var(--accent);
    font-weight:600;
}

#recent-section{
    border-top:1px solid #222;
    padding:12px;
}
.section-header{
    font-size:11px;color:var(--text3);
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:10px;
    display:flex;align-items:center;gap:6px;
}
#recent-chips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}
.chip{
    background:var(--bg3);
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
    border:1px solid transparent;
    transition:all 0.2s;
    white-space:nowrap;
}
.chip:hover{
    background:var(--primary);
    border-color:var(--primary);
    transform:scale(1.05);
}

#main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
    background:#000;
}

#player-area{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:linear-gradient(135deg,#000 0%,#111 100%);
}
#video{
    width:100%;height:100%;
    object-fit:contain;
    background:#000;
}

#channel-preview{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.3s;
}
#channel-preview.show{opacity:1}
#channel-preview .name{
    font-size:48px;font-weight:800;
    text-shadow:0 0 30px rgba(0,0,0,0.8);
    animation:preview-bounce 0.5s ease;
}
@keyframes preview-bounce{
    0%{transform:scale(0.8);opacity:0}
    50%{transform:scale(1.1)}
    100%{transform:scale(1);opacity:1}
}
#channel-preview .quality{
    color:var(--accent);
    font-size:14px;
    margin-top:5px;
}

#no-signal{
    position:absolute;
    text-align:center;
    color:var(--text2);
    z-index:10;
}
#no-signal .icon{font-size:80px;margin-bottom:15px;opacity:0.3}
#no-signal .msg{font-size:20px;font-weight:300}

#info-bar{
    height:65px;
    background:linear-gradient(180deg,var(--bg2) 0%,#0a0a0a 100%);
    display:flex;
    align-items:center;
    padding:0 20px;
    gap:20px;
    border-top:1px solid #222;
}
#now-playing{flex:1;min-width:0}
#now-playing .title{
    font-size:16px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#now-playing .channel{
    font-size:12px;color:var(--text2);
    display:flex;align-items:center;gap:10px;
    margin-top:2px;
}
.live-indicator{
    width:8px;height:8px;
    background:var(--primary);
    border-radius:50%;
    animation:pulse-live 1.5s infinite;
}
@keyframes pulse-live{
    0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(231,76,60,0.7)}
    50%{opacity:0.8;box-shadow:0 0 0 6px rgba(231,76,60,0)}
}

#controls{
    display:flex;
    gap:8px;
}
.ctrl-btn{
    width:44px;height:44px;
    background:var(--bg3);
    border:none;
    color:#fff;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:all 0.2s;
    display:flex;
    align-items:center;
    justify-content:center;
}
.ctrl-btn:hover{
    background:var(--primary);
    transform:scale(1.1);
}
.ctrl-btn.active{
    background:var(--primary);
    box-shadow:var(--glow);
}
.ctrl-btn .count{
    position:absolute;
    top:-4px;right:-4px;
    background:var(--accent);
    color:#000;
    font-size:9px;font-weight:700;
    padding:2px 5px;
    border-radius:10px;
    min-width:16px;
    text-align:center;
}

#progress-bar{
    position:absolute;
    bottom:65px;left:0;right:0;
    height:3px;
    background:rgba(255,255,255,0.1);
    cursor:pointer;
}
#progress-fill{
    height:100%;
    background:var(--gradient);
    width:0;
    transition:width 0.1s linear;
}

#loading{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}
#loading.show{display:flex}
#loading .content{text-align:center}
#loading .logo-anim{
    font-size:48px;font-weight:800;
    margin-bottom:20px;
    animation:logo-pulse 1.5s infinite;
}
@keyframes logo-pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.7;transform:scale(0.98)}
}
#loading .logo-anim .sof{color:var(--primary)}
#loading .bar{
    width:200px;height:4px;
    background:#333;
    border-radius:2px;
    margin:0 auto;
    overflow:hidden;
}
#loading .bar-fill{
    height:100%;
    background:var(--gradient);
    width:0;
    animation:load-bar 2s ease forwards;
}
@keyframes load-bar{to{width:100%}}
#loading .tip{
    color:var(--text3);
    font-size:12px;
    margin-top:15px;
}

#toast{
    position:fixed;
    bottom:100px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(10px);
    padding:12px 24px;
    border-radius:30px;
    display:none;
    z-index:300;
    font-size:14px;
    border:1px solid rgba(255,255,255,0.1);
    opacity:0;
    transition:all 0.3s ease;
}
#toast.show{
    display:block;
    transform:translateX(-50%) translateY(0);
    opacity:1;
}

#achievement{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:linear-gradient(135deg,var(--bg2),#1e1e1e);
    padding:40px;
    border-radius:20px;
    text-align:center;
    z-index:500;
    border:2px solid var(--accent);
    box-shadow:0 0 60px rgba(241,196,15,0.3);
    opacity:0;
    pointer-events:none;
    transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
#achievement.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}
#achievement .icon{font-size:60px;margin-bottom:10px}
#achievement .title{
    color:var(--accent);
    font-size:16px;font-weight:700;
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:5px;
}
#achievement .desc{color:var(--text2);font-size:14px}

#notif-stack{
    position:fixed;
    top:20px;right:20px;
    z-index:400;
    display:flex;
    flex-direction:column;
    gap:10px;
    pointer-events:none;
}
.notif{
    background:linear-gradient(135deg,var(--bg3),var(--bg2));
    padding:14px 20px;
    border-radius:12px;
    font-size:13px;
    display:flex;
    align-items:center;
    gap:10px;
    border-left:4px solid var(--accent);
    box-shadow:var(--shadow);
    animation:notif-slide 0.4s ease,notif-fade 0.4s ease 2.5s forwards;
}
.notif .icon{font-size:18px}
@keyframes notif-slide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes notif-fade{to{transform:translateX(100%);opacity:0}}

#mini-guide{
    position:absolute;
    bottom:80px;
    left:20px;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px);
    padding:15px;
    border-radius:12px;
    font-size:11px;
    color:var(--text2);
    display:none;
    z-index:100;
}
#mini-guide.show{display:block}
#mini-guide .row{display:flex;align-items:center;gap:10px;margin:5px 0}
#mini-guide .key{
    background:var(--bg3);
    padding:4px 8px;
    border-radius:4px;
    font-weight:600;
    color:var(--text);
}

.fondo-animado{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    z-index:0;
    opacity:0.1;
    pointer-events:none;
}

@media (max-width: 768px){
    #sidebar{width:240px}
    #channel-preview .name{font-size:32px}
    .ctrl-btn{width:40px;height:40px;font-size:14px}
}
</style>
</head>
<body>

<div class="fondo-animado"></div>
<div id="notif-stack"></div>

<div id="achievement">
    <div class="icon" id="ach-icon">🏆</div>
    <div class="title" id="ach-title">Logro Desbloqueado</div>
    <div class="desc" id="ach-desc"></div>
</div>

<div id="loading">
    <div class="content">
        <div class="logo-anim"><span class="sof">SōF</span>MoJiTo</div>
        <div class="bar"><div class="bar-fill"></div></div>
        <div class="tip" id="load-tip">Cargando canales...</div>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <div id="sidebar-header">
            <div class="logo"><span class="sof">SōF</span><span class="mojito">MoJiTo</span><span class="tv"> TV</span></div>
            
            <div id="user-panel">
                <div class="stat-card streak active" id="streak-card">
                    <div class="value" id="stat-streak">0</div>
                    <div class="label">🔥 Racha</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-watch">0m</div>
                    <div class="label">⏱ Visto</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-channels">0</div>
                    <div class="label">📺 Canales</div>
                </div>
            </div>
            
            <input type="text" id="search-box" placeholder="Buscar canales..." autocomplete="off" spellcheck="false">
        </div>
        
        <div id="channel-list"></div>
        
        <div id="recent-section">
            <div class="section-header">⭐ Recientes</div>
            <div id="recent-chips"></div>
        </div>
    </div>
    
    <div id="main">
        <div id="player-area">
            <video id="video" playsinline></video>
            
            <div id="channel-preview">
                <div class="name" id="preview-name"></div>
                <div class="quality" id="preview-quality"></div>
            </div>
            
            <div id="no-signal">
                <div class="icon">📺</div>
                <div class="msg">Selecciona un canal para comenzar</div>
            </div>
            
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>
        
        <div id="info-bar">
            <div id="now-playing">
                <div class="title" id="np-title">Sin selección</div>
                <div class="channel">
                    <span id="np-channel">--</span>
                    <span id="np-live" style="display:none"><span class="live-indicator"></span> EN VIVO</span>
                </div>
            </div>
            <div id="controls">
                <button class="ctrl-btn" id="btn-prev" title="Anterior">◀</button>
                <button class="ctrl-btn" id="btn-next" title="Siguiente">▶</button>
                <button class="ctrl-btn" id="btn-zap" title="Zapping">⚡</button>
                <button class="ctrl-btn" id="btn-fav" title="Favorito">☆</button>
                <button class="ctrl-btn" id="btn-full" title="Fullscreen">⛶</button>
                <button class="ctrl-btn" id="btn-guide" title="Controles">?</button>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<div id="mini-guide">
    <div class="row"><span class="key">◀ ▶</span> Cambiar canal</div>
    <div class="row"><span class="key">⚡</span> Zapping rápido</div>
    <div class="row"><span class="key">⭐</span> Favorito</div>
    <div class="row"><span class="key">⛶</span> Pantalla completa</div>
    <div class="row"><span class="key">0-9</span> Canal directo</div>
    <div class="row"><span class="key">Space</span> Play/Pause</div>
</div>

<script>
var API_BASE = '/api';
var channels = [];
var filtered = [];
var current = null;
var streams = [];
var streamIdx = 0;
var selectedIdx = 0;
var mode = 'idle';
var zapInterval = null;
var watchStart = null;
var totalWatch = 0;
var watchedChannels = new Set();
var favorites = [];
var recentChannels = [];
var achievements = [];
var streakDays = 0;

var ACHIEVEMENTS = {
    first: {icon:'🎬',title:'Primer Canal',desc:'Viste tu primer canal'},
    marathon30: {icon:'🔥',title:'Maratonista',desc:'30 minutos seguidos'},
    marathon1h: {icon:'⚡',title:'Energía TV',desc:'1 hora de contenido'},
    explorer: {icon:'🧭',title:'Explorador',desc:'10 canales distintos'},
    nightOwl: {icon:'🦉',title:'Noctámbulo',desc:'Viste después de medianoche'},
    zap5: {icon:'⚡',title:'Zapping',desc:'5 canales en 30 segundos'},
    streak3: {icon:'🔥',title:'En Racha',desc:'3 días consecutivos'},
    streak7: {icon:'👑',title:'Maestro',desc:'7 días de racha'},
    favorite10: {icon:'💫',title:'Coleccionista',desc:'10 favoritos guardados'}
};

var TIPS = [
    'Usa ⚡ para zapping rápido',
    'Guarda favoritos con ⭐',
    'Cambia canales con ◀▶',
    'Presiona ? para ver controles',
    'Usa números 0-9 para acceso rápido',
    'Explora diferentes categorías'
];

var NAMES = ['Carlos','María','Juan','Ana','Pedro','Laura','Miguel','Sofía','Diego','Carmen'];
var LIVE_MSGS = ['está viendo','acaba de unirse','cambió a','marcó favorito'];

var video = document.getElementById('video');
var listEl = document.getElementById('channel-list');
var searchBox = document.getElementById('search-box');
var app = document.getElementById('app');
var npTitle = document.getElementById('np-title');
var npChannel = document.getElementById('np-channel');
var npLive = document.getElementById('np-live');
var previewEl = document.getElementById('channel-preview');
var previewName = document.getElementById('preview-name');
var previewQuality = document.getElementById('preview-quality');
var toastEl = document.getElementById('toast');
var noSignal = document.getElementById('no-signal');

var fondos = [
    "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUydzlra2lxdzRuODd0YWRxOW9tNjI5OTV3a3phMmU0cHhkemwyemN2ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/XvWz0PY5c7PjjbZ1hZ/giphy.gif",
    "https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyOTdub3BieHQwdGF0OXM4YjQybWhoNm5xeTB2M3FlN3N5anUxejd4ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uRxDeUFDWUx7frR8JB/giphy.gif",
    "https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyYTFhMTFlbGxub2UzZTgzODJkZnpoODd3YXBlc3pkbGxhcmpybWhhdSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/iWU4XWUNbsGZzqSNkP/giphy.gif"
];
document.querySelector('.fondo-animado').style.backgroundImage = "url('" + fondos[0] + "')";

function init(){
    loadStats();
    loadChannels();
    startLiveActivity();
    startTipRotation();
}

function loadStats(){
    try{
        var data = JSON.parse(localStorage.getItem('mojito_stats') || '{}');
        streakDays = data.streakDays || 0;
        totalWatch = data.totalWatch || 0;
        watchedChannels = new Set(data.watchedChannels || []);
        favorites = data.favorites || [];
        recentChannels = data.recent || [];
        achievements = data.achievements || [];
        checkStreak();
    }catch(e){}
    updateStats();
    renderRecent();
}

function saveStats(){
    localStorage.setItem('mojito_stats', JSON.stringify({
        streakDays: streakDays,
        totalWatch: totalWatch,
        watchedChannels: Array.from(watchedChannels),
        favorites: favorites,
        recent: recentChannels,
        achievements: achievements,
        lastVisit: Date.now()
    }));
}

function checkStreak(){
    var last = parseInt(localStorage.getItem('mojito_last_visit') || '0');
    var now = Date.now();
    var daysDiff = Math.floor((now - last) / 86400000);
    
    if(daysDiff > 1 && last > 0){
        streakDays = 0;
        showToast('⚠️ Racha reiniciada');
    } else if(daysDiff >= 1 && last > 0){
        streakDays++;
        if(streakDays >= 3) unlock('streak3');
        if(streakDays >= 7) unlock('streak7');
    }
    localStorage.setItem('mojito_last_visit', now.toString());
}

function updateStats(){
    document.getElementById('stat-streak').textContent = streakDays;
    document.getElementById('stat-watch').textContent = formatTime(totalWatch);
    document.getElementById('stat-channels').textContent = watchedChannels.size;
}

function formatTime(s){
    if(s < 60) return Math.floor(s) + 's';
    if(s < 3600) return Math.floor(s/60) + 'm';
    return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function unlock(key){
    if(achievements.includes(key)) return;
    achievements.push(key);
    var ach = ACHIEVEMENTS[key];
    if(ach){
        var popup = document.getElementById('achievement');
        document.getElementById('ach-icon').textContent = ach.icon;
        document.getElementById('ach-title').textContent = ach.title;
        document.getElementById('ach-desc').textContent = ach.desc;
        popup.classList.add('show');
        notify(ach.icon + ' ' + ach.title);
        setTimeout(() => popup.classList.remove('show'), 3000);
    }
    saveStats();
}

function notify(msg){
    var stack = document.getElementById('notif-stack');
    var n = document.createElement('div');
    n.className = 'notif';
    n.innerHTML = '<span class="icon">🔔</span><span>' + msg + '</span>';
    stack.appendChild(n);
    setTimeout(() => n.remove(), 3000);
}

function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2500);
}

function renderRecent(){
    var el = document.getElementById('recent-chips');
    el.innerHTML = '';
    recentChannels.slice(0, 8).forEach(ch => {
        var chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = ch.substring(0, 15);
        chip.onclick = () => playChannel(ch);
        el.appendChild(chip);
    });
    if(recentChannels.length === 0){
        el.innerHTML = '<span style="color:#666;font-size:11px">Sin historial</span>';
    }
}

function showLoading(){
    document.getElementById('load-tip').textContent = TIPS[Math.floor(Math.random()*TIPS.length)];
    document.getElementById('loading').classList.add('show');
}

function hideLoading(){
    document.getElementById('loading').classList.remove('show');
}

async function loadChannels(){
    showLoading();
    try{
        var data = await fetch(API_BASE + '/channels').then(r => r.json());
        channels = data.channels || [];
        filtered = [...channels];
        renderList();
        hideLoading();
        unlock('first');
        
        var last = localStorage.getItem('mojitolast');
        if(last && channels.includes(last)){
            selectIdx(channels.indexOf(last));
            playChannel(last);
        }
    }catch(e){
        hideLoading();
        showToast('Error: ' + e.message);
    }
}

function renderList(){
    listEl.innerHTML = '';
    filtered.forEach((ch, i) => {
        var div = document.createElement('div');
        div.className = 'channel-item' + (i === selectedIdx ? ' active' : '');
        
        var isFav = favorites.includes(ch);
        var isLive = Math.random() < 0.2;
        var quality = Math.random() < 0.3 ? '1080p' : (Math.random() < 0.5 ? '720p' : 'SD');
        
        div.innerHTML = `
            <div class="info">
                <div class="name">${ch}</div>
                <div class="meta">
                    ${isLive ? '<span class="live-badge">LIVE</span>' : ''}
                    <span class="quality">${quality}</span>
                </div>
            </div>
            ${isFav ? '<span style="color:#f1c40f">⭐</span>' : ''}
        `;
        
        div.onclick = () => {
            selectIdx(i);
            playChannel(ch);
        };
        
        listEl.appendChild(div);
    });
}

function selectIdx(i){
    selectedIdx = i;
    renderList();
    var el = listEl.children[i];
    if(el) el.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function filterChannels(){
    var q = searchBox.value.toLowerCase().trim();
    filtered = q ? channels.filter(c => c.toLowerCase().includes(q)) : [...channels];
    selectedIdx = 0;
    renderList();
}

async function playChannel(name){
    if(zapInterval){
        clearInterval(zapInterval);
        zapInterval = null;
        document.getElementById('btn-zap').classList.remove('active');
    }
    
    showPreview(name);
    
    current = name;
    watchStart = Date.now();
    watchedChannels.add(name);
    
    if(!recentChannels.includes(name)){
        recentChannels.unshift(name);
        if(recentChannels.length > 20) recentChannels.pop();
    }
    
    if(watchedChannels.size >= 10) unlock('explorer');
    if(favorites.length >= 10) unlock('favorite10');
    
    var h = new Date().getHours();
    if(h >= 0 && h < 5) unlock('nightOwl');
    
    mode = 'playing';
    noSignal.style.display = 'none';
    video.style.display = 'block';
    app.classList.add('fullscreen');
    
    npTitle.textContent = 'Cargando...';
    npChannel.textContent = name;
    npLive.style.display = 'inline';
    
    localStorage.setItem('mojitolast', name);
    saveStats();
    renderRecent();
    updateFavBtn();
    
    try{
        var data = await fetch(API_BASE + '/channel/' + encodeURIComponent(name)).then(r => r.json());
        
        if(data.stream){
            streams = [data.stream];
            if(data.stream.fallbacks){
                streams = streams.concat(data.stream.fallbacks.map(u => ({url: u})));
            }
            playStream(streams[0].url);
            npTitle.textContent = name;
            
            video.requestFullscreen?.() || video.webkitRequestFullscreen?.();
            
            setTimeout(() => {
                var viewers = Math.floor(Math.random() * 50) + 15;
                notify('👀 ' + viewers + ' viendo ahora');
            }, 2000);
        } else {
            var search = await fetch(API_BASE + '/search?q=' + encodeURIComponent(name)).then(r => r.json());
            if(search.streams?.length){
                streams = search.streams;
                playStream(streams[0].url);
                npTitle.textContent = streams[0].title || name;
            } else {
                showToast('Sin señal');
                mode = 'idle';
            }
        }
    }catch(e){
        showToast('Error');
        mode = 'idle';
    }
}

function showPreview(name){
    previewName.textContent = name;
    previewQuality.textContent = Math.random() < 0.3 ? 'HD 1080p' : 'HD 720p';
    previewEl.classList.add('show');
    setTimeout(() => previewEl.classList.remove('show'), 1000);
}

function playStream(url){
    streamIdx = 0;
    video.src = url;
    video.play().catch(() => {
        if(streamIdx < streams.length - 1){
            streamIdx++;
            showToast('Cambiando fuente...');
            playStream(streams[streamIdx].url);
        } else {
            showToast('Sin streams');
        }
    });
}

function nextChannel(){
    var next = (selectedIdx + 1) % filtered.length;
    selectIdx(next);
    playChannel(filtered[next]);
}

function prevChannel(){
    var prev = (selectedIdx - 1 + filtered.length) % filtered.length;
    selectIdx(prev);
    playChannel(filtered[prev]);
}

function startZap(){
    if(zapInterval){
        clearInterval(zapInterval);
        zapInterval = null;
        document.getElementById('btn-zap').classList.remove('active');
        return;
    }
    
    var zapCount = 0;
    var zapStart = Date.now();
    
    document.getElementById('btn-zap').classList.add('active');
    notify('⚡ Zapping rápido activado');
    
    zapInterval = setInterval(() => {
        nextChannel();
        zapCount++;
        
        if(zapCount >= 5 && (Date.now() - zapStart) < 30000){
            unlock('zap5');
        }
    }, 2000);
}

function toggleFav(){
    if(!current) return;
    
    var idx = favorites.indexOf(current);
    if(idx >= 0){
        favorites.splice(idx, 1);
        showToast('Eliminado de favoritos');
    } else {
        favorites.unshift(current);
        if(favorites.length > 30) favorites.pop();
        showToast('⭐ Guardado en favoritos');
    }
    
    saveStats();
    renderList();
    renderRecent();
    updateFavBtn();
}

function updateFavBtn(){
    var btn = document.getElementById('btn-fav');
    btn.textContent = favorites.includes(current) ? '★' : '☆';
}

function toggleFullscreen(){
    app.classList.toggle('fullscreen');
    if(app.classList.contains('fullscreen')){
        video.requestFullscreen?.() || video.webkitRequestFullscreen?.();
    } else if(document.fullscreenElement){
        document.exitFullscreen?.();
    }
}

function exitVideo(){
    if(watchStart){
        var elapsed = (Date.now() - watchStart) / 1000;
        totalWatch += elapsed;
        watchStart = null;
        
        if(elapsed >= 1800) unlock('marathon30');
        if(elapsed >= 3600) unlock('marathon1h');
        
        saveStats();
        updateStats();
    }
    
    if(zapInterval){
        clearInterval(zapInterval);
        zapInterval = null;
    }
    
    mode = 'idle';
    video.pause();
    video.src = '';
    video.style.display = 'none';
    noSignal.style.display = 'flex';
    app.classList.remove('fullscreen');
    npTitle.textContent = 'Sin selección';
    npChannel.textContent = '--';
    npLive.style.display = 'none';
    
    if(document.fullscreenElement){
        document.exitFullscreen?.();
    }
}

function startLiveActivity(){
    setInterval(() => {
        if(mode !== 'playing') return;
        
        var name = NAMES[Math.floor(Math.random() * NAMES.length)];
        var msg = LIVE_MSGS[Math.floor(Math.random() * LIVE_MSGS.length)];
        var viewers = Math.floor(Math.random() * 30) + 5;
        
        if(Math.random() < 0.2){
            notify('👤 ' + name + ' ' + msg + ' ' + current);
        }
    }, 8000);
}

function startTipRotation(){
    setInterval(() => {
        if(document.getElementById('loading').classList.contains('show')){
            document.getElementById('load-tip').textContent = TIPS[Math.floor(Math.random() * TIPS.length)];
        }
    }, 5000);
}

document.getElementById('btn-prev').onclick = prevChannel;
document.getElementById('btn-next').onclick = nextChannel;
document.getElementById('btn-zap').onclick = startZap;
document.getElementById('btn-fav').onclick = toggleFav;
document.getElementById('btn-full').onclick = toggleFullscreen;
document.getElementById('btn-guide').onclick = () => {
    document.getElementById('mini-guide').classList.toggle('show');
};

searchBox.addEventListener('input', filterChannels);
searchBox.addEventListener('keydown', e => e.stopPropagation());

document.addEventListener('keydown', e => {
    var k = e.key;
    var code = e.code;
    
    if(k === 'Escape'){
        if(document.getElementById('mini-guide').classList.contains('show')){
            document.getElementById('mini-guide').classList.remove('show');
        } else if(mode === 'playing'){
            exitVideo();
        }
        return;
    }
    
    if(mode === 'playing'){
        if(k === ' ' || k === 'Enter' || code === 'Play' || code === 'Pause'){
            video.paused ? video.play() : video.pause();
            showToast(video.paused ? '⏸ Pausado' : '▶ Reproduciendo');
            e.preventDefault();
        }
        
        if(code === 'ArrowUp' || code === 'ChannelUp'){
            nextChannel();
            e.preventDefault();
        }
        if(code === 'ArrowDown' || code === 'ChannelDown'){
            prevChannel();
            e.preventDefault();
        }
        
        if(k === 'ArrowRight'){
            video.currentTime += 10;
            showToast('+10s');
        }
        if(k === 'ArrowLeft'){
            video.currentTime -= 10;
            showToast('-10s');
        }
        
        if(k === 'f' || k === 'F'){
            toggleFav();
        }
        
        if(k === 'z' || k === 'Z'){
            startZap();
        }
    }
    
    if(mode === 'idle' || mode === 'playing'){
        if(code === 'ArrowUp'){
            if(selectedIdx > 0) selectIdx(selectedIdx - 1);
            e.preventDefault();
        }
        if(code === 'ArrowDown'){
            if(selectedIdx < filtered.length - 1) selectIdx(selectedIdx + 1);
            e.preventDefault();
        }
        
        if(k >= '0' && k <= '9'){
            var idx = parseInt(k);
            if(idx < filtered.length){
                selectIdx(idx);
                playChannel(filtered[idx]);
            }
        }
        
        if(k === 'Enter' && mode === 'idle'){
            if(selectedIdx >= 0){
                playChannel(filtered[selectedIdx]);
            }
        }
        
        if(k === 'r' || k === 'R'){
            var rand = filtered[Math.floor(Math.random() * filtered.length)];
            selectIdx(filtered.indexOf(rand));
            playChannel(rand);
        }
    }
    
    if(k === 'f' && mode !== 'video'){
        toggleFullscreen();
    }
    
    if(k === '?'){
        document.getElementById('mini-guide').classList.toggle('show');
    }
});

video.addEventListener('timeupdate', () => {
    if(video.duration){
        var pct = (video.currentTime / video.duration) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
    }
});

video.addEventListener('ended', () => {
    nextChannel();
});

document.getElementById('progress-bar').onclick = e => {
    if(video.duration){
        var rect = e.target.getBoundingClientRect();
        var pct = (e.clientX - rect.left) / rect.width;
        video.currentTime = pct * video.duration;
    }
};

document.addEventListener('fullscreenchange', () => {
    if(!document.fullscreenElement && app.classList.contains('fullscreen') && mode === 'idle'){
        app.classList.remove('fullscreen');
    }
});

window.addEventListener('beforeunload', () => {
    if(watchStart){
        totalWatch += (Date.now() - watchStart) / 1000;
        saveStats();
    }
});

init();
</script>
</body>
</html>
