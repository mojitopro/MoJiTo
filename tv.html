<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MoJiTo TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial}
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
#menu{padding:20px 10px;height:100%;display:flex;flex-direction:column}
.logo{font-size:36px;font-weight:bold;text-align:center;margin-bottom:10px}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #dc143c}
.logo .tv{color:#ff0000;font-size:16px;vertical-align:top;margin-left:3px}
#in{font-size:18px;padding:8px;background:transparent;border:1px solid #333;border-radius:5px;color:#888;text-align:center;width:70%;margin-bottom:8px}
#in:focus{color:#aaa;outline:none;border-color:#dc143c}
#msg{font-size:12px;padding:5px;color:#666;text-align:center;min-height:20px}

/* GRID */
#grid{flex:1;overflow-y:auto;padding:5px 0}
#grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.ch{background:#111;border:2px solid #222;border-radius:4px;padding:8px;cursor:pointer;min-height:40px;display:flex;flex-direction:column;justify-content:center}
.ch.sel{border-color:#dc143c;background:#1a0000}
.ch-name{font-size:10px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:8px;color:#555;text-transform:uppercase}

/* PAGES */
#pages{display:flex;justify-content:center;gap:8px;padding:8px;background:#111;flex-wrap:wrap}
.page-btn{padding:4px 10px;background:#222;border:1px solid #333;border-radius:10px;color:#666;font-size:10px;cursor:pointer}
.page-btn.sel{background:#dc143c;color:#000}
.page-btn:active{background:#8b0000}

/* Hints */
#hints{position:fixed;bottom:0;left:0;width:100%;background:#111;padding:5px;display:flex;justify-content:center;gap:15px;font-size:9px;color:#444}
#hints b{background:#1a1a1a;padding:2px 5px;border-radius:3px;color:#666}
</style>
</head>
<body>

<video id="video" controls></video>

<div id="menu">
<div class="logo"><span class="sof">SŌF</span><span class="mojito">MoJiTo</span><span class="tv">TV</span></div>
<input type="text" id="in" placeholder="Buscar..." maxlength="20">
<div id="msg">Flechas navega | OK selecciona</div>
<div id="grid"><div id="grid-inner"></div></div>
<div id="pages"></div>
</div>

<div id="hints">
<b>↑↓</b> Nav <b>←→</b> Pag <b>OK</b> Sel <b>BACK</b> Salir
</div>

<script>
var API=window.location.origin;
var allChans=[], pageChans=[], idx=0, page=1, perPage=40;

function log(m){document.getElementById('msg').textContent=m;}

function renderPage(){
    var start=(page-1)*perPage;
    var end=Math.min(start+perPage,allChans.length);
    pageChans=allChans.slice(start,end);
    
    var g=document.getElementById('grid-inner');
    g.innerHTML='';
    pageChans.forEach(function(c,i){
        var d=document.createElement('div');
        d.className='ch'+(i===idx?' sel':'');
        d.innerHTML='<div class="ch-name">'+c.name.substring(0,20)+'</div><div class="ch-cat">'+(c.category||'TV')+'</div>';
        d.onclick=function(){playChan(start+i);};
        g.appendChild(d);
    });
    
    // Page buttons
    var totalPages=Math.ceil(allChans.length/perPage);
    var p=document.getElementById('pages');
    p.innerHTML='';
    for(var i=1;i<=Math.min(totalPages,8);i++){
        var b=document.createElement('div');
        b.className='page-btn'+(i===page?' sel':'');
        b.textContent=i;
        b.onclick=function(){page=parseInt(this.textContent);idx=0;renderPage();};
        p.appendChild(b);
    }
    if(totalPages>8){
        var m=document.createElement('div');
        m.className='page-btn';
        m.textContent='...';
        p.appendChild(m);
    }
    
    var selIdx=(page-1)*perPage+idx;
    log((selIdx+1)+'/'+allChans.length+' - '+allChans[selIdx].name.substring(0,25));
}

function move(dir){
    var totalPages=Math.ceil(allChans.length/perPage);
    if(dir==='up'&&idx>0)idx--;
    if(dir==='down'&&idx<pageChans.length-1)idx++;
    if(dir==='left'&&page>1){page--;idx=0;renderPage();}
    if(dir==='right'&&page<totalPages){page++;idx=0;renderPage();}
    
    var selIdx=(page-1)*perPage+idx;
    document.querySelectorAll('.ch').forEach(function(c,i){c.classList.toggle('sel',i===idx);});
    log((selIdx+1)+'/'+allChans.length+' - '+allChans[selIdx].name.substring(0,25));
}

function playChan(i){
    var ch=allChans[i];
    if(!ch.name)return;
    log('Cargando...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'/api/stream/'+encodeURIComponent(ch.name),true);
    x.onreadystatechange=function(){
        if(x.readyState===4){
            try{
                var d=JSON.parse(x.responseText);
                if(d.url){
                    document.getElementById('video').src=d.url;
                    document.getElementById('video').style.display='block';
                    document.getElementById('menu').style.display='none';
                    document.getElementById('video').play();
                    log(ch.name);
                }else{log('Sin senal');}
            }catch(e){log('Error');}
        }
    };
    x.onerror=function(){log('Sin conexion');};
    x.send();
}

// Input
var txt='';
document.getElementById('in').oninput=function(){
    txt=this.value.toLowerCase();
    if(txt.length<2){loadAll();return;}
    var filtered=allChans.filter(function(c){return c.name.toLowerCase().indexOf(txt)>-1;});
    if(filtered.length>0){allChans=filtered;page=1;idx=0;renderPage();}
    else{log('Sin resultados');}
};

document.getElementById('in').onkeydown=function(e){
    if(e.key==='Enter'){
        var filtered=allChans.filter(function(c){return c.name.toLowerCase().indexOf(txt)>-1;});
        if(filtered.length>0 && idx<filtered.length)playChan((page-1)*perPage+idx);
    }
};

// Keyboard
document.onkeydown=function(e){
    var k=e.key;
    var v=document.getElementById('video');
    if(v.style.display==='block'){
        if(k==='Escape'){v.pause();v.style.display='none';document.getElementById('menu').style.display='flex';log('Cerrado');}
        return;
    }
    if(k==='ArrowDown'){e.preventDefault();move('down');}
    else if(k==='ArrowUp'){e.preventDefault();move('up');}
    else if(k==='ArrowLeft'){e.preventDefault();move('left');}
    else if(k==='ArrowRight'){e.preventDefault();move('right');}
    else if(k==='Enter'){playChan((page-1)*perPage+idx);}
    else if(k==='Backspace'||k==='Escape'){
        if(document.activeElement===document.getElementById('in')){document.getElementById('in').blur();}
        else{document.getElementById('video').style.display='none';document.getElementById('menu').style.display='flex';log('Cerrado');}
    }
};

// Load channels
function loadAll(){
    var x=new XMLHttpRequest();
    x.open('GET',API+'/api/channels',true);
    x.onreadystatechange=function(){
        if(x.readyState===4&&x.status===200){
            try{
                allChans=JSON.parse(x.responseText);
                allChans.sort(function(a,b){return a.name.localeCompare(b.name)});
                page=1;idx=0;
                renderPage();
            }catch(e){log('Error datos');}
        }
    };
    x.onerror=function(){log('Sin conexion - intenta de nuevo');};
    x.send();
}

loadAll();
console.log('MoJiTo ready');
</script>
</body>
</html>
