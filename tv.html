<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            overflow: hidden;
        }
        .crt {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
        }
        .container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }
        .sidebar {
            width: 280px;
            border: 2px solid #00ff41;
            padding: 15px;
            background: rgba(0,20,0,0.8);
        }
        .logo {
            font-size: 28px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff41;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px #00ff41; }
            50% { text-shadow: 0 0 20px #00ff41, 0 0 30px #00ff41; }
        }
        .cat-title {
            color: #ff00ff;
            font-size: 16px;
            margin: 15px 0 10px 0;
            border-bottom: 1px solid #ff00ff;
        }
        .nav-item {
            padding: 10px 15px;
            margin: 5px 0;
            cursor: pointer;
            border: 1px solid #004411;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background: #00ff41;
            color: #000;
            border-color: #00ff41;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .channels {
            flex: 1;
            border: 2px solid #00ff41;
            padding: 15px;
            overflow-y: auto;
            background: rgba(0,20,0,0.8);
        }
        .channel {
            padding: 12px 20px;
            margin: 8px 0;
            cursor: pointer;
            border: 1px solid #004411;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .channel:hover, .channel.active {
            background: #00ff41;
            color: #000;
        }
        .channel-name { font-size: 16px; }
        .channel-cat { font-size: 12px; opacity: 0.7; }
        .player {
            height: 60%;
            border: 2px solid #00ff41;
            background: #000;
            position: relative;
        }
        .player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .player-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 24px;
            color: #004400;
        }
        .controls {
            display: flex;
            gap: 10px;
            padding: 10px;
            border: 2px solid #00ff41;
            background: rgba(0,20,0,0.8);
        }
        .btn {
            padding: 10px 25px;
            border: 1px solid #00ff41;
            cursor: pointer;
            background: transparent;
            color: #00ff41;
            font-family: inherit;
            font-size: 14px;
        }
        .btn:hover { background: #00ff41; color: #000; }
        .btn:active { background: #00aa30; }
        .info { margin-left: auto; display: flex; align-items: center; gap: 20px; }
    </style>
</head>
<body>
    <div class="crt"></div>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
╔══════════════╗
║  MoJiTo TV  ║
║  ▓▓▓▓▓▓▓▓▓▓  ║
╚══════════════╝
</div>
            <div class="cat-title">CATEGORÍAS</div>
            <div class="nav-item active" data-cat="all" onclick="filter('all')">▸ Todos</div>
            <div class="nav-item" data-cat="deportes" onclick="filter('deportes')">▸ Deportes</div>
            <div class="nav-item" data-cat="premium" onclick="filter('premium')">▸ Premium</div>
            <div class="nav-item" data-cat="infantil" onclick="filter('infantil')">▸ Infantil</div>
            <div class="nav-item" data-cat="entretenimiento" onclick="filter('entretenimiento')">▸ Entretenimiento</div>
            <div class="nav-item" data-cat="peliculas" onclick="filter('peliculas')">▸ Películas</div>
            <div class="nav-item" data-cat="documentales" onclick="filter('documentales')">▸ Documentales</div>
            <div class="nav-item" data-cat="noticias" onclick="filter('noticias')">▸ Noticias</div>
            <div class="nav-item" data-cat="musica" onclick="filter('musica')">▸ Música</div>
            <div class="cat-title">FAVORITOS</div>
            <div id="favorites"></div>
        </div>
        <div class="main">
            <div class="channels" id="channelList"></div>
            <div class="player" id="player">
                <div class="player-empty">Selecciona un canal para reproducir</div>
            </div>
            <div class="controls">
                <button class="btn" onclick="playChannel()">▶ PLAY</button>
                <button class="btn" onclick="stopChannel()">■ STOP</button>
                <button class="btn" onclick="toggleFullscreen()">⛶ FULL</button>
                <div class="info">
                    <span id="status">Sin reproducir</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        var channels = [];
        var currentCat = 'all';
        var selectedIndex = 0;
        var isPlaying = false;
        
        fetch('/api/premium').then(r=>r.json()).then(d=>{
            channels = d.channels || [];
            renderChannels();
        });
        
        function filter(cat) {
            currentCat = cat;
            selectedIndex = 0;
            document.querySelectorAll('.nav-item').forEach(el=>{
                el.classList.remove('active');
                if(el.dataset.cat === cat) el.classList.add('active');
            });
            renderChannels();
        }
        
        function renderChannels() {
            var list = document.getElementById('channelList');
            var filtered = currentCat === 'all' ? channels : channels.filter(c=>c.category === currentCat);
            list.innerHTML = filtered.map((c,i)=>'
                <div class="channel'+(i===selectedIndex?' active':'')+'" onclick="play('+i+')" data-idx="'+i+'">
                    <span class="channel-name">'+c.name+'</span>
                    <span class="channel-cat">'+c.category+'</span>
                </div>
            ').join('');
        }
        
        function play(idx) {
            selectedIndex = idx;
            var filtered = currentCat === 'all' ? channels : channels.filter(c=>c.category === currentCat);
            var ch = filtered[idx];
            if(!ch) return;
            
            var url = ch.url;
            if(!url && ch.fallbacks && ch.fallbacks.length > 0) url = ch.fallbacks[0];
            
            document.getElementById('player').innerHTML = '<iframe src="'+url+'" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
            document.getElementById('status').textContent = 'Reproduciendo: ' + ch.name;
            isPlaying = true;
        }
        
        function playChannel() {
            play(selectedIndex);
        }
        
        function stopChannel() {
            document.getElementById('player').innerHTML = '<div class="player-empty">Selecciona un canal para reproducir</div>';
            document.getElementById('status').textContent = 'Sin reproducir';
            isPlaying = false;
        }
        
        function toggleFullscreen() {
            var el = document.documentElement;
            if(!document.fullscreenElement) {
                el.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        document.addEventListener('keydown', function(e) {
            var filtered = currentCat === 'all' ? channels : channels.filter(c=>c.category === currentCat);
            var total = filtered.length;
            
            if(e.key === 'ArrowUp') {
                selectedIndex = Math.max(0, selectedIndex - 1);
                renderChannels();
            } else if(e.key === 'ArrowDown') {
                selectedIndex = Math.min(total - 1, selectedIndex + 1);
                renderChannels();
            } else if(e.key === 'Enter') {
                play(selectedIndex);
            } else if(e.key === 'Escape') {
                stopChannel();
            }
        });
    </script>
</body>
</html>
