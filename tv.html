<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MoJiTo TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif}
#app{width:100%;height:100%;position:relative}

/* VIDEO */
#video{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:5;display:none}
#video.active{display:block}

/* MENU */
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;padding:0 15px;z-index:10;background:#000}
#menu.hidden{display:none}

/* FS */
#app.fs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999}
#app.fs #menu{display:none}

#fs-logo{position:fixed;top:10px;left:10px;font-size:12px;color:#dc143c;z-index:100;opacity:0.7;display:none}
#app.fs #fs-logo{display:block}

#fs-btns{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:8px 20px;border-radius:20px;z-index:100;display:none;gap:10px}
#app.fs #fs-btns{display:flex}
.fs-btn{background:#1a1a1a;color:#8b0000;border:1px solid #8b0000;padding:6px 15px;border-radius:15px;font-size:12px}

/* HEADER */
#header{height:50px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a1a}
.logo{font-size:28px;font-weight:bold;letter-spacing:-1px}
.logo .m{color:#dc143c;text-shadow:0 0 15px #dc143c,0 0 30px #8b0000}
.logo .t{color:#666;font-size:12px;vertical-align:super;margin-left:2px}
#ch-count{font-size:10px;color:#444;margin-left:auto}

/* TABS */
#tabs{display:flex;gap:4px;padding:6px 0;overflow-x:auto}
.tab{padding:5px 10px;background:#111;border:1px solid #222;border-radius:10px;font-size:10px;color:#555;cursor:pointer;flex-shrink:0}
.tab.sel{border-color:#dc143c;color:#dc143c;background:rgba(220,20,60,0.1)}

/* GRID */
#grid{flex:1;overflow-y:auto;padding:5px 0}
#grid-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}

.sel{border-color:#dc143c !important;background:#150000 !important;box-shadow:0 0 10px rgba(220,20,60,0.6) !important}

.ch{background:#0d0d0d;border:2px solid #1a1a1a;border-radius:4px;padding:6px;cursor:pointer;min-height:40px;display:flex;flex-direction:column;justify-content:center}
.ch-name{font-size:10px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:8px;color:#444;text-transform:uppercase;margin-top:2px}

/* MSG */
#msg{height:25px;display:flex;align-items:center;padding:0 5px;font-size:10px;color:#444;border-top:1px solid #111}

/* LOADER */
#loader-gif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;display:none}
#loader-gif.active{display:block}
#loader-gif img{width:80px;height:80px}

/* ERR */
#err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(80,0,0,0.95);padding:12px 24px;border-radius:8px;z-index:200;display:none;min-width:150px;text-align:center}
#err.active{display:block}
#err-msg{color:#dc143c;font-size:12px}
#err-btn{color:#888;font-size:10px;margin-top:5px}
</style>
</head>
<body>

<div id="app">
    <div id="fs-logo">MoJiTo</div>
    
    <video id="video" playsinline></video>
    
    <div id="fs-btns">
        <button class="fs-btn" id="btn-exit">VOLVER</button>
        <button class="fs-btn" id="btn-fs">PANTALLA</button>
    </div>
    
    <div id="menu">
        <div id="header">
            <div class="logo"><span class="m">MoJiTo</span><span class="t">tv</span></div>
            <div id="ch-count"></div>
        </div>
        
        <div id="tabs"></div>
        
        <div id="grid"><div id="grid-inner"></div></div>
        
        <div id="msg">flechas nav | OK sel | BACK sal</div>
    </div>
    
    <div id="loader-gif">
        <img src="https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyaGxzY3VqODl0a2RrenA3bGhxOW5kdnBzOTU1ZjIyamd5OHZoaGp2ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/BaDxVZichFuqhsWLId/giphy.gif">
    </div>
    
    <div id="err">
        <div id="err-msg">Sin senal</div>
        <div id="err-btn">OK para volver</div>
    </div>
</div>

{name:'Canal 13',urls:['https://vslive-ttv-lin.cdn.tv/13live/13live_live/playlist.m3u8'],category:'Chile'},
{name:'Caracol TV',urls:['https://stream.caracoltv.com/live/caracol_live/playlist.m3u8'],category:'Colombia'},
{name:'RCN',urls:['https://mdstrm.com/live-stream-playlist-58a4e8ce294cd55468000000.m3u8'],category:'Colombia'}
];

var filt=[],sel=0,curT=0,isFS=false,isWatch=false;
var COLS = 4;

function log(m){msg.textContent=m;}

function filterChans(){
    if(curT===0)filt=chans;
    else{
        var cat=CATS[curT].toLowerCase();
        filt=chans.filter(function(c){
            return (c.category||'').toLowerCase().indexOf(cat)>-1;
        });
    }
    sel=Math.min(sel,Math.max(0,filt.length-1));
}

function renderTabs(){
    tabsEl.innerHTML=CATS.map(function(c,i){
        return '<div class="tab'+(i===curT?' sel':'')+'" data-i="'+i+'">'+c+'</div>';
    }).join('');
}

function renderGrid(){
    gridInner.innerHTML='';
    filt.forEach(function(c,i){
        var d=document.createElement('div');
        d.className='ch'+(i===sel?' sel':'');
        d.innerHTML='<div class="ch-name">'+c.name+'</div><div class="ch-cat">'+(c.category||'General')+'</div>';
        gridInner.appendChild(d);
    });
    updateFocus();
}

function setTab(i){
    curT=i;
    filterChans();
    sel=0;
    renderTabs();
    renderGrid();
    log(filt.length+' canales');
}

function updateFocus(){
    var chs=gridInner.querySelectorAll('.ch');
    chs.forEach(function(c){c.classList.remove('sel');});
    if(sel>=0&&sel<chs.length){
        chs[sel].classList.add('sel');
        var rect = chs[sel].getBoundingClientRect();
        var container = grid.getBoundingClientRect();
        if(rect.top < container.top || rect.bottom > container.bottom){
            chs[sel].scrollIntoView({block:'nearest',behavior:'smooth'});
        }
    }
    if(filt[sel])log((sel+1)+'/'+filt.length+' - '+filt[sel].name);
}

function move(d){
    var max = filt.length - 1;
    if(d==='up'){if(sel>0)sel--;}
    else if(d==='down'){if(sel<max)sel++;}
    else if(d==='left'){if(sel>=COLS)sel-=COLS;}
    else if(d==='right'){if(sel+COLS<=max)sel+=COLS;}
    renderGrid();
    if(filt[sel])log((sel+1)+'/'+filt.length+' - '+filt[sel].name);
}

// PLAY CON CORS PROXY
function playStream(url, onSuccess, onFail){
    if(hls){hls.destroy();hls=null;}
    
    // Añadir proxy CORS
    var proxyUrl = CORS_PROXY + encodeURIComponent(url);
    
    if(url.indexOf('.m3u8') > -1){
        if(Hls.isSupported()){
            hls = new Hls();
            hls.loadSource(proxyUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function(){
                video.play().then(onSuccess).catch(onFail);
            });
            hls.on(Hls.Events.ERROR, function(event, data){
                if(data.fatal){
                    hls.destroy();hls=null;
                    onFail();
                }
            });
        }else if(video.canPlayType('application/vnd.apple.mpegurl')){
            video.src = proxyUrl;
            video.play().then(onSuccess).catch(onFail);
        }else{
            onFail();
        }
    }else{
        video.src = url;
        video.play().then(onSuccess).catch(onFail);
    }
}

function tryPlayUrls(urls, index, onSuccess, onFail){
    if(index>=urls.length || !urls || urls.length===0){
        onFail();
        return;
    }
    playStream(urls[index], onSuccess, function(){
        setTimeout(function(){tryPlayUrls(urls, index+1, onSuccess, onFail);}, 300);
    });
}

function watchChan(c){
    isWatch=true;
    video.pause();
    if(hls){hls.destroy();hls=null;}
    video.removeAttribute('src');
    video.load();
    video.style.display='none';
    video.classList.remove('active');
    err.classList.remove('active');
    loaderGif.classList.add('active');
    menu.classList.add('hidden');
    
    if(c.urls && c.urls.length>0){
        tryPlayUrls(c.urls, 0, function(){
            loaderGif.classList.remove('active');
            video.style.display='block';
            video.classList.add('active');
            log(c.name);
        }, function(){
            loaderGif.classList.remove('active');
            showErr();
        });
    }else{
        loaderGif.classList.remove('active');
        showErr();
    }
}

function showErr(){
    loaderGif.classList.remove('active');
    video.pause();
    if(hls){hls.destroy();hls=null;}
    video.removeAttribute('src');
    video.load();
    video.style.display='none';
    video.classList.remove('active');
    menu.classList.remove('hidden');
    err.classList.add('active');
    isWatch=false;
    renderGrid();
    log('Sin senal');
}

function backMenu(){
    video.pause();
    if(hls){hls.destroy();hls=null;}
    video.removeAttribute('src');
    video.load();
    video.style.display='none';
    video.classList.remove('active');
    menu.classList.remove('hidden');
    err.classList.remove('active');
    loaderGif.classList.remove('active');
    isWatch=false;
    isFS=false;
    app.classList.remove('fs');
    renderGrid();
    if(filt[sel])log((sel+1)+'/'+filt.length+' - '+filt[sel].name);
}

function toggleFS(){
    if(!isWatch)return;
    if(!isFS){
        var f=video.requestFullscreen||video.webkitRequestFullscreen;
        if(f)f.call(video);
        isFS=true;
        app.classList.add('fs');
    }else{
        var e=document.exitFullscreen||document.webkitExitFullscreen;
        if(e)e.call(document);
        isFS=false;
        app.classList.remove('fs');
    }
}

document.onkeydown=function(e){
    var k=e.keyCode||e.which;
    if([37,38,39,40,13,8,27,66,70].indexOf(k)>-1)e.preventDefault();
    if(k===8||k===27){if(isWatch)backMenu();return;}
    if(isWatch){
        if(k===13||k===66){if(err.classList.contains('active')){err.classList.remove('active');if(filt[sel])watchChan(filt[sel]);}else{backMenu();}}
        if(k===70)toggleFS();return;
    }
    if(k===38)move('up');
    else if(k===40)move('down');
    else if(k===37)move('left');
    else if(k===39)move('right');
    else if(k===13||k===66){if(filt[sel])watchChan(filt[sel]);}
};

tabsEl.onclick=function(e){
    var t=e.target;
    if(t.className.indexOf('tab')>-1)setTab(parseInt(t.dataset.i));
};

document.addEventListener('fullscreenchange',function(){
    isFS=!!document.fullscreenElement;
    app.classList.toggle('fs',isFS);
});

video.onerror=showErr;

document.getElementById('btn-exit').onclick=backMenu;
document.getElementById('btn-fs').onclick=toggleFS;

var tx=0,ty=0;
document.ontouchstart=function(e){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
};
document.ontouchend=function(e){
    var dx=tx-e.changedTouches[0].clientX;
    var dy=ty-e.changedTouches[0].clientY;
    if(Math.abs(dx)>30)dx>0?move('left'):move('right');
    else if(Math.abs(dy)>30)dy>0?move('up'):move('down');
};

chCount.textContent=chans.length+' canales';
filterChans();
renderTabs();
renderGrid();
log('Listo - CORS proxy');

console.log('MoJiTo ready');
})();
</script>
