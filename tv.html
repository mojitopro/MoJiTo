<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SŌF MOJITO TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial}
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
#menu{padding:50px 10px 0 10px;height:100%;display:flex;flex-direction:column;align-items:center}
.logo{font-size:72px;font-weight:bold;text-align:center;line-height:1}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000,0 0 20px #8b0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #ff0000,0 0 20px #dc143c}
.logo .tv{color:#ff0000;font-size:32px;vertical-align:top;margin-left:5px;text-shadow:0 0 10px #ff0000}
#in{font-size:32px;padding:20px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:20px;outline:none;text-shadow:0 0 5px rgba(255,0,0,0.3)}
#in.focused{color:#aaa;text-shadow:0 0 10px rgba(255,0,0,0.5)}
#msg{font-size:20px;padding:15px;color:#8b0000;min-height:30px}
.error{color:#ff0000}
.info{color:#dc143c}
.hidden{display:none}
select{font-size:20px;width:100%;padding:15px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;margin-top:20px;height:300px}
option{background:#1a1a1a;color:#aaa;padding:12px}
option:checked,option:focus,option:selected{background:#0066cc;color:#fff}
</style>
</head>
<body>

<video id="video" controls></video>

<div id="menu">
<div class="logo"><span class="sof">SōF</span><span class="mojito"> MoJiTo</span><span class="tv"> TV</span></div>
<div id="in">Escribe el canal...</div>
<div id="msg" class="info">↑↓ navegar | ENTER reproducir</div>
<select id="results" size="10" class="hidden"></select>
</div>

<script>
var API='/api/search';
var streams=[], idx=0, txt='', page=1, hasMore=false, loading=false;
var elIn=document.getElementById('in'), elSel=document.getElementById('results'), elMsg=document.getElementById('msg'), elMenu=document.getElementById('menu'), elVideo=document.getElementById('video');

function log(m,t){elMsg.textContent=m;elMsg.className=t||'info'}

function ql(t){
    if(/1080|4k|uhd/i.test(t))return' [1080p]';
    if(/720|hd/i.test(t))return' [HD]';
    return' [SD]';
}

function renderIn(){elIn.textContent=txt||'Escribe el canal...';}

function playStream(i){
    var s=streams[i];
    if(!s)return;
    elVideo.src=s.url;
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.play().then(function(){log('✓ '+s.title.substring(0,30));}).catch(function(){log('Error');});
}

function buscar(){
    if(!txt.trim())return;
    log('Buscando...');
    elSel.innerHTML='';streams=[];page=1;
    fetch(API+'?q='+encodeURIComponent(txt)).then(function(r){return r.json()}).then(function(d){
        if(d.error){log('Error: '+d.error);return;}
        showStreams(d.streams||[],d.hasMore);
    }).catch(function(e){log('Error');});
}

function showStreams(data,more){
    if(!data||!data.length){log('Sin resultados');return;}
    hasMore=more;
    data.sort(function(a,b){
        var ga=/1080|4k|uhd/i.test(a.title)?3:(/720|hd/i.test(a.title)?2:1);
        var gb=/1080|4k|uhd/i.test(b.title)?3:(/720|hd/i.test(b.title)?2:1);
        return gb-ga;
    });
    streams=data;idx=-1;elSel.innerHTML='';elSel.classList.remove('hidden');
    data.forEach(function(s,i){
        elSel.add(new Option((i+1)+'. '+s.title.substring(0,50)+ql(s.title),i));
    });
    log(streams.length+' streams');
}

document.addEventListener('keydown',function(e){
    var k=e.key;
    if(elVideo.style.display==='block'){
        if(k==='Escape'){elVideo.pause();elVideo.style.display='none';elMenu.style.display='flex';log('Cerrado');}
        else if(k==='ArrowRight'){var n=idx+1;n<streams.length?playStream(n):log('Fin');}
        else if(k==='ArrowLeft'){var p=idx-1;p>=0?playStream(p):log('Inicio');}
        return;
    }
    if(k==='ArrowDown'){
        if(idx<streams.length-1){idx++;elSel.value=idx;elSel.selectedIndex=idx;log(streams[idx].title.substring(0,40));}
    }else if(k==='ArrowUp'){
        if(idx>0){idx--;elSel.value=idx;elSel.selectedIndex=idx;log(streams[idx].title.substring(0,40));}
    }else if(k==='Enter'){
        if(idx>=0&&streams[idx])playStream(idx);
        else if(txt){buscar();}
    }else if(k==='Backspace'){txt=txt.slice(0,-1);renderIn();idx=-1;elSel.innerHTML='';}
    else if(k.length===1){txt+=k;renderIn();}
});

elSel.addEventListener('change',function(){idx=parseInt(elSel.value);playStream(idx);});

renderIn();
</script>
</body>
</html>
