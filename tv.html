<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --magenta: #ff00ff;
            --cyan: #00ffff;
            --green: #00ff41;
            --yellow: #ffff00;
            --red: #ff3333;
        }
        html, body {
            height: 100%;
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: var(--green);
            overflow: hidden;
        }
        .crt {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
        }
        .container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }
        .sidebar {
            width: 280px;
            border: 2px solid var(--magenta);
            padding: 15px;
            background: rgba(20,0,20,0.9);
        }
        .logo {
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
            color: var(--cyan);
            text-shadow: 2px 2px var(--magenta);
        }
        .cat-title {
            color: var(--magenta);
            font-size: 14px;
            margin: 12px 0 8px 0;
            border-bottom: 1px solid var(--magenta);
            padding-bottom: 5px;
        }
        .nav-item {
            padding: 8px 12px;
            margin: 4px 0;
            cursor: pointer;
            border: 1px solid #330033;
            color: #888;
            transition: all 0.15s;
        }
        .nav-item:hover, .nav-item:focus, .nav-item.active {
            background: var(--magenta);
            color: #000;
            border-color: var(--magenta);
            outline: none;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .channels {
            flex: 1;
            border: 2px solid var(--magenta);
            padding: 15px;
            overflow-y: auto;
            background: rgba(20,0,20,0.9);
        }
        .channel {
            padding: 10px 15px;
            margin: 6px 0;
            cursor: pointer;
            border: 1px solid #330033;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
        }
        .channel:hover, .channel:focus, .channel.active {
            background: var(--magenta);
            color: #000;
            border-color: var(--magenta);
            outline: none;
        }
        .channel-name { font-size: 14px; }
        .channel-cat { font-size: 11px; opacity: 0.7; }
        .player {
            height: 60%;
            border: 2px solid var(--cyan);
            background: #000;
            position: relative;
        }
        .player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .player-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 24px;
            color: #004400;
        }
        .controls {
            display: flex;
            gap: 10px;
            padding: 10px;
            border: 2px solid #00ff41;
            background: rgba(0,20,0,0.8);
        }
        .btn {
            padding: 10px 25px;
            border: 1px solid #00ff41;
            cursor: pointer;
            background: transparent;
            color: #00ff41;
            font-family: inherit;
            font-size: 14px;
        }
        .btn:hover { background: #00ff41; color: #000; }
        .btn:active { background: #00aa30; }
        .info { margin-left: auto; display: flex; align-items: center; gap: 20px; color: var(--cyan); }
        .btn { padding: 10px 25px; border: 1px solid var(--cyan); cursor: pointer; background: transparent; color: var(--cyan); font-family: inherit; font-size: 14px; }
        .btn:hover, .btn:focus, .btn:active { background: var(--cyan); color: #000; outline: none; }
    </style>
</head>
<body>
    <div class="crt"></div>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
╔══════════════╗
║  MoJiTo TV  ║
║  ▓▓▓▓▓▓▓▓▓▓  ║
╚══════════════╝
</div>
            <div class="cat-title">CATEGORÍAS</div>
            <div class="nav-item active" data-cat="all" tabindex="0">▸ Todos</div>
            <div class="nav-item" data-cat="deportes" tabindex="0">▸ Deportes</div>
            <div class="nav-item" data-cat="premium" tabindex="0">▸ Premium</div>
            <div class="nav-item" data-cat="infantil" tabindex="0">▸ Infantil</div>
            <div class="nav-item" data-cat="entretenimiento" tabindex="0">▸ Entretenimiento</div>
            <div class="nav-item" data-cat="peliculas" tabindex="0">▸ Películas</div>
            <div class="nav-item" data-cat="documentales" tabindex="0">▸ Documentales</div>
            <div class="nav-item" data-cat="noticias" tabindex="0">▸ Noticias</div>
            <div class="nav-item" data-cat="musica" tabindex="0">▸ Música</div>
            <div class="cat-title">FAVORITOS</div>
            <div id="favorites"></div>
        </div>
        <div class="main">
            <div class="channels" id="channelList"></div>
            <div class="player" id="player">
                <div class="player-empty">Selecciona un canal para reproducir</div>
            </div>
            <div class="controls">
                <button class="btn" onclick="playChannel()">▶ PLAY</button>
                <button class="btn" onclick="stopChannel()">■ STOP</button>
                <button class="btn" onclick="toggleFullscreen()">⛶ FULL</button>
                <div class="info">
                    <span id="status">Sin reproducir</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        var channels = [];
        var currentCat = 'all';
        var selectedIndex = 0;
        var isPlaying = false;
        var inSidebar = false;
        
        fetch('/api/premium').then(r=>r.json()).then(d=>{
            channels = d.channels || [];
            renderChannels();
            document.querySelector('.nav-item').focus();
        });
        
        function filter(cat) {
            currentCat = cat;
            selectedIndex = 0;
            document.querySelectorAll('.nav-item').forEach(el=>{
                el.classList.remove('active');
                el.setAttribute('tabindex', '-1');
                if(el.dataset.cat === cat) {
                    el.classList.add('active');
                    el.setAttribute('tabindex', '0');
                }
            });
            renderChannels();
        }
        
        function renderChannels() {
            var list = document.getElementById('channelList');
            var filtered = currentCat === 'all' ? channels : channels.filter(c=>c.category === currentCat);
            list.innerHTML = filtered.map((c,i)=>'
                <div class="channel'+(i===selectedIndex?' active':'')+'" tabindex="0" ondblclick="play('+i+')">
                    <span class="channel-name">'+c.name+'</span>
                    <span class="channel-cat">'+c.category+'</span>
                </div>
            ').join('');
            
            // Scroll to selected
            var active = list.querySelector('.active');
            if(active) active.scrollIntoView({block: 'center'});
        }
        
        function play(idx) {
            var filtered = currentCat === 'all' ? channels : channels.filter(c=>c.category === currentCat);
            var ch = filtered[idx];
            if(!ch) return;
            
            var url = ch.url;
            if(!url && ch.fallbacks && ch.fallbacks.length > 0) url = ch.fallbacks[0];
            
            document.getElementById('player').innerHTML = '<iframe src="'+url+'" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
            document.getElementById('status').textContent = 'Reproduciendo: ' + ch.name;
            isPlaying = true;
        }
        
        function playChannel() {
            play(selectedIndex);
        }
        
        function stopChannel() {
            document.getElementById('player').innerHTML = '<div class="player-empty">Selecciona un canal para reproducir</div>';
            document.getElementById('status').textContent = 'Sin reproducir';
            isPlaying = false;
        }
        
        function toggleFullscreen() {
            var el = document.documentElement;
            if(!document.fullscreenElement) {
                el.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        document.addEventListener('keydown', function(e) {
            var filtered = currentCat === 'all' ? channels : channels.filter(c=>c.category === currentCat);
            var total = filtered.length;
            
            // Left/Right to switch between sidebar and channels
            if(e.key === 'ArrowRight') {
                e.preventDefault();
                inSidebar = false;
                document.getElementById('channelList').querySelector('.channel')?.focus();
            } else if(e.key === 'ArrowLeft') {
                e.preventDefault();
                inSidebar = true;
                document.querySelector('.nav-item.active, .nav-item')?.focus();
            } else if(e.key === 'ArrowUp') {
                e.preventDefault();
                if(inSidebar || document.activeElement.classList.contains('nav-item')) {
                    var navs = document.querySelectorAll('.nav-item');
                    var idx = Array.from(navs).findIndex(n => n === document.activeElement);
                    if(idx > 0) navs[idx-1].focus();
                } else {
                    selectedIndex = Math.max(0, selectedIndex - 1);
                    renderChannels();
                    document.getElementById('channelList').querySelector('.active')?.focus();
                }
            } else if(e.key === 'ArrowDown') {
                e.preventDefault();
                if(inSidebar || document.activeElement.classList.contains('nav-item')) {
                    var navs = document.querySelectorAll('.nav-item');
                    var idx = Array.from(navs).findIndex(n => n === document.activeElement);
                    if(idx < navs.length-1) navs[idx+1].focus();
                } else {
                    selectedIndex = Math.min(total - 1, selectedIndex + 1);
                    renderChannels();
                    document.getElementById('channelList').querySelector('.active')?.focus();
                }
            } else if(e.key === 'Enter') {
                e.preventDefault();
                if(document.activeElement.classList.contains('nav-item')) {
                    filter(document.activeElement.dataset.cat);
                } else {
                    play(selectedIndex);
                }
            } else if(e.key === 'Escape') {
                e.preventDefault();
                if(isPlaying) {
                    stopChannel();
                } else {
                    document.querySelector('.nav-item')?.focus();
                }
            }
        });
    </script>
</body>
</html>
