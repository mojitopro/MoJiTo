<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoJiTo TV</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh;user-select:none}
        #video-container{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1}
        #video{width:100%;height:100%;object-fit:contain}
        #overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,0.7) 0%,transparent 20%,transparent 80%,rgba(0,0,0,0.9) 100%)}
        #top-bar{position:fixed;top:0;left:0;width:100%;padding:15px 20px;z-index:10;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent)}
        #channel-name{font-size:28px;font-weight:bold;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.8)}
        #channel-number{font-size:18px;color:#f39c12;margin-left:15px;padding:5px 12px;border:2px solid #f39c12;border-radius:5px}
        #stats{display:flex;gap:20px;font-size:14px;color:#aaa}
        .stat{display:flex;flex-direction:column;align-items:center}
        .stat-value{font-size:20px;font-weight:bold;color:#f39c12}
        #bottom-bar{position:fixed;bottom:0;left:0;width:100%;padding:15px 20px;z-index:10;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent)}
        #now-playing{font-size:14px;color:#888;margin-bottom:10px}
        #controls{display:flex;justify-content:center;gap:15px;flex-wrap:wrap}
        .ctrl{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 15px;border-radius:5px;font-size:12px;cursor:pointer;pointer-events:auto}
        .ctrl:hover,.ctrl.active{background:#f39c12;color:#000;border-color:#f39c12}
        #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;display:none}
        #loading.active{display:block}
        .spinner{width:60px;height:60px;border:4px solid rgba(255,255,255,0.1);border-top-color:#f39c12;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #channel-list{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:rgba(10,10,10,0.98);display:none;overflow-y:auto}
        #channel-list.active{display:block}
        #list-header{padding:20px;background:#1a1a1a;position:sticky;top:0;z-index:10}
        #search{width:100%;padding:12px 15px;background:#2a2a2a;border:1px solid #444;color:#fff;font-size:16px;border-radius:8px}
        #categories{display:flex;gap:10px;padding:15px 20px;overflow-x:auto;background:#1a1a1a;position:sticky;top:70px;z-index:9}
        .cat{background:#2a2a2a;padding:8px 15px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;border:1px solid transparent}
        .cat:hover,.cat.active{background:#f39c12;color:#000}
        #channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;padding:20px}
        .ch-item{background:#1a1a1a;border-radius:10px;padding:15px;cursor:pointer;border:2px solid transparent;transition:all 0.2s}
        .ch-item:hover,.ch-item.selected{border-color:#f39c12;background:#252525}
        .ch-name{font-size:16px;font-weight:bold;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ch-cat{font-size:11px;color:#888;text-transform:uppercase}
        .ch-streams{font-size:10px;color:#f39c12;margin-top:5px}
        #error-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(200,0,0,0.9);padding:20px 40px;border-radius:10px;z-index:200;display:none;font-size:18px}
        #error-toast.active{display:block}
        #fullscreen-hint{position:fixed;top:20px;right:20px;background:rgba(0,0,0,0.7);padding:10px 15px;border-radius:8px;font-size:12px;z-index:10;display:none}
        #remote-hints{position:fixed;bottom:80px;right:20px;background:rgba(0,0,0,0.7);padding:15px;border-radius:8px;font-size:11px;z-index:10;display:none;line-height:1.8}
        .hint-key{background:#333;padding:2px 8px;border-radius:3px;margin-right:5px}
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>
    <div id="overlay"></div>
    
    <div id="top-bar">
        <div style="display:flex;align-items:center">
            <div id="channel-name">MoJiTo</div>
            <div id="channel-number"></div>
        </div>
        <div id="stats">
            <div class="stat"><span class="stat-value" id="streak">0</span><span>Racha</span></div>
            <div class="stat"><span class="stat-value" id="watch-time">0:00</span><span>Visto</span></div>
            <div class="stat"><span class="stat-value" id="ch-count">0</span><span>Canales</span></div>
        </div>
    </div>
    
    <div id="loading"><div class="spinner"></div></div>
    <div id="error-toast">Stream no disponible</div>
    <div id="fullscreen-hint">Presiona [ ] para pantalla completa</div>
    <div id="remote-hints">
        <span class="hint-key">&lt;</span><span class="hint-key">&gt;</span> Canales<br>
        <span class="hint-key">OK</span> Seleccionar<br>
        <span class="hint-key">BACK</span> Salir<br>
        <span class="hint-key">[ ]</span> Pantalla completa<br>
        <span class="hint-key">Z</span> Zapping rapido
    </div>
    
    <div id="bottom-bar">
        <div id="now-playing"></div>
        <div id="controls">
            <button class="ctrl" onclick="toggleChannelList()">Canales</button>
            <button class="ctrl" onclick="prevChannel()">&lt; Anterior</button>
            <button class="ctrl" onclick="nextChannel()">Siguiente &gt;</button>
            <button class="ctrl" onclick="toggleFullscreen()">[ ] Pantalla Completa</button>
            <button class="ctrl" onclick="toggleFavorites()">* Favoritos</button>
            <button class="ctrl" onclick="zapMode()">Z Zapping</button>
        </div>
    </div>
    
    <div id="channel-list">
        <div id="list-header">
            <input type="text" id="search" placeholder="Buscar canal..." oninput="filterChannels()">
        </div>
        <div id="categories"></div>
        <div id="channels-grid"></div>
    </div>

    <script>
        const API_BASE = '';
        let channels = [];
        let filteredChannels = [];
        let currentIndex = 0;
        let streak = parseInt(localStorage.getItem('streak') || '0');
        let watchStart = Date.now();
        let watchTime = 0;
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let zapInterval = null;
        let zapSpeed = 3000;
        
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');
        const errorToast = document.getElementById('error-toast');
        
        // Inicializar
        async function init() {
            loading.classList.add('active');
            try {
                const res = await fetch(API_BASE + '/api/channels');
                channels = await res.json();
                filteredChannels = [...channels];
                document.getElementById('ch-count').textContent = channels.length;
                renderCategories();
                renderChannels();
                updateStats();
                showRemoteHints();
                // Auto-play first channel
                if (channels.length > 0) {
                    selectChannel(0);
                }
            } catch(e) {
                console.error('Error loading channels:', e);
            }
            loading.classList.remove('active');
        }
        
        function showRemoteHints() {
            const hints = document.getElementById('remote-hints');
            hints.style.display = 'block';
            setTimeout(() => hints.style.display = 'none', 8000);
        }
        
        function renderCategories() {
            const cats = [...new Set(channels.map(c => c.category || 'General'))];
            const container = document.getElementById('categories');
            container.innerHTML = `<span class="cat active" onclick="filterByCategory('all')">Todos</span>`;
            cats.forEach(cat => {
                container.innerHTML += `<span class="cat" onclick="filterByCategory('${cat}')">${cat}</span>`;
            });
        }
        
        function filterByCategory(cat) {
            document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            if (cat === 'all') {
                filteredChannels = [...channels];
            } else {
                filteredChannels = channels.filter(c => (c.category || 'General') === cat);
            }
            renderChannels();
        }
        
        function filterChannels() {
            const q = document.getElementById('search').value.toLowerCase();
            filteredChannels = channels.filter(c => c.name.toLowerCase().includes(q));
            renderChannels();
        }
        
        function renderChannels() {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = filteredChannels.map((ch, i) => `
                <div class="ch-item ${i === currentIndex ? 'selected' : ''}" onclick="selectChannelById('${ch.id}')">
                    <div class="ch-name">${ch.name}</div>
                    <div class="ch-cat">${ch.category || 'General'}</div>
                    <div class="ch-streams">${ch.streams || 1} stream${ch.streams > 1 ? 's' : ''}</div>
                </div>
            `).join('');
        }
        
        async function selectChannel(index) {
            if (index < 0 || index >= filteredChannels.length) return;
            currentIndex = index;
            const ch = filteredChannels[index];
            playChannel(ch);
            renderChannels();
        }
        
        async function selectChannelById(id) {
            const idx = filteredChannels.findIndex(c => c.id == id);
            if (idx >= 0) {
                currentIndex = idx;
                toggleChannelList();
                const ch = filteredChannels[idx];
                playChannel(ch);
                renderChannels();
            }
        }
        
        async function playChannel(ch) {
            loading.classList.add('active');
            document.getElementById('channel-name').textContent = ch.name;
            document.getElementById('channel-number').textContent = '#' + (currentIndex + 1);
            document.getElementById('now-playing').textContent = `Reproduciendo: ${ch.name}`;
            
            try {
                const res = await fetch(API_BASE + `/api/stream/${encodeURIComponent(ch.name)}`);
                const data = await res.json();
                
                if (data.url) {
                    video.src = data.url;
                    video.play().catch(e => {
                        // Try next stream if available
                        if (data.fallbacks && data.fallbacks.length > 0) {
                            video.src = data.fallbacks[0];
                            video.play().catch(() => showError());
                        } else {
                            showError();
                        }
                    });
                    incrementStreak();
                } else {
                    showError();
                }
            } catch(e) {
                showError();
            }
            loading.classList.remove('active');
        }
        
        function showError() {
            errorToast.classList.add('active');
            setTimeout(() => errorToast.classList.remove('active'), 2000);
        }
        
        function incrementStreak() {
            streak++;
            localStorage.setItem('streak', streak);
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('streak').textContent = streak;
            const elapsed = Math.floor((Date.now() - watchStart) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('watch-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function toggleChannelList() {
            document.getElementById('channel-list').classList.toggle('active');
        }
        
        function prevChannel() {
            selectChannel(currentIndex - 1);
        }
        
        function nextChannel() {
            selectChannel(currentIndex + 1);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function toggleFavorites() {
            const ch = filteredChannels[currentIndex];
            if (!ch) return;
            const idx = favorites.indexOf(ch.id);
            if (idx >= 0) {
                favorites.splice(idx, 1);
            } else {
                favorites.push(ch.id);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
        }
        
        function zapMode() {
            if (zapInterval) {
                clearInterval(zapInterval);
                zapInterval = null;
                zapSpeed = 3000;
            } else {
                zapInterval = setInterval(() => {
                    selectChannel(currentIndex + 1);
                }, zapSpeed);
            }
        }
        
        // Remote control
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': prevChannel(); break;
                case 'ArrowRight': nextChannel(); break;
                case 'Enter':
                case 'OK':
                    toggleChannelList();
                    break;
                case 'Escape':
                case 'Backspace':
                    if (document.getElementById('channel-list').classList.contains('active')) {
                        toggleChannelList();
                    }
                    break;
                case ' ':
                    if (video.paused) video.play(); else video.pause();
                    break;
                case '[':
                case ']':
                    toggleFullscreen();
                    break;
                case 'z':
                case 'Z':
                    zapMode();
                    break;
                case '*':
                    toggleFavorites();
                    break;
            }
        });
        
        // Touch controls
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextChannel();
                else prevChannel();
            }
        });
        
        // Update watch time
        setInterval(updateStats, 1000);
        
        // Video events
        video.addEventListener('error', () => {
            loading.classList.remove('active');
            showError();
        });
        
        video.addEventListener('playing', () => loading.classList.remove('active'));
        
        init();
    </script>
</body>
</html>
