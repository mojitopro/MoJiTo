<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;height:100vh;overflow:hidden}
        
        /* Modo Video */
        #video-mode{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1;display:none}
        #video{width:100%;height:100%;object-fit:contain}
        #video-mode.active{display:block}
        
        /* Barra Superior */
        #top-bar{position:fixed;top:0;left:0;width:100%;height:50px;background:linear-gradient(to bottom,rgba(0,0,0,0.95),transparent);z-index:10;display:flex;align-items:center;padding:0 15px}
        #logo{font-size:20px;font-weight:bold;color:#f39c12;margin-right:15px}
        #current-ch{font-size:16px;color:#fff;opacity:0.9}
        
        /* Canal Grande */
        #big-channel{position:fixed;top:60px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;display:none}
        #big-channel.active{display:block}
        #big-channel-name{font-size:28px;color:#f39c12;margin-bottom:5px}
        #big-channel-cat{font-size:14px;color:#888}
        
        /* Lista de Canales */
        #list-mode{position:fixed;top:50px;left:0;width:100%;height:100%;z-index:5;display:block;background:linear-gradient(to bottom,#0a0a0a,#151515)}
        #list-mode.hidden{display:none}
        
        /* Categorias */
        #cats{display:flex;gap:8px;padding:10px 15px;overflow-x:auto;background:#1a1a1a;border-bottom:1px solid #333}
        .cat{background:#2a2a2a;padding:8px 16px;border-radius:20px;font-size:13px;color:#ccc;cursor:pointer;white-space:nowrap;border:2px solid transparent}
        .cat:hover,.cat.sel{border-color:#f39c12;color:#fff}
        .cat.sel{background:#f39c12;color:#000}
        
        /* Grid de Canales */
        #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:15px;height:calc(100% - 110px);overflow-y:auto}
        .ch{background:#1a1a1a;border-radius:8px;padding:12px;cursor:pointer;border:3px solid transparent;transition:border-color 0.15s}
        .ch:hover,.ch.sel{border-color:#f39c12}
        .ch-name{font-size:14px;font-weight:bold;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ch-cat{font-size:11px;color:#888;text-transform:uppercase}
        
        /* Navegacion inferior */
        #nav-bar{position:fixed;bottom:0;left:0;width:100%;background:#1a1a1a;padding:10px 15px;display:flex;justify-content:center;gap:20px;z-index:10;border-top:1px solid #333}
        .nav-hint{font-size:11px;color:#666;text-align:center}
        .nav-key{background:#333;padding:3px 8px;border-radius:4px;margin-right:5px}
        
        /* Loading */
        #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;display:none}
        #loading.active{display:block}
        .spin{width:50px;height:50px;border:3px solid rgba(255,255,255,0.1);border-top-color:#f39c12;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        /* Error */
        #error{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(200,0,0,0.9);padding:20px 40px;border-radius:10px;z-index:200;display:none;text-align:center}
        #error.active{display:block}
        #error-msg{font-size:16px}
        #error-sub{font-size:12px;color:#ccc;margin-top:5px}
    </style>
</head>
<body>
    <!-- Video Mode -->
    <div id="video-mode">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <!-- Top Bar -->
    <div id="top-bar">
        <span id="logo">MoJiTo</span>
        <span id="current-ch">Selecciona un canal</span>
    </div>
    
    <!-- Big Channel Info -->
    <div id="big-channel">
        <div id="big-channel-name"></div>
        <div id="big-channel-cat"></div>
    </div>
    
    <!-- List Mode -->
    <div id="list-mode">
        <div id="cats"></div>
        <div id="grid"></div>
    </div>
    
    <!-- Navigation Hints -->
    <div id="nav-bar">
        <div class="nav-hint"><span class="nav-key">^v</span><span class="nav-key">&lt;&gt;</span> Mover</div>
        <div class="nav-hint"><span class="nav-key">OK</span> Ver canal</div>
        <div class="nav-hint"><span class="nav-key">BACK</span> Atras</div>
    </div>
    
    <!-- Loading -->
    <div id="loading"><div class="spin"></div></div>
    
    <!-- Error -->
    <div id="error">
        <div id="error-msg">Sin senal</div>
        <div id="error-sub">Presiona OK para intentar otro stream</div>
    </div>

    <script>
        const API = '';
        let channels = [];
        let filtered = [];
        let selectedIdx = 0;
        let currentCat = 'all';
        let isWatching = false;
        
        const video = document.getElementById('video');
        const grid = document.getElementById('grid');
        const cats = document.getElementById('cats');
        const listMode = document.getElementById('list-mode');
        const videoMode = document.getElementById('video-mode');
        const bigChannel = document.getElementById('big-channel');
        const currentCh = document.getElementById('current-ch');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        
        // Categorias esenciales
        const CATEGORIES = [
            {id:'all', name:'Todos'},
            {id:'Deportes', name:'Deportes'},
            {id:'Cine', name:'Cine'},
            {id:'Noticias', name:'Noticias'},
            {id:'Mexico', name:'Mexico'},
            {id:'Argentina', name:'Argentina'},
            {id:'Espana', name:'Espana'},
            {id:'Infantil', name:'Infantil'},
            {id:'Musica', name:'Musica'},
            {id:'Documental', name:'Documental'},
            {id:'Entretenimiento', name:'Entretenimiento'}
        ];
        
        // Cargar canales
        async function loadChannels() {
            loading.classList.add('active');
            try {
                const res = await fetch(API + '/api/channels');
                channels = await res.json();
                filtered = [...channels];
                renderCats();
                renderGrid();
            } catch(e) {
                console.error(e);
            }
            loading.classList.remove('active');
        }
        
        // Render categorias
        function renderCats() {
            cats.innerHTML = CATEGORIES.map(c => 
                `<div class="cat ${c.id===currentCat?'sel':''}" onclick="selectCat('${c.id}')">${c.name}</div>`
            ).join('');
        }
        
        // Seleccionar categoria
        function selectCat(catId) {
            currentCat = catId;
            if (catId === 'all') {
                filtered = [...channels];
            } else {
                filtered = channels.filter(ch => {
                    const cat = (ch.category || '').toLowerCase();
                    const name = (ch.name || '').toLowerCase();
                    return cat.includes(catId.toLowerCase()) || matchCategory(name) === catId;
                });
            }
            selectedIdx = 0;
            renderCats();
            renderGrid();
        }
        
        // Matching por nombre
        function matchCategory(name) {
            if (/espn|sports|tudn|futbol/.test(name)) return 'Deportes';
            if (/hbo|cinemax|showtime|movie|cine/.test(name)) return 'Cine';
            if (/cnn|bbc|news|telesur/.test(name)) return 'Noticias';
            if (/azteca|estrellas|canal 5|televisa|mexico/.test(name)) return 'Mexico';
            if (/trece|telefe|america.*tv|argentina/.test(name)) return 'Argentina';
            if (/la 1|antena|tve|espana|espana/.test(name)) return 'Espana';
            if (/cartoon|nick|disney|kids|infantil/.test(name)) return 'Infantil';
            if (/mt[rv]|musica|vh1/.test(name)) return 'Musica';
            if (/discovery|history|nat.*geo|animal/.test(name)) return 'Documental';
            if (/fox|warner|universal|sony/.test(name)) return 'Entretenimiento';
            return null;
        }
        
        // Render grid
        function renderGrid() {
            grid.innerHTML = filtered.map((ch, i) => 
                `<div class="ch ${i===selectedIdx?'sel':''}" data-idx="${i}">
                    <div class="ch-name">${ch.name}</div>
                    <div class="ch-cat">${ch.category || matchCategory((ch.name||'').toLowerCase()) || 'General'}</div>
                </div>`
            ).join('');
        }
        
        // Ver canal
        async function watchChannel(idx) {
            if (idx < 0 || idx >= filtered.length) return;
            selectedIdx = idx;
            const ch = filtered[idx];
            
            loading.classList.add('active');
            error.classList.remove('active');
            
            currentCh.textContent = ch.name;
            document.getElementById('big-channel-name').textContent = ch.name;
            document.getElementById('big-channel-cat').textContent = ch.category || 'General';
            bigChannel.classList.add('active');
            
            listMode.classList.add('hidden');
            videoMode.classList.add('active');
            isWatching = true;
            
            try {
                const res = await fetch(API + `/api/stream/${encodeURIComponent(ch.name)}`);
                const data = await res.json();
                
                if (data.url) {
                    video.src = data.url;
                    video.play().catch(() => tryFallback(data.fallbacks));
                } else {
                    showError();
                }
            } catch(e) {
                showError();
            }
            
            loading.classList.remove('active');
        }
        
        // Intentar fallbacks
        async function tryFallback(urls) {
            if (!urls || urls.length === 0) {
                showError();
                return;
            }
            for (const url of urls) {
                try {
                    video.src = url;
                    await video.play();
                    return;
                } catch(e) {}
            }
            showError();
        }
        
        // Mostrar error
        function showError() {
            error.classList.add('active');
        }
        
        // Volver a lista
        function backToList() {
            video.pause();
            video.src = '';
            listMode.classList.remove('hidden');
            videoMode.classList.remove('active');
            bigChannel.classList.remove('active');
            isWatching = false;
            error.classList.remove('active');
            renderGrid();
        }
        
        // Navegacion
        function move(dir) {
            if (isWatching) return;
            
            const cols = Math.floor(grid.offsetWidth / 190);
            if (dir === 'up') selectedIdx -= cols;
            if (dir === 'down') selectedIdx += cols;
            if (dir === 'left') selectedIdx--;
            if (dir === 'right') selectedIdx++;
            
            if (selectedIdx < 0) selectedIdx = 0;
            if (selectedIdx >= filtered.length) selectedIdx = filtered.length - 1;
            
            renderGrid();
            
            // Scroll into view
            const el = grid.children[selectedIdx];
            if (el) el.scrollIntoView({block:'nearest'});
        }
        
        // Keyboard
        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': move('up'); break;
                case 'ArrowDown': move('down'); break;
                case 'ArrowLeft': move('left'); break;
                case 'ArrowRight': move('right'); break;
                case 'Enter':
                case 'OK':
                    if (isWatching) {
                        if (error.classList.contains('active')) {
                            error.classList.remove('active');
                            watchChannel(selectedIdx);
                        } else {
                            backToList();
                        }
                    } else {
                        watchChannel(selectedIdx);
                    }
                    break;
                case 'Backspace':
                case 'Escape':
                case 'Back':
                    if (isWatching) backToList();
                    break;
            }
        });
        
        // Touch
        let touchY = 0;
        document.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
        document.addEventListener('touchend', e => {
            const diff = touchY - e.changedTouches[0].clientY;
            if (Math.abs(diff) > 30) {
                if (diff > 0) move('up');
                else move('down');
            }
        });
        
        // Click en canal
        grid.addEventListener('click', e => {
            const ch = e.target.closest('.ch');
            if (ch) {
                const idx = parseInt(ch.dataset.idx);
                watchChannel(idx);
            }
        });
        
        // Video error
        video.addEventListener('error', () => {
            loading.classList.remove('active');
            showError();
        });
        
        video.addEventListener('playing', () => {
            loading.classList.remove('active');
        });
        
        // Init
        loadChannels();
    </script>
</body>
</html>
