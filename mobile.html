<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MoJiTo - Móvil</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
#video{width:100%;height:100%;position:fixed;top:0;left:0;background:#000;object-fit:contain}
#player{width:100%;height:56.25%;position:fixed;top:0;left:0;background:#000}
#player.show{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:contain;z-index:100}
#main{width:100%;height:100%;display:flex;flex-direction:column;padding:60px 10px 10px;overflow-y:auto}
.logo{font-size:24px;font-weight:bold;text-align:center;margin-bottom:15px}
.logo b{color:#e74c3c}
.logo span{color:#fff}
#in{width:100%;padding:15px;font-size:18px;background:#1a1a1a;border:none;border-radius:10px;color:#fff;margin-bottom:10px;outline:none}
#in::placeholder{color:#666}
.list{list-style:none}
.list li{padding:12px 15px;background:#1a1a1a;margin-bottom:8px;border-radius:8px;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow-ellipsis;color:#ccc}
.list li:active{background:#2a2a2a}
.list li.playing{background:#c0392b;color:#fff}
.quality{float:right;color:#f39c12;font-size:12px}
#msg{text-align:center;padding:10px;color:#666;font-size:14px}
#close{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#fff;border:none;padding:10px 15px;border-radius:5px;font-size:14px;z-index:150;display:none}
#close.show{display:block}
</style>
</head>
<body>

<video id="video" controls playsinline webkit-playsinline></video>

<button id="close" onclick="closePlayer()">✕ Cerrar</button>

<div id="main">
<div class="logo"><b>MoJiTo</b> Móvil</div>
<input id="in" type="text" placeholder="Buscar canal..." autocomplete="off">
<div id="msg">Escribe y busca</div>
<ul id="list" class="list"></ul>
</div>

<script>
var API=location.protocol+'//'+location.host+'/api/search';
var streams=[], txt='', loading=false;

function q(t){
    if(/1080|4k/i.test(t))return' [HD]';
    if(/720/i.test(t))return' [HD]';
    return' [SD]';
}

function msg(m){document.getElementById('msg').textContent=m;}

function showStreams(data){
    var el=document.getElementById('list');
    el.innerHTML='';
    if(!data.length){msg('Sin resultados');return;}
    streams=data;
    data.forEach(function(s,i){
        var li=document.createElement('li');
        li.innerHTML=s.title.substring(0,40)+'<span class="quality">'+q(s.title)+'</span>';
        li.onclick=function(){play(i);};
        el.appendChild(li);
    });
    msg(data.length+' streams');
}

function buscar(){
    if(!txt.trim())return;
    msg('Buscando...');
    fetch(API+'?q='+encodeURIComponent(txt)).then(function(r){return r.json();}).then(function(d){
        showStreams(d.streams);
    }).catch(function(){msg('Error');});
}

function play(i){
    var s=streams[i];
    if(!s)return;
    var v=document.getElementById('video');
    v.src=s.url;
    v.classList.add('show');
    document.getElementById('close').classList.add('show');
    v.play().catch(function(){});
    msg('Reproduciendo: '+s.title.substring(0,20));
}

function closePlayer(){
    var v=document.getElementById('video');
    v.pause();
    v.src='';
    v.classList.remove('show');
    document.getElementById('close').classList.remove('show');
}

document.getElementById('in').addEventListener('input',function(e){
    txt=e.target.value;
    if(txt.length>=2)buscar();
});

document.addEventListener('keydown',function(e){
    if(e.key==='Escape')closePlayer();
});
</script>
</body>
</html>
