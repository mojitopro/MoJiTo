<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

        #app { display: flex; flex-direction: column; height: 100vh; }

        #player {
            flex: 0 0 55vh;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player.fs {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            flex: 1; z-index: 9999;
        }
        #player .bg-pattern {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
        }
        #player video {
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 1;
        }
        #player.fs video { object-fit: cover; }

        .fs #player-ui { opacity: 1; }

        .play-overlay {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            opacity: 1;
            transition: opacity 0.5s;
        }
        .playing .play-overlay {
            opacity: 0;
            pointer-events: none;
        }
        .play-btn {
            width: 100px;
            height: 100px;
            background: rgba(0,212,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 40px rgba(0,212,255,0.4);
        }
        .play-btn:hover { transform: scale(1.1); background: #00d4ff; }
        .play-btn svg { width: 40px; height: 40px; fill: #000; margin-left: 5px; }
        .play-text { color: #888; font-size: 14px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .channel-badge {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            padding: 8px 16px; border-radius: 20px;
            font-size: 15px; font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .status-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; border-radius: 20px;
            font-size: 12px; background: rgba(0,0,0,0.7); border: 1px solid #333;
        }
        .status-pill .dot {
            width: 8px; height: 8px; border-radius: 50%; background: #666;
        }
        .status-pill.live .dot { background: #4f4; box-shadow: 0 0 8px #4f4; }
        .status-pill.error .dot { background: #f44; }
        .status-pill.connecting .dot { background: #fa0; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .bottom-bar {
            padding: 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .ctrl-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid #444;
            color: #fff;
            padding: 12px 24px; border-radius: 8px;
            font-size: 14px; cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.25); }
        .ctrl-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; }

        #guide {
            flex: 1;
            display: flex; flex-direction: column;
            background: #0d0d12;
            border-top: 1px solid #1a1a2e;
            overflow-y: auto;
            min-height: 200px;
            min-height: 45vh;
        }

        #channels {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        #guide-header {
            padding: 12px 16px;
            background: #12121a;
            border-bottom: 1px solid #1a1a2e;
            display: flex; gap: 12px; align-items: center;
        }
        #search {
            flex: 1;
            background: #1a1a25;
            border: 1px solid #2a2a3e;
            color: #fff; padding: 12px 16px;
            border-radius: 8px; font-size: 14px;
        }
        #search:focus { outline: none; border-color: #00d4ff; }
        .ch-count {
            color: #00d4ff; font-size: 14px; font-weight: 600; white-space: nowrap;
        }

        #channels {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .ch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .ch-card {
            background: #14141c;
            border: 2px solid #222;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .ch-card:hover {
            border-color: #00d4ff;
            transform: translateY(-2px);
            background: #1a1a28;
        }
        .ch-card.active {
            border-color: #00d4ff;
            background: linear-gradient(135deg, #1a1a2e, #0f1525);
        }
        .ch-card .name {
            font-size: 14px; font-weight: 600;
            color: #fff; margin-bottom: 8px;
        }
        .ch-card .meta {
            font-size: 11px; color: #666;
            display: flex; justify-content: space-between;
            align-items: center;
        }
        .ch-card .quality {
            background: #1a3a2a; color: #4f4;
            padding: 3px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 600;
        }
        .ch-card .sources {
            background: #2a2a3e; color: #aaa;
            padding: 3px 8px; border-radius: 4px;
            font-size: 10px;
        }

        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 200px; color: #444;
        }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.5; }

        #toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a25;
            border: 1px solid #2a2a3e;
            color: #fff; padding: 14px 28px;
            border-radius: 30px; font-size: 14px;
            z-index: 9997;
            opacity: 0; transition: all 0.3s;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.error { border-color: #f44; color: #f44; }
        #toast.success { border-color: #4f4; color: #4f4; }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <div id="app">
        <div id="player">
            <div class="bg-pattern"></div>
            <video id="video" playsinline webkit-playsinline></video>
            <div class="play-overlay" id="playOverlay" onclick="startPlaying()">
                <div class="play-btn">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <div class="play-text">Toca para ver TV</div>
            </div>
        </div>

        <div id="guide">
            <div id="guide-header">
                <input type="text" id="search" placeholder="Buscar canales..." oninput="filterChannels()">
                <span class="ch-count" id="chCount">0 canales</span>
            </div>
            <div id="channels">
                <div class="ch-grid" id="ch-grid"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        var channels = [], filtered = [], currentIdx = 0, hls = null, playing = false, streams = [], streamIdx = 0;
        var started = false;

        function request(url, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) callback(null, xhr.responseText);
                    else callback(xhr.status, null);
                }
            };
            xhr.send();
        }

        function loadChannels() {
            request('/api/tv', function(err, resp) {
                if (err) {
                    showToast('Error cargando canales', 'error');
                    return;
                }
                var data = JSON.parse(resp);
                channels = data.channels || [];
                filtered = channels;
                document.getElementById('chCount').textContent = channels.length + ' canales';
                renderChannels();
            });
        }

        function isHD(url) {
            var u = String(url).toLowerCase();
            return u.indexOf('1080') >= 0 || u.indexOf('fhd') >= 0 || u.indexOf('hd') >= 0;
        }

        function renderChannels() {
            var html = '';
            var container = document.getElementById('ch-grid');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><div>No hay canales</div></div>';
                return;
            }
            for (var i = 0; i < filtered.length; i++) {
                var ch = filtered[i];
                var hd = ch.streams > 1 || isHD(ch.url);
                var active = i === currentIdx ? ' active' : '';
                html += '<div class="ch-card' + active + '" data-idx="' + i + '">' +
                    '<div class="name">' + ch.name + '</div>' +
                    '<div class="meta">' +
                        (hd ? '<span class="quality">HD</span>' : '<span></span>') +
                        (ch.streams > 1 ? '<span class="sources">' + ch.streams + ' fuentes</span>' : '') +
                    '</div>' +
                '</div>';
            }
            container.innerHTML = html;
        }

        function filterChannels() {
            var q = document.getElementById('search').value.toLowerCase();
            filtered = channels;
            if (q) {
                filtered = [];
                for (var i = 0; i < channels.length; i++) {
                    if (channels[i].name.toLowerCase().indexOf(q) >= 0) {
                        filtered.push(channels[i]);
                    }
                }
            }
            currentIdx = 0;
            document.getElementById('chCount').textContent = filtered.length + ' / ' + channels.length + ' canales';
            renderChannels();
        }

        function selectChannel(idx) {
            currentIdx = idx;
            renderChannels();
            var ch = filtered[idx];
            if (ch) {
                document.getElementById('ch-name').textContent = ch.name;
                document.getElementById('playOverlay').style.display = 'none';
                playCurrent();
                setTimeout(function() {
                    var card = document.querySelector('.ch-card.active');
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            }
        }

        function startPlaying() {
            started = true;
            document.getElementById('playOverlay').style.display = 'none';
            if (filtered.length > 0) {
                selectChannel(0);
            }
        }

        function playCurrent() {
            if (!filtered.length) return;
            if (playing) {
                stop();
            }
            var ch = filtered[currentIdx];
            if (!ch) return;
            streams = ch.backups && ch.backups.length ? ch.backups : [ch.url];

            streams.sort(function(a, b) {
                var ah = isHD(a) ? 1 : 0;
                var bh = isHD(b) ? 1 : 0;
                return bh - ah;
            });

            if (streams.length > 15) {
                streams = streams.slice(0, 15);
            }

            streamIdx = 0;
            doPlay();
        }

        function doPlay() {
            if (streamIdx >= streams.length) {
                showToast('Todas las fuentes fallaron', 'error');
                return;
            }

            var url = streams[streamIdx];
            var video = document.getElementById('video');
            showToast('Reproduciendo: ' + url.substring(0, 50), 'success');

            if (hls) { 
                hls.destroy(); 
                hls = null; 
            }

            if (url.indexOf('.m3u8') > 0 && typeof HLS !== 'undefined') {
                hls = new HLS({ enableWorker: true, liveSyncDurationCount: 3, lowLatencyMode: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(HLS.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(e) { showToast('Play error: ' + e, 'error'); });
                    playing = true;
                    document.getElementById('player').classList.add('playing');
                    showToast('EN VIVO', 'success');
                });
                hls.on(HLS.Events.ERROR, function(e, data) {
                    showToast('Error, probando sig...', 'error');
                    if (data.fatal) {
                        streamIdx++;
                        setTimeout(doPlay, 500);
                    }
                });
                hls.on(HLS.Events.FRAG_LOADED, function() {
                    showToast('Cargando stream...', 'info');
                });
            } else {
                video.src = url;
                video.volume = 1;
                video.play().then(function() {
                    playing = true;
                    document.getElementById('player').classList.add('playing');
                }).catch(function() {
                    streamIdx++;
                    doPlay();
                });
                video.onerror = function() {
                    streamIdx++;
                    doPlay();
                };
            }
        }

        function setStatus(type, text) {
            var el = document.getElementById('status');
            el.className = 'status-pill ' + type;
            el.querySelector('.text').textContent = text;
        }

        function stop() {
            playing = false;
            var video = document.getElementById('video');
            video.pause();
            video.src = '';
            video.load();
            if (hls) {
                hls.destroy();
                hls = null;
            }
            setStatus('', 'En espera');
            document.getElementById('ch-name').textContent = 'Selecciona un canal';
        }

        function toggleFullscreen() {
            var player = document.getElementById('player');
            if (player.classList.contains('fs')) {
                player.classList.remove('fs');
                if (document.exitFullscreen) document.exitFullscreen();
            } else {
                player.classList.add('fs');
                if (player.requestFullscreen) player.requestFullscreen();
            }
        }

        function nextSource() {
            if (streams.length > 1) {
                streamIdx = (streamIdx + 1) % streams.length;
                doPlay();
                showToast('Cambiando fuente...', 'success');
            } else {
                showToast('Solo hay una fuente', 'error');
            }
        }

        function showToast(msg, type) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = type || '';
            el.classList.add('show');
            setTimeout(function() {
                el.classList.remove('show');
            }, 3000);
        }

        document.getElementById('ch-grid').onclick = function(e) {
            var card = e.target.closest('.ch-card');
            if (card) {
                var idx = parseInt(card.getAttribute('data-idx'));
                selectChannel(idx);
            }
        };

        document.onkeydown = function(e) {
            if (!started) {
                startPlaying();
                e.preventDefault();
                return;
            }
            var max = filtered.length - 1;
            if (e.keyCode === 70) {
                toggleFullscreen();
                e.preventDefault();
            } else if (e.keyCode === 38) {
                currentIdx = Math.max(0, currentIdx - 1);
                renderChannels();
                setTimeout(function() {
                    var card = document.querySelector('.ch-card.active');
                    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 10);
                e.preventDefault();
            } else if (e.keyCode === 40) {
                currentIdx = Math.min(max, currentIdx + 1);
                renderChannels();
                setTimeout(function() {
                    var card = document.querySelector('.ch-card.active');
                    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 10);
                e.preventDefault();
            } else if (e.keyCode === 13 || e.keyCode === 32) {
                playCurrent();
                e.preventDefault();
            } else if (e.keyCode === 27) {
                stop();
                e.preventDefault();
            } else if (e.keyCode === 48) {
                nextSource();
                e.preventDefault();
            }
        };

        loadChannels();
    </script>
</body>
</html>
