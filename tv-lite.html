<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
        
        #player { position: relative; width: 100%; height: 55vh; background: #000; }
        #video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        #overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }
        #overlay.hidden { display: none; }
        #overlay .title { font-size: 28px; color: #00d4ff; margin-bottom: 15px; }
        #overlay .msg { font-size: 16px; color: #888; }
        #overlay .spinner {
            width: 50px; height: 50px; border: 4px solid #333;
            border-top: 4px solid #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #info {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        #channel-name { font-size: 18px; color: #00d4ff; font-weight: bold; }
        #status { font-size: 12px; color: #666; }
        #status.online { color: #4f4; }
        #status.buffer { color: #fa0; }
        #status.error { color: #f44; }
        
        #controls { display: flex; gap: 8px; }
        #controls button {
            background: rgba(255,255,255,0.1); border: 1px solid #444;
            color: #fff; padding: 8px 14px; border-radius: 4px;
            cursor: pointer; font-size: 14px;
        }
        #controls button:hover { background: rgba(255,255,255,0.2); }
        
        #vol { width: 80px; vertical-align: middle; }
        
        #list { height: 45vh; background: #0a0a0a; overflow-y: auto; padding: 10px; }
        #search { 
            display: flex; gap: 10px; padding: 10px; background: #111; 
            position: sticky; top: 0;
        }
        #search input, #search select {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 8px; border-radius: 4px; font-size: 14px;
        }
        #search input { flex: 1; }
        
        #channels {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .ch {
            background: #151515; border: 2px solid #333;
            border-radius: 6px; padding: 12px 8px;
            text-align: center; cursor: pointer;
            transition: all 0.15s;
        }
        .ch:hover { border-color: #00d4ff; background: #1a1a1a; }
        .ch.active { border-color: #4f4; background: #0a1a0a; }
        .ch .name { font-size: 12px; font-weight: bold; }
        .ch .streams { font-size: 10px; color: #666; margin-top: 4px; }
        .ch .streams.ok { color: #4f4; }
    </style>
</head>
<body>
    <div id="player">
        <video id="video" controls playsinline></video>
        
        <div id="overlay" class="hidden">
            <div class="spinner"></div>
            <div class="title">MoJiTo TV</div>
            <div class="msg">Cargando...</div>
        </div>
        
        <div id="info">
            <div>
                <div id="channel-name">Sin canal</div>
                <div id="status" class="buffer">Esperando</div>
            </div>
            <div id="controls">
                <button onclick="prev()">◀</button>
                <button onclick="togglePlay()">▶</button>
                <button onclick="next()">▶</button>
                <button onclick="stop()">■</button>
                <input type="range" id="vol" min="0" max="100" value="100" onchange="setVol(this.value)">
            </div>
        </div>
    </div>
    
    <div id="list">
        <div id="search">
            <input type="text" placeholder="Buscar..." oninput="filter()" id="q">
            <select onchange="filter()" id="cat">
                <option value="">Todos</option>
                <option value="deportes">Deportes</option>
                <option value="peliculas">Películas</option>
                <option value="series">Series</option>
                <option value="ninos">Niños</option>
                <option value="noticias">Noticias</option>
                <option value="musica">Música</option>
            </select>
        </div>
        <div id="channels"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <script>
        var all = [], filt = [], idx = -1, hls = null;
        
        var catMap = {
            'espn': 'deportes', 'fox sports': 'deportes', 'tnt sports': 'deportes',
            'tyc': 'deportes', 'win': 'deportes', 'bein': 'deportes',
            'hbo': 'peliculas', 'cinemax': 'peliculas', 'star': 'peliculas',
            'paramount': 'peliculas', 'golden': 'peliculas',
            'amc': 'series', 'axn': 'series', 'sony': 'series',
            'universal': 'series', 'fx': 'series', 'tnt': 'series',
            'disney': 'ninos', 'nick': 'ninos', 'cartoon': 'ninos',
            'cnn': 'noticias', 'bbc': 'noticias', 'dw': 'noticias',
            'mtv': 'musica', 'vh1': 'musica'
        };
        
        function getCat(name) {
            name = name.toLowerCase();
            for (var k in catMap) if (name.indexOf(k) >= 0) return catMap[k];
            return 'series';
        }
        
        function show(msg, type) {
            var s = document.getElementById('status');
            if (s) s.className = type;
            if (s) s.textContent = msg;
        }
        
        function showOverlay(msg) {
            var o = document.getElementById('overlay');
            if (msg) {
                o.classList.remove('hidden');
                o.querySelector('.msg').textContent = msg;
            } else {
                o.classList.add('hidden');
            }
        }
        
        function init() {
            fetch('/api/tv').then(function(r) { return r.json(); })
            .then(function(d) {
                all = d.channels || [];
                render();
                showOverlay('');
            })
            .catch(function(e) {
                console.log('Error:', e);
                showOverlay('Sin conexión');
            });
        }
        
        function render() {
            filt = all.filter(function(c) {
                var q = document.getElementById('q').value.toLowerCase();
                var cat = document.getElementById('cat').value;
                return (!q || c.name.toLowerCase().indexOf(q) >= 0) && 
                       (!cat || getCat(c.name) === cat);
            });
            
            var html = '';
            filt.forEach(function(c, i) {
                var active = i === idx ? 'active' : '';
                var ok = c.streams > 1 ? 'ok' : '';
                html += '<div class="ch ' + active + '" onclick="play(' + i + ')">' +
                    '<div class="name">' + c.name + '</div>' +
                    '<div class="streams ' + ok + '">' + c.streams + ' src</div></div>';
            });
            document.getElementById('channels').innerHTML = html;
        }
        
        function filter() { render(); }
        
        function play(i) {
            idx = i;
            var c = filt[i];
            document.getElementById('channel-name').textContent = c.name;
            show('Conectando...', 'buffer');
            showOverlay('Conectando...');
            
            var v = document.getElementById('video');
            v.pause();
            
            if (hls) { hls.destroy(); hls = null; }
            
            var isM3U8 = c.url.indexOf('.m3u8') >= 0;
            
            if (isM3U8 && HLS.isSupported()) {
                hls = new HLS({ 
                    enableWorker: true,
                    lowLatencyMode: false,
                    maxLoadingDelay: 4,
                    maxBufferLength: 30
                });
                hls.loadSource(c.url);
                hls.attachMedia(v);
                hls.on(HLS.Events.MANIFEST_PARSED, function() {
                    showOverlay('');
                    show('EN VIVO', 'online');
                    v.play();
                });
                hls.on(HLS.Events.ERROR, function(e, data) {
                    if (data.fatal) {
                        show('Error', 'error');
                        showOverlay('Error');
                    }
                });
            } else {
                v.src = c.url;
                v.onloadeddata = function() {
                    showOverlay('');
                    show('EN VIVO', 'online');
                };
                v.onerror = function() {
                    show('Error', 'error');
                    showOverlay('No disponible');
                };
                v.onwaiting = function() { show('Buffering...', 'buffer'); };
                v.onplaying = function() { show('EN VIVO', 'online'); showOverlay(''); };
            }
            
            render();
        }
        
        function togglePlay() {
            var v = document.getElementById('video');
            if (v.paused) {
                if (v.src || (hls && hls.media)) v.play();
                else if (idx >= 0) play(idx);
            } else {
                v.pause();
                show('Pausado', 'buffer');
            }
        }
        
        function prev() {
            if (filt.length === 0) return;
            idx = (idx - 1 + filt.length) % filt.length;
            play(idx);
        }
        
        function next() {
            if (filt.length === 0) return;
            idx = (idx + 1) % filt.length;
            play(idx);
        }
        
        function stop() {
            var v = document.getElementById('video');
            v.pause();
            v.src = '';
            if (hls) { hls.destroy(); hls = null; }
            document.getElementById('channel-name').textContent = 'Sin canal';
            show('Parado', 'buffer');
            showOverlay('Parado');
            idx = -1;
            render();
        }
        
        function setVol(val) {
            document.getElementById('video').volume = val / 100;
        }
        
        document.onkeydown = function(e) {
            if (e.keyCode === 37 || e.keyCode === 38) prev();
            else if (e.keyCode === 39 || e.keyCode === 40) next();
            else if (e.keyCode === 13 || e.keyCode === 32) togglePlay();
            else if (e.keyCode === 27) stop();
        };
        
        window.onload = init;
    </script>
</body>
</html>
