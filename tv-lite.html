<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
        
        #tv { height: 55vh; background: #000; position: relative; }
        #v { width: 100%; height: 100%; background: #000; object-fit: contain; }
        
        #tv.fs { 
            position: fixed; top:0; left:0; width:100vw; height:100vh; 
            z-index: 9999; background: #000;
        }
        #tv.fs #v { object-fit: cover; }
        
        #info {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 8px 12px;
            font-size: 14px; color: #00d4ff;
        }
        
        #ls { height: 45vh; background: #0a0a0a; overflow-y: auto; }
        
        #sr { display: flex; gap: 8px; padding: 8px; background: #111; }
        #sr input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
        
        #chs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 4px; padding: 8px;
        }
        .ch {
            background: #151515; border: 2px solid #222;
            border-radius: 4px; padding: 10px 6px;
            text-align: center; cursor: pointer;
        }
        .ch:hover { border-color: #00d4ff; }
        .ch.sel { border-color: #ff0; background: #332800; }
        .ch .n { font-size: 12px; font-weight: bold; }
        .ch .b { font-size: 10px; color: #4f4; }
    </style>
</head>
<body>
    <div id="tv">
        <video id="v" controls playsinline webkit-playsinline></video>
        <div id="info">Selecciona un canal</div>
    </div>
    
    <div id="ls">
        <div id="sr"><input type="text" id="q" placeholder="Buscar..." oninput="rlist()"></div>
        <div id="chs"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <script>
        var all = [], fl = [], i = 0, hls = null, bk = [], bi = 0, playing = false, isFs = false, loading = false, curUrl = '';
        
        function init() {
            fetch('/api/tv').then(r=>r.json()).then(d=>{
                all = d.channels || [];
                fl = all;
                rlist();
            }).catch(function() {
                document.getElementById('info').textContent = 'Error cargando canales';
            });
        }
        
        function rlist() {
            var q = document.getElementById('q').value.toLowerCase();
            fl = all.filter(x => !q || x.name.toLowerCase().indexOf(q) >= 0);
            i = Math.min(i, Math.max(0, fl.length - 1));
            var h = '';
            fl.forEach(function(x, idx) {
                var bc = (x.streams || 1);
                h += '<div class="ch' + (idx === i ? ' sel' : '') + '" data-i="' + idx + '">';
                h += '<div class="n">' + x.name + '</div>';
                if (bc > 1) h += '<div class="b">' + bc + ' fuentes</div>';
                h += '</div>';
            });
            document.getElementById('chs').innerHTML = h;
            sc();
        }
        
        function sc() {
            var cs = document.querySelectorAll('.ch');
            if (cs[i]) cs[i].scrollIntoView({ block: 'nearest' });
        }
        
        function play() {
            if (!fl.length || loading) return;
            var ch = fl[i];
            if (!ch) return;
            curUrl = ch.url;
            bk = ch.backups || [ch.url];
            bi = 0;
            loading = true;
            playing = true;
            document.getElementById('info').textContent = ch.name + ' - Conectando...';
            pnext();
        }
        
        function pnext() {
            if (bi >= bk.length) {
                document.getElementById('info').textContent = 'Sin fuente disponible';
                loading = false;
                playing = false;
                return;
            }
            
            var v = document.getElementById('v');
            if (hls) { hls.destroy(); hls = null; }
            
            var u = bk[bi];
            if (u === curUrl) {
                bi++;
                pnext();
                return;
            }
            curUrl = u;
            document.getElementById('info').textContent = (fl[i].name) + ' - Fuente ' + (bi + 1) + '...';
            
            if (u.indexOf('.m3u8') >= 0 && HLS.isSupported()) {
                hls = new HLS({ enableWorker: true, maxBufferLength: 30 });
                hls.loadSource(u);
                hls.attachMedia(v);
                hls.on(HLS.Events.MANIFEST_PARSED, function() {
                    v.play().catch(function() {});
                });
                hls.on(HLS.Events.ERROR, function(e, d) {
                    if (d.fatal) { bi++; pnext(); }
                });
                hls.on(HLS.Events.FRAG_LOADED, function() {
                    loading = false;
                    document.getElementById('info').textContent = fl[i].name + ' - EN VIVO';
                    fs();
                });
            } else {
                v.src = u;
                v.volume = 1;
                v.onloadeddata = function() { v.play().catch(function() {}); };
                v.onplay = function() {
                    loading = false;
                    document.getElementById('info').textContent = fl[i].name + ' - EN VIVO';
                    fs();
                };
                v.onerror = function() { 
                    bi++; 
                    if (bi < bk.length) pnext(); 
                    else {
                        document.getElementById('info').textContent = 'Sin fuente disponible';
                        loading = false;
                        playing = false;
                    }
                };
                v.play().catch(function() { bi++; pnext(); });
            }
        }
        
        function fs() {
            if (!playing) return;
            isFs = !isFs;
            var t = document.getElementById('tv');
            t.classList.toggle('fs', isFs);
            if (isFs && t.requestFullscreen) {
                t.requestFullscreen().catch(function() {});
            }
        }
        
        function stop() {
            playing = false;
            loading = false;
            curUrl = '';
            var v = document.getElementById('v');
            v.pause();
            if (hls) { hls.destroy(); hls = null; }
            v.src = '';
            v.load();
            document.getElementById('info').textContent = 'Selecciona un canal';
            if (isFs) {
                isFs = false;
                document.getElementById('tv').classList.remove('fs');
                if (document.fullscreenElement) document.exitFullscreen();
                else if (document.webkitFullscreenElement) document.webkitExitFullscreen();
            }
            i = 0;
            rlist();
        }
        
        document.onkeydown = function(e) {
            if (!fl.length) return;
            var m = fl.length - 1;
            
            if (playing) {
                if (e.keyCode === 38) { i = Math.max(0, i - 1); play(); e.preventDefault(); }
                else if (e.keyCode === 40) { i = Math.min(m, i + 1); play(); e.preventDefault(); }
                else if (e.keyCode === 27) { stop(); e.preventDefault(); }
                else if (e.keyCode === 37) { i = Math.max(0, i - 1); play(); e.preventDefault(); }
                else if (e.keyCode === 39) { i = Math.min(m, i + 1); play(); e.preventDefault(); }
            } else {
                if (e.keyCode === 38) { i = Math.max(0, i - 1); rlist(); e.preventDefault(); }
                else if (e.keyCode === 40) { i = Math.min(m, i + 1); rlist(); e.preventDefault(); }
                else if (e.keyCode === 37) { i = Math.max(0, i - 1); rlist(); e.preventDefault(); }
                else if (e.keyCode === 39) { i = Math.min(m, i + 1); rlist(); e.preventDefault(); }
                else if (e.keyCode === 13 || e.keyCode === 32) { play(); e.preventDefault(); }
                else if (e.keyCode === 27) { stop(); e.preventDefault(); }
            }
        };
        
        document.getElementById('chs').onclick = function(e) {
            var c = e.target.closest('.ch');
            if (c) { i = parseInt(c.dataset.i); play(); }
        };
        
        window.onload = init;
    </script>
</body>
</html>
