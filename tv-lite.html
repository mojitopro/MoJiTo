<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #050508; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

        #app { display: flex; flex-direction: column; height: 100vh; }

        #player {
            flex: 0 0 55vh;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player.fs {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            flex: 1; z-index: 9999;
        }
        #player .bg-pattern {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #151520 0%, #000 100%);
            opacity: 0.5;
        }
        #player video {
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 1;
        }
        #player.fs video { object-fit: cover; }

        #player-ui {
            position: absolute; inset: 0;
            z-index: 10;
            display: flex; flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        #player-ui > * { pointer-events: auto; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .channel-badge {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            padding: 6px 14px; border-radius: 20px;
            font-size: 14px; font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .status-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 12px; background: rgba(0,0,0,0.6); border: 1px solid #333;
        }
        .status-pill .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #666;
        }
        .status-pill.live .dot { background: #4f4; box-shadow: 0 0 8px #4f4; }
        .status-pill.error .dot { background: #f44; }
        .status-pill.connecting .dot { background: #fa0; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .bottom-bar {
            padding: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            transition: opacity 0.3s;
        }
        .fs #player-ui { opacity: 0; }
        .fs #player-ui:hover { opacity: 1; }
        .controls { display: flex; gap: 8px; justify-content: center; }
        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #333;
            color: #fff;
            padding: 10px 20px; border-radius: 8px;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.2); }
        .ctrl-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; }

        #guide {
            flex: 1;
            display: flex; flex-direction: column;
            background: #0a0a0f;
            border-top: 1px solid #1a1a2e;
            overflow: hidden;
        }

        #guide-header {
            padding: 12px 16px;
            background: #0f0f15;
            border-bottom: 1px solid #1a1a2e;
            display: flex; gap: 12px; align-items: center;
        }
        #search {
            flex: 1;
            background: #15151f;
            border: 1px solid #2a2a3e;
            color: #fff; padding: 10px 14px;
            border-radius: 8px; font-size: 14px;
        }
        #search:focus { outline: none; border-color: #00d4ff; }
        .cat-btn {
            background: transparent;
            border: 1px solid #2a2a3e;
            color: #888; padding: 8px 14px;
            border-radius: 20px; font-size: 12px;
            cursor: pointer; white-space: nowrap;
        }
        .cat-btn:hover, .cat-btn.active {
            background: #00d4ff; color: #000; border-color: #00d4ff;
        }

        #channels {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .ch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .ch-card {
            background: #12121a;
            border: 2px solid #1a1a2e;
            border-radius: 12px;
            padding: 14px 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .ch-card:hover {
            border-color: #00d4ff;
            transform: translateY(-2px);
        }
        .ch-card.active {
            border-color: #00d4ff;
            background: linear-gradient(135deg, #1a1a2e, #0f1520);
        }
        .ch-card .name {
            font-size: 13px; font-weight: 600;
            color: #fff; margin-bottom: 6px;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
        }
        .ch-card .meta {
            font-size: 11px; color: #666;
            display: flex; justify-content: space-between;
            align-items: center;
        }
        .ch-card .quality {
            background: #1a3a2a; color: #4f4;
            padding: 2px 6px; border-radius: 4px;
            font-size: 10px; font-weight: 600;
        }
        .ch-card .sources {
            background: #2a2a3e; color: #888;
            padding: 2px 6px; border-radius: 4px;
            font-size: 10px;
        }
        .ch-card .loading {
            position: absolute; inset: 0;
            background: rgba(0,212,255,0.1);
            display: none;
        }
        .ch-card.loading .loading {
            display: block;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0%,100%{opacity:0.5} 50%{opacity:1}
        }

        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; color: #444;
        }
        .empty-state svg { width: 60px; height: 60px; margin-bottom: 16px; opacity: 0.5; }

        #loading-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9998;
            display: none;
            align-items: center; justify-content: center;
            flex-direction: column;
        }
        #loading-overlay.show { display: flex; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid #222;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; color: #00d4ff; }

        #toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #15151f;
            border: 1px solid #2a2a3e;
            color: #fff; padding: 12px 24px;
            border-radius: 30px; font-size: 13px;
            z-index: 9997;
            opacity: 0; transition: all 0.3s;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.error { border-color: #f44; color: #f44; }
        #toast.success { border-color: #4f4; color: #4f4; }
    </style>
</head>
<body>
    <div id="app">
        <div id="player">
            <div class="bg-pattern"></div>
            <video id="video" playsinline webkit-playsinline></video>
            <div id="player-ui" style="display:none">
                <div class="top-bar">
                    <div class="channel-badge" id="ch-name">Selecciona un canal</div>
                    <div class="status-pill" id="status">
                        <span class="dot"></span>
                        <span class="text">En espera</span>
                    </div>
                </div>
                <div class="bottom-bar">
                    <div class="controls">
                        <button class="ctrl-btn" onclick="toggleFullscreen()">&#x26F6; F</button>
                        <button class="ctrl-btn" onclick="stop()">&#x25A0;</button>
                        <button class="ctrl-btn" onclick="nextSource()">&#x2630;</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="guide">
            <div id="guide-header">
                <input type="text" id="search" placeholder="Buscar canales..." oninput="filterChannels()">
            </div>
            <div id="channels">
                <div class="ch-grid" id="ch-grid"></div>
            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Conectando...</div>
    </div>

    <div id="toast"></div>

    <script>
        var channels = [], filtered = [], currentIdx = 0, hls = null, playing = false, streams = [], streamIdx = 0;

        function getXMLHttpRequest() {
            if (window.XMLHttpRequest) return new XMLHttpRequest();
            return new ActiveXObject('Microsoft.XMLHTTP');
        }

        function request(url, callback) {
            var xhr = getXMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) callback(null, xhr.responseText);
                    else callback(xhr.status, null);
                }
            };
            xhr.send();
        }

        function loadChannels() {
            request('/api/tv', function(err, resp) {
                if (err) {
                    showToast('Error cargando canales', 'error');
                    return;
                }
                var data = JSON.parse(resp);
                channels = data.channels || [];
                filterChannels();
            });
        }

        function isHD(url) {
            var u = String(url).toLowerCase();
            return u.indexOf('1080') >= 0 || u.indexOf('fhd') >= 0 || u.indexOf('hd') >= 0;
        }

        function renderChannels() {
            var html = '';
            var container = document.getElementById('ch-grid');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><div>No hay canales</div></div>';
                return;
            }
            for (var i = 0; i < filtered.length; i++) {
                var ch = filtered[i];
                var hd = ch.streams > 1 && isHD(ch.url);
                var active = i === currentIdx ? ' active' : '';
                html += '<div class="ch-card' + active + '" onclick="selectChannel(' + i + ')">' +
                    '<div class="name">' + ch.name + '</div>' +
                    '<div class="meta">' +
                        (hd ? '<span class="quality">HD</span>' : '<span></span>') +
                        (ch.streams > 1 ? '<span class="sources">' + ch.streams + ' fuentes</span>' : '') +
                    '</div>' +
                    '<div class="loading"></div>' +
                '</div>';
            }
            container.innerHTML = html;
        }

        function filterChannels() {
            var q = document.getElementById('search').value.toLowerCase();
            filtered = channels;
            if (q) {
                filtered = [];
                for (var i = 0; i < channels.length; i++) {
                    if (channels[i].name.toLowerCase().indexOf(q) >= 0) {
                        filtered.push(channels[i]);
                    }
                }
            }
            currentIdx = Math.min(currentIdx, Math.max(0, filtered.length - 1));
            renderChannels();
        }

        function selectChannel(idx) {
            currentIdx = idx;
            renderChannels();
            var ch = filtered[idx];
            if (ch) {
                document.getElementById('ch-name').textContent = ch.name;
                document.getElementById('player-ui').style.display = 'flex';
                playCurrent();
            }
        }

        function playCurrent() {
            if (!filtered.length || playing) return;
            var ch = filtered[currentIdx];
            if (!ch) return;
            streams = ch.backups && ch.backups.length ? ch.backups : [ch.url];

            streams.sort(function(a, b) {
                var ah = isHD(a) ? 1 : 0;
                var bh = isHD(b) ? 1 : 0;
                return bh - ah;
            });

            streamIdx = 0;
            doPlay();
        }

        function doPlay() {
            if (streamIdx >= streams.length) {
                setStatus('error', 'Sin fuente');
                return;
            }

            var url = streams[streamIdx];
            var video = document.getElementById('video');

            setStatus('connecting', 'Fuente ' + (streamIdx + 1) + '...');

            if (hls) { hls.destroy(); hls = null; }

            if (url.indexOf('.m3u8') > 0 && typeof HLS === 'function') {
                hls = new HLS({ enableWorker: true, liveSyncDurationCount: 3 });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(HLS.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function() {});
                    setStatus('live', 'EN VIVO');
                    playing = true;
                });
hls.on(HLS.Events.ERROR, function(e, data) {
                    if (data.fatal) {
                        streamIdx++;
                        doPlay();
                    }
                });
            } else {
                video.src = url;
                video.volume = 1;
                video.play().then(function() {
                    setStatus('live', 'EN VIVO');
                    playing = true;
                }).catch(function() {
                    streamIdx++;
                    doPlay();
                });
                video.onerror = function() {
                    streamIdx++;
                    doPlay();
                };
            }
        }
        }
                    if (!playing && streamIdx < streams.length - 1) {
                        streamIdx++;
                        doPlay();
                    }
                }, 8000);
}
        }

        function setStatus(type, text) {
            var el = document.getElementById('status');
            el.className = 'status-pill ' + type;
            el.querySelector('.text').textContent = text;
        }

        function stop() {
            playing = false;
            var video = document.getElementById('video');
            video.pause();
            video.src = '';
            video.load();
            if (hls) {
                hls.destroy();
                hls = null;
            }
            setStatus('', 'En espera');
            document.getElementById('ch-name').textContent = 'Selecciona un canal';
        }

        function toggleFullscreen() {
            var player = document.getElementById('player');
            var ui = document.getElementById('player-ui');
            if (player.classList.contains('fs')) {
                player.classList.remove('fs');
                if (document.exitFullscreen) document.exitFullscreen();
            } else {
                player.classList.add('fs');
                if (player.requestFullscreen) player.requestFullscreen();
            }
        }

        function nextSource() {
            if (streams.length > 1) {
                streamIdx = (streamIdx + 1) % streams.length;
                doPlay();
            }
        }

        function showToast(msg, type) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = type || '';
            el.classList.add('show');
            setTimeout(function() {
                el.classList.remove('show');
            }, 3000);
        }

        document.onkeydown = function(e) {
            var max = filtered.length - 1;
            if (e.keyCode === 70) {
                toggleFullscreen();
                e.preventDefault();
            } else if (!playing) {
                if (e.keyCode === 38 || e.keyCode === 40) {
                    currentIdx = e.keyCode === 38 ? Math.max(0, currentIdx - 1) : Math.min(max, currentIdx + 1);
                    selectChannel(currentIdx);
                    e.preventDefault();
                } else if (e.keyCode === 13 || e.keyCode === 32) {
                    playCurrent();
                    e.preventDefault();
                }
            } else {
                if (e.keyCode === 38 || e.keyCode === 40) {
                    currentIdx = e.keyCode === 38 ? Math.max(0, currentIdx - 1) : Math.min(max, currentIdx + 1);
                    selectChannel(currentIdx);
                    playCurrent();
                    e.preventDefault();
                } else if (e.keyCode === 27) {
                    stop();
                    e.preventDefault();
                }
            }
        };

        document.getElementById('ch-grid').onclick = function(e) {
            var card = e.target.closest('.ch-card');
            if (card) {
                var idx = Array.prototype.indexOf.call(card.parentElement.children, card);
                selectChannel(idx);
                playCurrent();
            }
        };

        loadChannels();
    </script>
</body>
</html>
