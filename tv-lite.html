<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
        
        #tv { height: 65vh; background: #000; position: relative; }
        #v { width: 100%; height: 100%; background: #000; object-fit: contain; }
        
        #tv.fs { 
            position: fixed; top:0; left:0; width:100vw; height:100vh; 
            z-index: 9999; background: #000;
        }
        #tv.fs #v { object-fit: cover; }
        
        #bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        #bar.hid { opacity: 0; transition: opacity 0.3s; }
        #tv.fs:hover #bar.hid, #bar:hover { opacity: 1; }
        
        #ch { font-size: 20px; color: #00d4ff; font-weight: bold; }
        #st { font-size: 13px; color: #888; }
        
        #fullBtn {
            background: #333; border: 2px solid #555;
            color: #fff; padding: 12px 35px; border-radius: 6px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        #fullBtn.sel { border-color: #ff0; background: #443300; }
        
        #ls { height: 35vh; background: #0a0a0a; overflow-y: auto; }
        #sr { display: flex; gap: 8px; padding: 8px; background: #111; }
        #sr input, #sr select {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 8px 12px; border-radius: 4px; font-size: 14px;
        }
        #sr input { flex: 1; }
        
        #gs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 6px; padding: 8px;
        }
        .c {
            background: #151515; border: 2px solid #222;
            border-radius: 4px; padding: 12px 6px;
            text-align: center; cursor: pointer;
            transition: border 0.1s;
        }
        .c.sel { border-color: #ff0; background: #332800; box-shadow: 0 0 12px rgba(255,255,0,0.4); }
        .c .n { font-size: 12px; font-weight: bold; }
        .c .b { font-size: 10px; color: #4f4; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="tv">
        <video id="v" controls playsinline webkit-playsinline></video>
        <div id="bar" class="hid">
            <div>
                <div id="ch">MoJiTo TV</div>
                <div id="st">Selecciona canal</div>
            </div>
            <button id="fullBtn">Full</button>
        </div>
    </div>
    
    <div id="ls">
        <div id="sr">
            <input type="text" placeholder="Buscar..." oninput="fl()" id="q">
            <select onchange="fl()" id="ct">
                <option value="">Todos</option>
                <option value="deportes">Deportes</option>
                <option value="peliculas">Peliculas</option>
                <option value="series">Series</option>
                <option value="ninos">Ninos</option>
                <option value="noticias">Noticias</option>
            </select>
        </div>
        <div id="gs"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <script>
        var all = [], fl = [], i = 0, hls = null, bk = [], bi = 0, playing = false;
        var focus = 'ch';
        var isFs = false;
        
        var catM = {'espn':'deportes','fox':'deportes','tnt sports':'deportes','tyc':'deportes','win':'deportes','hbo':'peliculas','cinemax':'peliculas','star':'peliculas','amc':'series','axn':'series','sony':'series','universal':'series','fx':'series','tnt':'series','disney':'ninos','nick':'ninos','cartoon':'ninos','adult':'ninos','cnn':'noticias','bbc':'noticias'};
        
        function gc(n) { n=n.toLowerCase(); for(var k in catM) if(n.indexOf(k)>=0) return catM[k]; return 'series'; }
        function show(t){ document.getElementById('st').textContent=t; }
        
        function init() {
            fetch('/api/tv').then(r=>r.json()).then(d=>{
                all = d.channels||[];
                rl();
            });
        }
        
        function rl() {
            var q=document.getElementById('q').value.toLowerCase();
            var c=document.getElementById('ct').value;
            fl = all.filter(x=>(!q||x.name.toLowerCase().indexOf(q)>=0)&&(!c||gc(x.name)===c));
            var h='';
            fl.forEach(function(x,idx){
                var bc = (x.backups||[]).length;
                h+='<div class="c'+(idx===i?' sel':'')+'" data-i="'+idx+'">'+
                   '<div class="n">'+x.name+'</div>';
                if(bc>0) h+='<div class="b">'+bc+' fuentes</div>';
                h+='</div>';
            });
            document.getElementById('gs').innerHTML = h;
        }
        
        function fl(){ i=0; rl(); }
        
        function sc() {
            var cs=document.querySelectorAll('.c');
            if(cs[i]&&cs[i].scrollIntoView) cs[i].scrollIntoView({block:'nearest',behavior:'smooth'});
        }
        
        function play() {
            if(!fl.length) return;
            var ch = fl[i];
            bk = ch.backups||[ch.url];
            bi = 0;
            playing = true;
            document.getElementById('ch').textContent = ch.name;
            show('Conectando...');
            playUrl();
        }
        
        function playUrl() {
            if(bi>=bk.length){ 
                show('Sin fuente'); 
                playing = false;
                return; 
            }
            
            var v = document.getElementById('v');
            v.pause();
            if(hls){hls.destroy(); hls=null;}
            
            var u = bk[bi];
            show('Fuente '+(bi+1)+'/'+bk.length+'...');
            
            if(u.indexOf('.m3u8')>=0 && HLS.isSupported()){
                hls = new HLS({enableWorker:true,maxBufferLength:30});
                hls.loadSource(u);
                hls.attachMedia(v);
                hls.on(HLS.Events.MANIFEST_PARSED, function(){
                    show('EN VIVO');
                    v.play();
                });
                hls.on(HLS.Events.ERROR, function(e, d){
                    if(d.fatal){ bi++; playUrl(); }
                });
            } else {
                v.src = u;
                v.volume = 1;
                v.onloadeddata = function(){ show('EN VIVO'); v.play(); };
                v.onplay = function(){ show('EN VIVO'); playing = true; };
                v.onwaiting = function(){ show('Buffer...'); };
                v.onerror = function(){ bi++; playUrl(); };
                v.play().catch(function(){ bi++; playUrl(); });
            }
            rl();
        }
        
        function stop() {
            playing = false;
            var v = document.getElementById('v');
            v.pause();
            v.src = '';
            if(hls){hls.destroy(); hls=null;}
            document.getElementById('ch').textContent = playing ? fl[i].name : 'MoJiTo TV';
            show(playing ? 'EN VIVO' : 'Parado - Selecciona canal');
            i = 0;
            rl();
        }
        
        function fs() {
            isFs = !isFs;
            var t = document.getElementById('tv');
            t.classList.toggle('fs', isFs);
            
            if(isFs && t.requestFullscreen){
                t.requestFullscreen();
            } else if(isFs && t.webkitRequestFullScreen){
                t.webkitRequestFullScreen();
            }
        }
        
        function updSel() {
            var els = document.querySelectorAll('.c');
            for(var ei=0; ei<els.length; ei++){
                els[ei].classList.toggle('sel', ei===i);
            }
            document.getElementById('fullBtn').classList.toggle('sel', focus==='full');
            sc();
        }
        
        document.onkeydown = function(e) {
            var m = fl.length - 1;
            
            if(e.keyCode===38){
                if(focus==='ch') i = Math.max(0, i-1);
                else if(focus==='full') focus='ch';
            }
            else if(e.keyCode===40){
                if(focus==='ch') i = Math.min(m, i+1);
                else if(focus==='full') focus='ch';
            }
            else if(e.keyCode===37){
                if(focus==='full') focus='ch';
                else i = Math.max(0, i-1);
            }
            else if(e.keyCode===39){
                if(focus==='ch') focus='full';
                else i = Math.min(m, i+1);
            }
            else if(e.keyCode===13 || e.keyCode===32){
                if(focus==='full') fs();
                else if(playing) stop();
                else play();
            }
            else if(e.keyCode===27){
                if(playing) stop();
                else if(isFs) fs();
            }
            else if(e.keyCode===70) fs();
            
            updSel();
        };
        
        document.getElementById('fullBtn').onclick = fs;
        document.getElementById('v').ondblclick = fs;
        
        document.getElementById('gs').onclick = function(e){
            var c = e.target.closest('.c');
            if(c){ i=parseInt(c.dataset.i); focus='ch'; play(); updSel(); }
        };
        
        window.onload = init;
    </script>
</body>
</html>
