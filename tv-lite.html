<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
        
        #player { 
            position: relative; 
            width: 100%; 
            height: 55vh; 
            background: #000; 
        }
        
        #video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000; 
        }
        
        #player:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
        }
        
        #player:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
        }
        
        #overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }
        #overlay.hidden { display: none; }
        #overlay .spinner {
            width: 50px; height: 50px; border: 4px solid #333;
            border-top: 4px solid #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #overlay .title { font-size: 28px; color: #00d4ff; margin-bottom: 10px; }
        #overlay .msg { font-size: 16px; color: #888; }
        
        #info {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        #channel-name { font-size: 18px; color: #00d4ff; font-weight: bold; }
        #status { font-size: 12px; }
        #status.online { color: #4f4; }
        #status.buffer { color: #fa0; }
        #status.error { color: #f44; }
        
        #controls { display: flex; gap: 8px; }
        #controls button {
            background: rgba(255,255,255,0.1); border: 1px solid #444;
            color: #fff; padding: 8px 14px; border-radius: 4px;
            cursor: pointer; font-size: 14px;
        }
        #controls button:hover { background: rgba(255,255,255,0.2); }
        #controls button.active { background: #00d4ff; color: #000; }
        #vol { width: 80px; vertical-align: middle; }
        
        #list { height: 45vh; background: #0a0a0a; overflow-y: auto; }
        #search { 
            display: flex; gap: 10px; padding: 10px; background: #111; 
        }
        #search input, #search select {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 8px; border-radius: 4px; font-size: 14px;
        }
        #search input { flex: 1; }
        
        #channels {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 6px;
            padding: 10px;
        }
        .ch {
            background: #151515; border: 2px solid #333;
            border-radius: 6px; padding: 10px 6px;
            text-align: center; cursor: pointer;
            transition: all 0.15s;
        }
        .ch:hover { border-color: #00d4ff; }
        .ch.active { border-color: #4f4; background: #0a1a0a; }
        .ch .name { font-size: 11px; font-weight: bold; }
        .ch .status { font-size: 9px; color: #666; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="player">
        <video id="video" controls playsinline webkit-playsinline></video>
        
        <div id="overlay" class="hidden">
            <div class="spinner"></div>
            <div class="title">MoJiTo TV</div>
            <div class="msg">Cargando...</div>
        </div>
        
        <div id="info">
            <div>
                <div id="channel-name">Sin canal</div>
                <div id="status" class="buffer">Selecciona un canal</div>
            </div>
            <div id="controls">
                <button onclick="prev()">◀</button>
                <button onclick="togglePlay()">▶</button>
                <button onclick="next()">▶</button>
                <button onclick="stop()">■</button>
                <button onclick="fullScreen()">⛶</button>
                <input type="range" id="vol" min="0" max="100" value="100" onchange="setVol(this.value)">
            </div>
        </div>
    </div>
    
    <div id="list">
        <div id="search">
            <input type="text" placeholder="Buscar..." oninput="filter()" id="q">
            <select onchange="filter()" id="cat">
                <option value="">Todos</option>
                <option value="deportes">Deportes</option>
                <option value="peliculas">Películas</option>
                <option value="series">Series</option>
                <option value="ninos">Niños</option>
                <option value="noticias">Noticias</option>
            </select>
        </div>
        <div id="channels"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <script>
        var all = [], filt = [], idx = -1, hls = null;
        var currentBackups = [], backupIdx = 0, retryTimeout = null;
        var isRetrying = false;
        
        var catMap = {
            'espn': 'deportes', 'fox sports': 'deportes', 'tnt sports': 'deportes',
            'tyc': 'deportes', 'win': 'deportes', 'bein': 'deportes',
            'hbo': 'peliculas', 'cinemax': 'peliculas', 'star': 'peliculas',
            'amc': 'series', 'axn': 'series', 'sony': 'series',
            'universal': 'series', 'fx': 'series', 'tnt': 'series',
            'disney': 'ninos', 'nick': 'ninos', 'cartoon': 'ninos', 'adult': 'ninos',
            'cnn': 'noticias', 'bbc': 'noticias', 'dw': 'noticias',
            'mtv': 'musica'
        };
        
        function getCat(name) {
            name = name.toLowerCase();
            for (var k in catMap) if (name.indexOf(k) >= 0) return catMap[k];
            return 'series';
        }
        
        function show(msg, type) {
            var s = document.getElementById('status');
            if (s && msg !== undefined) { s.className = type || ''; s.textContent = msg; }
        }
        
        function showOverlay(msg, show) {
            var o = document.getElementById('overlay');
            if (show) {
                o.classList.remove('hidden');
                o.querySelector('.msg').textContent = msg || '';
            } else {
                o.classList.add('hidden');
            }
        }
        
        function init() {
            showOverlay('Cargando canales...', true);
            fetch('/api/tv').then(function(r) { return r.json(); })
            .then(function(d) {
                all = d.channels || [];
                render();
                showOverlay('', false);
                show('Selecciona un canal', '');
            })
            .catch(function(e) {
                showOverlay('Error cargando canales', true);
                console.log('Error:', e);
            });
        }
        
        function render() {
            filt = all.filter(function(c) {
                var q = document.getElementById('q').value.toLowerCase();
                var cat = document.getElementById('cat').value;
                return (!q || c.name.toLowerCase().indexOf(q) >= 0) && 
                       (!cat || getCat(c.name) === cat);
            });
            
            var html = '';
            filt.forEach(function(c, i) {
                var active = i === idx ? 'active' : '';
                var st = c.streams || 1;
                html += '<div class="ch ' + active + '" onclick="play(' + i + ')">' +
                    '<div class="name">' + c.name + '</div>' +
                    '<div class="status">' + st + ' fuentes</div></div>';
            });
            document.getElementById('channels').innerHTML = html;
        }
        
        function filter() { render(); }
        
        function play(i, useBackup) {
            if (i !== undefined) {
                idx = i;
                var c = filt[i];
                currentBackups = c.backups || [c.url];
                backupIdx = useBackup || 0;
            }
            
            if (backupIdx >= currentBackups.length) {
                backupIdx = 0;
                show('Sin fuente disponible', 'error');
                showOverlay('Sin fuente', true);
                return;
            }
            
            var c = filt[idx];
            var url = currentBackups[backupIdx];
            var type = url.indexOf('.m3u8') >= 0 ? 'hls' : 'ts';
            
            document.getElementById('channel-name').textContent = c.name + (backupIdx > 0 ? ' (alt' + backupIdx + ')' : '');
            show('Conectando...', 'buffer');
            showOverlay('Conectando...', true);
            
            var v = document.getElementById('video');
            v.pause();
            
            if (hls) { hls.destroy(); hls = null; }
            clearTimeout(retryTimeout);
            
            if (type === 'hls' && HLS.isSupported()) {
                hls = new HLS({ 
                    enableWorker: true,
                    lowLatencyMode: false,
                    maxLoadingDelay: 4,
                    maxBufferLength: 30
                });
                hls.loadSource(url);
                hls.attachMedia(v);
                hls.on(HLS.Events.MANIFEST_PARSED, function() {
                    showOverlay('', false);
                    show('EN VIVO', 'online');
                    v.play();
                });
                hls.on(HLS.Events.ERROR, function(e, data) {
                    if (data.fatal) {
                        tryNextBackup();
                    }
                });
            } else {
                v.src = url;
                v.volume = 1;
                
                v.onloadeddata = function() {
                    showOverlay('', false);
                    show('EN VIVO', 'online');
                    v.play();
                };
                
                v.onplay = function() {
                    show('EN VIVO', 'online');
                    showOverlay('', false);
                    isRetrying = false;
                };
                
                v.onwaiting = function() { show('Buffering...', 'buffer'); };
                v.onplaying = function() { 
                    show('EN VIVO', 'online'); 
                    showOverlay('', false);
                    isRetrying = false;
                };
                
                v.onerror = function() {
                    tryNextBackup();
                };
                
                v.play().catch(function(e) { tryNextBackup(); });
            }
            
            render();
        }
        
        function tryNextBackup() {
            backupIdx++;
            if (backupIdx < currentBackups.length) {
                show('Intentando fuente alternativa...', 'buffer');
                setTimeout(function() { play(undefined, backupIdx); }, 500);
            } else {
                show('Todas las fuentes fallan', 'error');
                showOverlay('Error', true);
                backupIdx = 0;
            }
        }
        
        function togglePlay() {
            var v = document.getElementById('video');
            if (v.paused) {
                if (v.src || (hls && hls.media)) {
                    v.play();
                } else if (idx >= 0) {
                    play(idx);
                }
            } else {
                v.pause();
                show('Pausado', 'buffer');
            }
        }
        
        function prev() {
            if (filt.length === 0) return;
            idx = (idx - 1 + filt.length) % filt.length;
            play(idx);
        }
        
        function next() {
            if (filt.length === 0) return;
            idx = (idx + 1) % filt.length;
            play(idx);
        }
        
        function stop() {
            var v = document.getElementById('video');
            v.pause();
            v.src = '';
            if (hls) { hls.destroy(); hls = null; }
            clearTimeout(retryTimeout);
            document.getElementById('channel-name').textContent = 'Sin canal';
            show('Parado', 'buffer');
            showOverlay('Parado', true);
            idx = -1;
            backupIdx = 0;
            render();
        }
        
        function setVol(val) {
            document.getElementById('video').volume = val / 100;
        }
        
        function fullScreen() {
            var p = document.getElementById('player');
            if (p.requestFullscreen) {
                p.requestFullscreen();
            } else if (p.webkitRequestFullScreen) {
                p.webkitRequestFullScreen();
            }
        }
        
        document.onkeydown = function(e) {
            if (e.keyCode === 37) prev();
            else if (e.keyCode === 39) next();
            else if (e.keyCode === 13 || e.keyCode === 32) togglePlay();
            else if (e.keyCode === 27) stop();
            else if (e.keyCode === 70) fullScreen(); // F for fullscreen
        };
        
        document.getElementById('video').ondblclick = fullScreen;
        
        window.onload = init;
    </script>
</body>
</html>
