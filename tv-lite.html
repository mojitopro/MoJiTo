<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoJiTo TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
        
        #player { position: relative; width: 100%; height: 55vh; background: #000; }
        #video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        #overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }
        #overlay.hidden { display: none; }
        #overlay .spinner {
            width: 50px; height: 50px; border: 4px solid #333;
            border-top: 4px solid #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); }
        #overlay .title { font-size: 28px; color: #00d4ff; margin-bottom: 10px; }
        #overlay .msg { font-size: 16px; color: #888; }
        
        #info {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        #channel-name { font-size: 18px; color: #00d4ff; font-weight: bold; }
        #status { font-size: 12px; }
        #status.online { color: #4f4; }
        #status.buffer { color: #fa0; }
        #status.error { color: #f44; }
        
        #controls { display: flex; gap: 8px; align-items: center; }
        #controls button {
            background: rgba(255,255,255,0.1); border: 1px solid #444;
            color: #fff; padding: 8px 14px; border-radius: 4px;
            cursor: pointer; font-size: 14px;
        }
        #controls button:hover { background: rgba(255,255,255,0.2); }
        #controls button.active { background: #00d4ff; color: #000; }
        #vol { width: 70px; }
        
        #list { height: 45vh; background: #0a0a0a; overflow-y: auto; }
        #search { display: flex; gap: 10px; padding: 10px; background: #111; }
        #search input, #search select {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 8px; border-radius: 4px; font-size: 14px;
        }
        #search input { flex: 1; }
        
        #channels {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 4px;
            padding: 8px;
        }
        .ch {
            background: #151515; border: 2px solid #333;
            border-radius: 4px; padding: 8px 4px;
            text-align: center; cursor: pointer;
            transition: all 0.1s;
        }
        .ch:hover { border-color: #00d4ff; }
        .ch.active { border-color: #4f4; background: #0a1a0a; }
        .ch.selected { border-color: #ff0; background: #221a00; box-shadow: 0 0 8px #ff0; }
        .ch .name { font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="player">
        <video id="video" controls playsinline webkit-playsinline></video>
        
        <div id="overlay" class="hidden">
            <div class="spinner"></div>
            <div class="title">MoJiTo TV</div>
            <div class="msg">Cargando...</div>
        </div>
        
        <div id="info">
            <div>
                <div id="channel-name">Sin canal</div>
                <div id="status" class="buffer">Selecciona un canal</div>
            </div>
            <div id="controls">
                <button onclick="playCurrent()">Play</button>
                <button onclick="stop()">Stop</button>
                <button onclick="fullScreen()">Full</button>
                <input type="range" id="vol" min="0" max="100" value="100" onchange="setVol(this.value)">
            </div>
        </div>
    </div>
    
    <div id="list">
        <div id="search">
            <input type="text" placeholder="Buscar..." oninput="filter()" id="q">
            <select onchange="filter()" id="cat">
                <option value="">Todos</option>
                <option value="deportes">Deportes</option>
                <option value="peliculas">Peliculas</option>
                <option value="series">Series</option>
                <option value="ninos">Ninos</option>
                <option value="noticias">Noticias</option>
            </select>
        </div>
        <div id="channels"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <script>
        var all = [], filt = [], idx = 0, hls = null;
        var currentBackups = [], backupIdx = 0;
        var cols = 3;
        
        var catMap = {
            'espn': 'deportes', 'fox sports': 'deportes', 'tnt sports': 'deportes',
            'tyc': 'deportes', 'win': 'deportes', 'bein': 'deportes',
            'hbo': 'peliculas', 'cinemax': 'peliculas', 'star': 'peliculas',
            'amc': 'series', 'axn': 'series', 'sony': 'series',
            'universal': 'series', 'fx': 'series', 'tnt': 'series',
            'disney': 'ninos', 'nick': 'ninos', 'cartoon': 'ninos', 'adult': 'ninos',
            'cnn': 'noticias', 'bbc': 'noticias', 'dw': 'noticias',
            'mtv': 'musica'
        };
        
        function getCat(name) {
            name = name.toLowerCase();
            for (var k in catMap) if (name.indexOf(k) >= 0) return catMap[k];
            return 'series';
        }
        
        function show(msg, type) {
            var s = document.getElementById('status');
            if (s && msg !== undefined) { s.className = type || ''; s.textContent = msg; }
        }
        
        function showOverlay(msg, show) {
            var o = document.getElementById('overlay');
            if (show) {
                o.classList.remove('hidden');
                o.querySelector('.msg').textContent = msg || '';
            } else {
                o.classList.add('hidden');
            }
        }
        
        function init() {
            cols = Math.floor(window.innerWidth / 100);
            showOverlay('Cargando canales...', true);
            fetch('/api/tv').then(function(r) { return r.json(); })
            .then(function(d) {
                all = d.channels || [];
                filt = all;
                render();
                showOverlay('', false);
                show('Selecciona un canal', '');
            });
        }
        
        function render() {
            filt = all.filter(function(c) {
                var q = document.getElementById('q').value.toLowerCase();
                var cat = document.getElementById('cat').value;
                return (!q || c.name.toLowerCase().indexOf(q) >= 0) && 
                       (!cat || getCat(c.name) === cat);
            });
            
            var html = '';
            filt.forEach(function(c, i) {
                var active = i === idx ? 'active' : '';
                var sel = i === idx ? 'selected' : '';
                html += '<div class="ch ' + active + ' ' + sel + '" data-i="' + i + '">' +
                    '<div class="name">' + c.name + '</div></div>';
            });
            document.getElementById('channels').innerHTML = html;
            scrollToSelected();
        }
        
        function filter() { render(); }
        
        function scrollToSelected() {
            var chs = document.querySelectorAll('.ch');
            if (chs[idx]) {
                chs[idx].scrollIntoView({block: 'nearest'});
            }
        }
        
        function playCurrent() {
            if (filt.length === 0) return;
            var c = filt[idx];
            currentBackups = c.backups || [c.url];
            backupIdx = 0;
            
            document.getElementById('channel-name').textContent = c.name;
            show('Conectando...', 'buffer');
            showOverlay('Conectando...', true);
            
            var v = document.getElementById('video');
            v.pause();
            
            if (hls) { hls.destroy(); hls = null; }
            
            var url = currentBackups[backupIdx];
            var type = url.indexOf('.m3u8') >= 0 ? 'hls' : 'ts';
            
            if (type === 'hls' && HLS.isSupported()) {
                hls = new HLS({enableWorker: true, lowLatencyMode: false, maxLoadingDelay: 4, maxBufferLength: 30});
                hls.loadSource(url);
                hls.attachMedia(v);
                hls.on(HLS.Events.MANIFEST_PARSED, function() {
                    showOverlay('', false);
                    show('EN VIVO', 'online');
                    v.play();
                });
                hls.on(HLS.Events.ERROR, function(e, data) {
                    if (data.fatal) playBackup();
                });
            } else {
                v.src = url;
                v.volume = 1;
                v.onloadeddata = function() { showOverlay('', false); show('EN VIVO', 'online'); v.play(); };
                v.onplay = function() { showOverlay('', false); show('EN VIVO', 'online'); };
                v.onwaiting = function() { show('Buffering...', 'buffer'); };
                v.onerror = function() { playBackup(); };
                v.play().catch(function() { playBackup(); });
            }
            
            render();
        }
        
        function playBackup() {
            backupIdx++;
            if (backupIdx < currentBackups.length) {
                show('Alt ' + (backupIdx + 1) + '...', 'buffer');
                setTimeout(playCurrent, 300);
            } else {
                show('Sin fuente', 'error');
                showOverlay('Error', true);
                backupIdx = 0;
            }
        }
        
        function stop() {
            var v = document.getElementById('video');
            v.pause();
            v.src = '';
            if (hls) { hls.destroy(); hls = null; }
            document.getElementById('channel-name').textContent = 'Sin canal';
            show('Parado', 'buffer');
            showOverlay('Parado', true);
        }
        
        function fullScreen() {
            var p = document.getElementById('player');
            if (p.requestFullscreen) p.requestFullscreen();
            else if (p.webkitRequestFullScreen) p.webkitRequestFullScreen();
        }
        
        function setVol(val) {
            document.getElementById('video').volume = val / 100;
        }
        
        document.onkeydown = function(e) {
            var max = filt.length - 1;
            if (e.keyCode === 38) { // Up
                idx = Math.max(0, idx - cols);
                render();
            } else if (e.keyCode === 40) { // Down
                idx = Math.min(max, idx + cols);
                render();
            } else if (e.keyCode === 37) { // Left
                idx = Math.max(0, idx - 1);
                render();
            } else if (e.keyCode === 39) { // Right
                idx = Math.min(max, idx + 1);
                render();
            } else if (e.keyCode === 13) { // Enter
                playCurrent();
            } else if (e.keyCode === 27) { // Escape
                stop();
            } else if (e.keyCode === 70) { // F
                fullScreen();
            }
        };
        
        document.getElementById('channels').onclick = function(e) {
            var ch = e.target.closest('.ch');
            if (ch) {
                idx = parseInt(ch.dataset.i);
                render();
                playCurrent();
            }
        };
        
        window.onload = init;
    </script>
</body>
</html>
